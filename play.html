<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>gmc64 — player</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
:root {
    --c64-black: #000;
    /* The bottom bar doubles as the C64-style bottom border, so the canvas
       has no padded frame of its own. Bar height is used in the canvas
       sizing math below — keep it here so the two stay in sync. */
    --bar-height: 44px;
}
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--c64-black);
    color: #eee;
    font-family: system-ui, -apple-system, sans-serif;
    overflow: hidden;
}

body {
    display: flex;
    flex-direction: column;
}

/* Play area fills all vertical space above the bottom bar. min-height:0
   lets flex shrink it under content when the viewport is short (otherwise
   the canvas's intrinsic aspect-driven height would push the bar off-screen). */
#playArea {
    flex: 1;
    min-height: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}

/* Dedicated bottom border strip — the credit link, pause toggle, and
   audio indicator live here rather than overlaying the play field. */
#bottomBar {
    height: var(--bar-height);
    flex-shrink: 0;
    position: relative;
    background: var(--c64-black);
}

/* Canvas wrapper — no padding: the bottom bar acts as the bottom border,
   and the black body background surrounds the canvas on the other sides.
   Kept as an element mostly for structural symmetry with editor.html and
   in case we want to reintroduce a runtime-tinted border later. */
#gameBorder {
    display: inline-block;
    position: relative;
}

/* Canvas scales to fit viewport while preserving the CRT-authentic 6:5
   display aspect. image-rendering keeps pixels crisp at any scale. */
#gameCanvas {
    display: block;
    /* C64 pixels aren't square — the CRT-authentic display aspect is 6:5
       (matches editor.html's 480×400 canvas over 320×200 native data),
       NOT the raw 8:5 of the pixel resolution. Using native pixel aspect
       here makes everything look horizontally stretched.

       Width is the min of (a) 90% of viewport width and (b) the width that
       fits vertically: (viewport height − bar) × 6/5. Without the vertical
       clamp, aspect-ratio would derive a height that overflows #playArea
       and the canvas would clip instead of scaling down on short viewports. */
    width: min(90vw, calc((100vh - var(--bar-height)) * 6 / 5));
    aspect-ratio: 6 / 5;
    height: auto;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    max-width: 960px;
}

/* Full-canvas overlay with the play button. Sits above the game until the
   user clicks — at which point the click both starts the VM and unlocks
   the AudioContext in the same gesture (browser autoplay policy). */
#playOverlay {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.55);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    cursor: pointer;
}

#playButton {
    width: 96px;
    height: 96px;
    padding: 0;
    background: rgba(255, 255, 255, 0.12);
    border: 2px solid rgba(255, 255, 255, 0.8);
    border-radius: 50%;
    color: white;
    font-family: inherit;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
}
#playButton:hover:not(:disabled) { background: rgba(255, 255, 255, 0.22); }
#playButton:disabled {
    cursor: default;
    width: auto;
    height: auto;
    border-radius: 8px;
    padding: 12px 20px;
    font-size: 14px;
    opacity: 0.85;
}
#playButton svg { width: 44px; height: 44px; display: block; }

/* Speaker icon + pause toggle. Both anchored to the bottom-right of the
   #bottomBar strip (position: absolute against its position: relative). */
.gm-audio-indicator,
#pauseToggle {
    position: absolute;
    bottom: 8px;
    width: 28px;
    height: 28px;
    background: rgba(0, 0, 0, 0.5);
    border: 1px solid rgba(255, 255, 255, 0.25);
    border-radius: 4px;
    cursor: pointer;
    color: rgba(255, 255, 255, 0.9);
    padding: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.1s, opacity 0.1s;
    font-family: inherit;
}
.gm-audio-indicator { right: 20px; }
#pauseToggle { right: 56px; }
.gm-audio-indicator:hover,
#pauseToggle:hover { background: rgba(0, 0, 0, 0.75); }
.gm-audio-indicator.muted { opacity: 0.65; }
.gm-audio-indicator svg,
#pauseToggle svg { width: 100%; height: 100%; display: block; }

/* Subtle attribution corner. Suppressed when ?nocredit is in the URL. */
/* Credit link — anchored to the left of #bottomBar, vertically centred.
   No z-index needed: the bar sits below playArea entirely, so the play
   overlay (which lives inside playArea) never covers it. */
.credit {
    position: absolute;
    top: 50%;
    left: 20px;
    transform: translateY(-50%);
    color: rgba(255, 255, 255, 0.5);
    font-size: 12px;
    text-decoration: none;
    font-family: monospace;
}
.credit:hover { color: rgba(255, 255, 255, 0.9); }
</style>
</head>
<body>
<div id="playArea">
    <div id="gameBorder">
        <canvas id="gameCanvas" width="320" height="200"></canvas>
        <!-- audio indicator mounts here on first play -->
    </div>
    <div id="playOverlay">
        <button id="playButton" type="button" aria-label="Play">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M7 5 L19 12 L7 19 Z"
                      fill="currentColor"
                      stroke="currentColor"
                      stroke-width="3"
                      stroke-linejoin="round"
                      stroke-linecap="round"/>
            </svg>
        </button>
    </div>
</div>
<!-- Bottom border strip. Holds the credit link, pause toggle, and audio
     indicator (mounted from JS after startGame). Sits below #playArea in
     the flex column, so the play overlay never covers these controls. -->
<div id="bottomBar">
    <a class="credit" href="https://gmc64.com" target="_blank" rel="noopener">gmc64.com</a>
    <!-- Pause / resume toggle. Hidden until the game actually starts. -->
    <button id="pauseToggle" type="button" aria-label="Pause" style="display: none;">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect x="6" y="5" width="4" height="14" rx="1" fill="currentColor"/>
            <rect x="14" y="5" width="4" height="14" rx="1" fill="currentColor"/>
        </svg>
    </button>
    <!-- audio indicator mounts here at first play -->
</div>

<!-- Runtime files. play.html deliberately does NOT include:
       - editor JS (instruction picker, arg editing, save/load UI, …)
       - runtime-source.js (only needed by editor's Export Game flow)
       - demo-disk-source.js (only relevant to editor's demo shortcut) -->
<script src="js/c64lib.js"></script>
<script src="js/c64Screen.js"></script>
<script src="js/d64lib.js"></script>
<script src="js/gmDisk.js"></script>
<script src="js/gmTools.js"></script>
<script src="js/gmOpcodes.js"></script>
<script src="js/gmSprite.js"></script>
<script src="js/gmScene.js"></script>
<script src="js/gmSound.js"></script>
<script src="js/gmMusic.js"></script>
<script src="js/gmCharset.js"></script>
<script src="js/gmParser.js"></script>
<script src="js/gmRuntime.js"></script>
<script src="js/gmAudioIndicator.js"></script>
<script src="js/gmPoster.js"></script>

<script>
// Chrome-free game player. Loads a game from URL params, shows a play
// button until the visitor clicks, then runs. The click serves as the
// user gesture that unlocks the AudioContext — same solution as
// clicking-to-play in a video embed.
//
// URL params:
//   disk            .d64 URL, or the magic word `demo` for the bundled demo
//   file            program name on the disk (case-insensitive)
//   nocredit=1      hides the gmc64.com corner link (must be exactly "1")
//   poster_seconds  how long to simulate the game before rendering the
//                   preview frame behind the play button. Default: 2.
//                   Max: 10. Decimals allowed (rounded to 0.01s). `=0`
//                   skips the poster entirely — canvas stays black.

const disk = new GMDisk('player');
let audioContext = null;
let masterGain = null;
let vm = null;
let screen = null;
let charset = null;
let audioIndicator = null;
let currentProgramData = null;
let currentFileData = null;
let currentFileName = null;
let animationFrameToggle = false;

// Input state read by gmRuntime. Same shape as editor.html.
const inputState = {
    joystick1: { up: false, down: false, left: false, right: false },
    joystick2: { up: false, down: false, left: false, right: false },
    button1: false,
    button2: false
};

function decode16bit(lo, hi) { return lo + (hi << 8); }

window.addEventListener('DOMContentLoaded', init);

async function init() {
    charset = new gmCharset();

    if (new URLSearchParams(location.search).get('nocredit') === '1') {
        document.querySelector('.credit').style.display = 'none';
    }

    document.getElementById('playOverlay').addEventListener('click', startGame);
    setupInputListeners();
    await loadGame();
}

// Fetch the disk, find the requested file, parse it into an AST. The
// game doesn't start playing yet — that waits for the play-button click.
async function loadGame() {
    const params = new URLSearchParams(location.search);
    if (!params.has('disk')) {
        showPlayButtonError('no disk specified');
        return;
    }

    const ok = await GMTools.loadDiskFromUrl({
        diskUrl: params.get('disk'), disk
    });
    if (!ok) {
        showPlayButtonError('invalid disk');
        return;
    }

    const fileName = params.get('file');
    if (!fileName) {
        showPlayButtonError('no file specified');
        return;
    }

    const actualName = GMTools.findFileCaseInsensitive(disk.disk, fileName);
    if (!actualName) {
        showPlayButtonError('invalid file');
        return;
    }
    if (!actualName.toUpperCase().endsWith('/PRG')) {
        showPlayButtonError('invalid file type');
        return;
    }

    const fileData = disk.disk.readFile(actualName);
    if (!fileData) {
        showPlayButtonError('invalid file');
        return;
    }

    // gmParser needs this to compose multi-part sprites that reference
    // other files on the disk.
    globalThis.loadFileByName = (name) => disk.disk.readFile(name);
    currentFileName = actualName;
    currentFileData = fileData;
    currentProgramData = parseProgramData(fileData);

    // Kick off the preview render behind the play overlay. Fire-and-forget;
    // a poster failure never blocks the user from starting the game.
    generatePoster();
}

function showPlayButtonError(text) {
    const btn = document.getElementById('playButton');
    btn.textContent = text;
    btn.disabled = true;
    btn.setAttribute('aria-label', text);
}

// The play button is the user gesture that both starts the VM and
// unlocks the AudioContext. Everything audio-related happens inside
// this handler so browser autoplay policies stay satisfied.
async function startGame() {
    if (!currentProgramData) return;
    document.getElementById('playOverlay').style.display = 'none';

    if (!screen) screen = new c64Screen('gameCanvas');
    if (!vm) vm = new gmVM(screen);

    if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioContext.createGain();
        masterGain.gain.value = 0.3;
        masterGain.connect(audioContext.destination);
    }
    if (audioContext.state === 'suspended') {
        audioContext.resume();
    }

    if (!audioIndicator) {
        audioIndicator = new GMAudioIndicator(document.getElementById('bottomBar'));
        audioIndicator.bind({
            getMuted: () => vm.config.audioMuted,
            setMuted: (muted) => vm.setConfig({ audioMuted: muted }),
            getAudioContext: () => audioContext,
            onUnlock: () => {
                if (vm && vm.currentSong) {
                    try {
                        vm.currentSong.stop();
                        vm.currentSong.play();
                        vm.currentSong.setVolume(vm.songVolume);
                    } catch (e) {
                        console.warn('Failed to restart song after audio unlock:', e.message);
                    }
                }
            }
        });
    }

    // Reveal the pause/resume toggle (hidden until first play) and wire
    // its click handler once. Icon reflects current vm.paused state.
    const pauseBtn = document.getElementById('pauseToggle');
    if (!pauseBtn.dataset.wired) {
        pauseBtn.dataset.wired = '1';
        pauseBtn.addEventListener('click', togglePause);
    }
    pauseBtn.style.display = '';

    // Re-parse so the real run gets a fresh mediaStore, unmutated by
    // whatever the poster VM did.
    const programData = parseProgramData(currentFileData);
    const ast = buildAST(programData);
    vm.loadProgram(ast, currentFileData);
    vm.start({ opsPerFrame: 50, frameMs: 16 });
    updatePauseIcon();
}

const PAUSE_ICON_SVG =
    '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">' +
    '<rect x="6" y="5" width="4" height="14" rx="1" fill="currentColor"/>' +
    '<rect x="14" y="5" width="4" height="14" rx="1" fill="currentColor"/>' +
    '</svg>';

const RESUME_ICON_SVG =
    '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">' +
    '<path d="M7 5 L19 12 L7 19 Z" fill="currentColor" stroke="currentColor" ' +
    'stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>' +
    '</svg>';

function togglePause() {
    if (!vm) return;
    if (vm.paused) vm.resume();
    else vm.pause();
    updatePauseIcon();
}

function updatePauseIcon() {
    const btn = document.getElementById('pauseToggle');
    if (vm && vm.paused) {
        btn.innerHTML = RESUME_ICON_SVG;
        btn.setAttribute('aria-label', 'Resume');
    } else {
        btn.innerHTML = PAUSE_ICON_SVG;
        btn.setAttribute('aria-label', 'Pause');
    }
}

// Kick off a poster render on the game canvas. Screen has to exist first
// so the temp VM has something to draw on. Fire-and-forget — a poster
// failure never blocks the user from starting the game.
async function generatePoster() {
    if (!screen) screen = new c64Screen('gameCanvas');
    const params = new URLSearchParams(location.search);
    await GMPoster.generatePoster({
        screen,
        fileData: currentFileData,
        posterSeconds: GMPoster.getPosterSeconds(params)
    });
}

// Standard GM input mapping — arrows + right-Meta for joystick 1 / button 1,
// ESDF + Space for joystick 2 / button 2. Same scheme as editor.html.
function setupInputListeners() {
    window.addEventListener('keydown', (e) => {
        if (!vm || !vm.running) return;
        switch (e.key) {
            case 'ArrowUp':    inputState.joystick1.up    = true; e.preventDefault(); break;
            case 'ArrowDown':  inputState.joystick1.down  = true; e.preventDefault(); break;
            case 'ArrowLeft':  inputState.joystick1.left  = true; e.preventDefault(); break;
            case 'ArrowRight': inputState.joystick1.right = true; e.preventDefault(); break;
            case 'Meta':
                if (e.location === 2) { inputState.button1 = true; e.preventDefault(); }
                break;
            case 'e': case 'E': inputState.joystick2.up    = true; e.preventDefault(); break;
            case 'd': case 'D': inputState.joystick2.down  = true; e.preventDefault(); break;
            case 's': case 'S': inputState.joystick2.left  = true; e.preventDefault(); break;
            case 'f': case 'F': inputState.joystick2.right = true; e.preventDefault(); break;
            case ' ': inputState.button2 = true; e.preventDefault(); break;
        }
    });

    window.addEventListener('keyup', (e) => {
        if (!vm || !vm.running) return;
        switch (e.key) {
            case 'ArrowUp':    inputState.joystick1.up    = false; break;
            case 'ArrowDown':  inputState.joystick1.down  = false; break;
            case 'ArrowLeft':  inputState.joystick1.left  = false; break;
            case 'ArrowRight': inputState.joystick1.right = false; break;
            case 'Meta':
                if (e.location === 2) {
                    inputState.button1 = false;
                    // macOS often swallows arrow keyup while Meta is held,
                    // so clear the whole j1 direction set defensively.
                    inputState.joystick1.up = false;
                    inputState.joystick1.down = false;
                    inputState.joystick1.left = false;
                    inputState.joystick1.right = false;
                }
                break;
            case 'e': case 'E': inputState.joystick2.up    = false; break;
            case 'd': case 'D': inputState.joystick2.down  = false; break;
            case 's': case 'S': inputState.joystick2.left  = false; break;
            case 'f': case 'F': inputState.joystick2.right = false; break;
            case ' ': inputState.button2 = false; break;
        }
    });
}
</script>
</body>
</html>
