<!-- user-scalable=no + maximum-scale=1 stop iOS from pinch-zooming the game
     surface. Without this the joystick hitboxes shift under the finger. -->

     image is a static snapshot from the bundled demo (the actual game
     preview varies at runtime; the card can't). Absolute URLs required
     for scrapers. Inherited by the exported HTML too — it snapshots

     branding, which is fine. -->

<style>
:root {
    --c64-black: #000;
    /* The bottom bar doubles as the C64-style bottom border, so the canvas
       has no padded frame of its own. Bar heights feed the canvas sizing
       math below — keep them here so the two stay in sync. The top bar
       is a thinner cosmetic strip (half the bottom) that frames the
       playfield symmetrically without stealing room for controls. */
    --bar-height: 44px;
    --top-height: 22px;

    /* #gameBorder's actual height — mirrors the canvas sizing formula so
       gmDiskPicker's responsive padding keys off the real available
       space rather than raw viewport height. The picker's CSS falls
       back to 100vh when this var isn't defined (editor pages don't). */
    --gameborder-h: min(75vw, calc(100vh - var(--bar-height) - var(--top-height)));
}
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--c64-black);
    color: #eee;
    font-family: system-ui, -apple-system, sans-serif;
    overflow: hidden;
    /* Stop iOS from rubber-banding when a finger drags the joystick past
       the visible edge. touch-action: none on body prevents the browser
       from claiming any gesture; game controls fully own touch input. */
    overscroll-behavior: contain;
    touch-action: none;
    /* Respect notches/home indicators in landscape when fullscreen. */
    padding: env(safe-area-inset-top) env(safe-area-inset-right)
             env(safe-area-inset-bottom) env(safe-area-inset-left);
    box-sizing: border-box;
}

body {
    display: flex;
    flex-direction: column;
}

/* Play area fills all vertical space above the bottom bar. min-height:0
   lets flex shrink it under content when the viewport is short (otherwise
   the canvas's intrinsic aspect-driven height would push the bar off-screen). */
#playArea {
    flex: 1;
    min-height: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}

/* Thin top border strip — cosmetic only. Frames the playfield above so
   the canvas isn't flush with the browser chrome. Half the bottom bar's
   height because it doesn't hold any controls. */
#topBar {
    height: var(--top-height);
    flex-shrink: 0;
    background: var(--c64-black);
}

/* Dedicated bottom border strip — the credit link, pause toggle, and
   audio indicator live here rather than overlaying the play field. */
#bottomBar {
    height: var(--bar-height);
    flex-shrink: 0;
    position: relative;
    background: var(--c64-black);
}

/* Canvas wrapper — no padding: the bottom bar acts as the bottom border,
   and the black body background surrounds the canvas on the other sides.
   Kept as an element mostly for structural symmetry with editor.html and
   in case we want to reintroduce a runtime-tinted border later.
   overflow: hidden clips the picker-overlay if the viewport is too small
   to fit the mini-screen at its minimum size — better than letting it
   spill outside the play area. */
#gameBorder {
    display: inline-block;
    position: relative;
    overflow: hidden;
}

/* Canvas scales to fit viewport while preserving the CRT-authentic 6:5
   display aspect. image-rendering keeps pixels crisp at any scale. */
#gameCanvas {
    display: block;
    /* C64 pixels aren't square — the CRT-authentic display aspect is 6:5
       (matches editor.html's 480×400 canvas over 320×200 native data),
       NOT the raw 8:5 of the pixel resolution. Using native pixel aspect
       here makes everything look horizontally stretched.

       Width is the min of (a) 90% of viewport width and (b) the width that
       fits vertically: (viewport height − top border − bottom bar) × 6/5.
       Without the vertical clamp, aspect-ratio would derive a height that
       overflows #playArea and the canvas would clip instead of scaling
       down on short viewports. */
    width: min(90vw, calc((100vh - var(--bar-height) - var(--top-height)) * 6 / 5));
    aspect-ratio: 6 / 5;
    height: auto;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    max-width: 960px;
    /* Never render smaller than the editor's canonical 480×400 canvas.
       Below this viewport size the canvas would otherwise scale further
       down; on desktop that turns into a tiny thumbnail nobody wants.
       On mobile we drop the min in the media query below so the game
       fits the screen (see editor.html for the same reasoning). */
    min-width: 480px;
}
/* Mobile: let the canvas shrink to fit. On a 375×812 landscape phone
   the 480 minimum forces overflow past the bottom of the viewport,
   hiding the game bar and touch controls. C64 native is 320×200 so
   anything ≥ that is still playable. */
@media (max-width: 900px), (max-height: 500px) {
    #gameCanvas {
        min-width: 0;
    }
}

/* Full-canvas overlay with the play button. Sits above the game until the
   user clicks — at which point the click both starts the VM and unlocks
   the AudioContext in the same gesture (browser autoplay policy). Hidden
   by default so it doesn't cover the drop-zone; add `.active` once a
   program is loaded and ready to play, or on an error we want to surface. */
#playOverlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.55);
    align-items: center;
    justify-content: center;
    z-index: 100;
    cursor: pointer;
}
#playOverlay.active { display: flex; }

#playButton {
    width: 96px;
    height: 96px;
    padding: 0;
    background: rgba(255, 255, 255, 0.12);
    border: 2px solid rgba(255, 255, 255, 0.8);
    border-radius: 50%;
    color: white;
    font-family: inherit;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
}
#playButton:hover:not(:disabled) { background: rgba(255, 255, 255, 0.22); }
#playButton:disabled {
    cursor: default;
    width: auto;
    height: auto;
    border-radius: 8px;
    padding: 12px 20px;
    font-size: 14px;
    opacity: 0.85;
}
#playButton svg { width: 44px; height: 44px; display: block; }

/* Right-side control cluster in the bottom bar. Visual order DOM=left→right:
   hamburger, pause, mute (audio indicator mounts last). */
#gameControls {
    position: absolute;
    right: 20px;
    bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
}

#gameControls button {
    width: 28px;
    height: 28px;
    background: rgba(0, 0, 0, 0.5);
    border: 1px solid rgba(255, 255, 255, 0.25);
    border-radius: 4px;
    cursor: pointer;
    color: rgba(255, 255, 255, 0.9);
    padding: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: inherit;
    transition: background 0.1s;
}
#gameControls button:hover { background: rgba(0, 0, 0, 0.75); }
#gameControls button svg { width: 100%; height: 100%; display: block; }

/* Audio indicator flexes with the other icons — override the shared
   CSS's default absolute positioning. */
#gameControls .gm-audio-indicator {
    position: static;
    bottom: auto;
    right: auto;
    width: 28px;
    height: 28px;
    padding: 4px;
}

/* Hamburger popup — opens above the bar, right-aligned. Houses the
   joystick preset selectors. */
#settingsPopup {
    display: none;
    position: absolute;
    bottom: calc(var(--bar-height) + 4px);
    right: 20px;
    background: rgba(0, 0, 0, 0.92);
    border: 1px solid rgba(255, 255, 255, 0.25);
    border-radius: 4px;
    padding: 12px;
    z-index: 10;
    min-width: 220px;
    color: rgba(255, 255, 255, 0.9);
    font-size: 12px;
}
#settingsPopup.active { display: block; }

#settingsPopup .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 8px;
}
#settingsPopup .row:last-child { margin-bottom: 0; }

#settingsPopup .settings-section-label {
    color: rgba(255, 255, 255, 0.55);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin: 0 0 4px 0;
}

#settingsPopup select {
    font-family: inherit;
    font-size: 12px;
    padding: 2px 4px;
    background: rgba(255, 255, 255, 0.1);
    color: rgba(255, 255, 255, 0.9);
    border: 1px solid rgba(255, 255, 255, 0.3);
}

/* Range input tuned to fit the dark hamburger popup. accent-color lets
   modern browsers restyle the track/thumb without a full custom shadow-
   DOM rebuild — good enough for a soft-launch. */
#settingsPopup input[type="range"] {
    width: 120px;
    accent-color: rgba(255, 255, 255, 0.85);
    cursor: pointer;
}

/* Subtle attribution corner. Suppressed when ?nocredit is in the URL. */
/* Credit link — anchored to the left of #bottomBar, vertically centred.
   No z-index needed: the bar sits below playArea entirely, so the play
   overlay (which lives inside playArea) never covers it. */
.credit {
    position: absolute;
    top: 50%;
    left: 20px;
    transform: translateY(-50%);
    color: rgba(255, 255, 255, 0.5);
    font-size: 12px;
    text-decoration: none;
    font-family: monospace;
}
.credit:hover { color: rgba(255, 255, 255, 0.9); }

/* === TOUCH CONTROLS OVERLAY ===
   Rendered by js/gmTouchControls.js. Positioned absolutely over
   #playArea so it floats atop the canvas. pointer-events on children
   only — a passthrough parent lets tap-anywhere-else behaviour still
   reach the underlying canvas (e.g. the play overlay). */
.gm-touch-overlay {
    position: absolute;
    inset: 0;
    z-index: 50;      /* under playOverlay(100), above canvas */
    pointer-events: none;
    touch-action: none;
}
.gm-touch-joystick,
.gm-touch-fire {
    position: absolute;
    pointer-events: auto;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
}
/* Left-anchored joystick base. Semi-translucent ring with a puck in the
   middle. Sized generously so it's usable with a thumb — thumb-friendly
   touch targets need ≥ 48pt/64px minimum, this is ~140. */
.gm-touch-joystick {
    left: 24px;
    bottom: 24px;
    width: 140px;
    height: 140px;
    border: 2px solid rgba(255, 255, 255, 0.25);
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.05);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.1s;
}
.gm-touch-joystick.gm-touch-active { background: rgba(255, 255, 255, 0.12); }
.gm-touch-joystick-puck {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.35);
    border: 2px solid rgba(255, 255, 255, 0.55);
    pointer-events: none;    /* parent handles the touches */
    transition: transform 0.05s linear;
}
/* Right-anchored fire button. Round, large, tinted red for at-a-glance
   recognition. Pressed state darkens without shifting position. */
.gm-touch-fire {
    right: 24px;
    bottom: 40px;
    width: 96px;
    height: 96px;
    border-radius: 50%;
    background: rgba(200, 40, 40, 0.35);
    border: 2px solid rgba(255, 255, 255, 0.55);
    color: rgba(255, 255, 255, 0.85);
    font-size: 42px;
    line-height: 92px;
    text-align: center;
    transition: background 0.05s;
}
.gm-touch-fire.gm-touch-active { background: rgba(200, 40, 40, 0.65); }

/* === PHONE LAYOUT MODE ===
   When body.mobile-phone is set (by JS at init after device detection):
     - top + bottom bars collapse to zero so the canvas fills the viewport
     - credit link + hamburger + volume popup are hidden (real estate)
     - canvas grows past its normal min-width limit and drops the 6:5
       aspect ratio in favour of contain-fit on the phone screen. */
body.mobile-phone #topBar { display: none; }
body.mobile-phone #bottomBar {
    height: 0;
    /* Keep positioned children (settings popup) but hide the bar itself. */
    background: transparent;
}
body.mobile-phone .credit,
body.mobile-phone #hamburgerBtn,
body.mobile-phone #settingsPopup { display: none !important; }
/* Canvas fills phone viewport, preserving 6:5 aspect but no min-width. */
body.mobile-phone #gameCanvas {
    width: min(100vw, calc(100vh * 6 / 5));
    height: min(100vh, calc(100vw * 5 / 6));
    max-width: none;
    min-width: 0;
}
/* On a phone we want the game controls (pause, fullscreen, mute)
   floating in the top-right rather than fighting for the bottom bar. */
body.mobile-phone #gameControls {
    top: 8px;
    right: 8px;
    bottom: auto;
    z-index: 60;
    opacity: 0.55;
}
body.mobile-phone #gameControls:hover { opacity: 1; }
</style>
</head>
<body>
<!-- Thin cosmetic top border strip; no interactive content. -->
<div id="topBar"></div>
<div id="playArea">
    <div id="gameBorder">
        <canvas id="gameCanvas" width="320" height="200"></canvas>
        <!-- audio indicator mounts here on first play -->
    </div>
    <div id="playOverlay">
        <button id="playButton" type="button" aria-label="Play">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M7 5 L19 12 L7 19 Z"
                      fill="currentColor"
                      stroke="currentColor"
                      stroke-width="3"
                      stroke-linejoin="round"
                      stroke-linecap="round"/>
            </svg>
        </button>
    </div>
    <!-- GMDiskPicker mounts its overlay here at init time (state managed
         from JS: drop-zone → program-picker → error). -->
</div>
<!-- Bottom border strip. Holds the credit link, control cluster (hamburger,
     pause, audio indicator), and the settings popup (opens above the bar).
     Sits below #playArea in the flex column, so the play overlay never
     covers these controls. -->
<div id="bottomBar">
    <a class="credit" href="https://gmc64.com" target="_blank" rel="noopener">gmc64.com</a>
    <!-- Hamburger, pause, fullscreen, audio-indicator (mounted). Hidden
         until first play. On phone layout mode the hamburger is hidden. -->
    <div id="gameControls" style="display: none;">
        <button id="hamburgerBtn" type="button" aria-label="Settings">
            <!-- icon injected in init() -->
        </button>
        <button id="pauseToggle" type="button" aria-label="Pause">
            <!-- icon injected on first pause state change -->
        </button>
        <button id="fullscreenToggle" type="button" aria-label="Fullscreen">
            <!-- fullscreen icon; toggles between "enter" and "exit" glyph
                 based on document.fullscreenElement -->
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M4 9 L4 4 L9 4 M15 4 L20 4 L20 9 M20 15 L20 20 L15 20 M9 20 L4 20 L4 15"
                      fill="none" stroke="currentColor" stroke-width="2"
                      stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>
        <!-- audio indicator mounts here at first play -->
    </div>
    <div id="settingsPopup">
        <div class="settings-section-label">Audio</div>
        <div class="row">
            <label>Volume</label>
            <input type="range" id="volumeSlider" min="0" max="100" step="1" value="75">
        </div>
        <div class="settings-section-label">Controls</div>
        <div class="row">
            <label>Joystick 1</label>
            <select id="joy1Sel"></select>
        </div>
        <div class="row">
            <label>Joystick 2</label>
            <select id="joy2Sel"></select>
        </div>
    </div>
</div>

<!-- Runtime files. play.html deliberately does NOT include:
       - editor JS (instruction picker, arg editing, save/load UI, …)
       - standalone-source.js (only needed by editor's Export Game flow)
       - demo-disk-source.js (only relevant to editor's demo shortcut) -->
<script src="js/c64lib.js"></script>
<script src="js/c64Screen.js"></script>
<script src="js/d64lib.js"></script>
<script src="js/gmDisk.js"></script>
<script src="js/gmTools.js"></script>
<script src="js/gmOpcodes.js"></script>
<script src="js/gmSprite.js"></script>
<script src="js/gmScene.js"></script>
<script src="js/gmSound.js"></script>
<script src="js/gmMusic.js"></script>
<script src="js/gmCharset.js"></script>
<script src="js/gmParser.js"></script>
<script src="js/gmRuntime.js"></script>
<script src="js/gmAudioIndicator.js"></script>
<script src="js/gmPoster.js"></script>
<script src="js/gmPlayerChrome.js"></script>
<script src="js/gmDiskPicker.js"></script>
<script src="js/gmTouchControls.js"></script>

<script>
// Chrome-free game player. Two run modes:
//
//   1. URL-driven — normal use. `?disk=<url>&file=<name>` fetches a .d64
//      and picks a program off it. Shows a play-button overlay; the
//      click starts the VM and unlocks the AudioContext (autoplay-policy
//      compliant).
//
//   2. Embedded — the editor's "Export Game" flow patches the two
//      EMBEDDED_ consts below with base64-encoded PRG + D64 bytes. When
//      those aren't null, we skip the URL fetch entirely and decode the
//      bytes locally. That's how the exported HTML is *literally*
//      play.html with two strings changed — one source of truth for the
//      player. See tools/bundle-standalone.js for the build path.
//
// URL params (mode 1 only, plus these two which work in both modes):
//   disk            .d64 URL, or the magic word `demo` for the bundled demo
//   file            program name on the disk (case-insensitive)
//   nocredit=1      hides the gmc64.com corner link (must be exactly "1")
//   poster_seconds  how long to simulate the game before rendering the
//                   preview frame behind the play button. Default: 2.
//                   Max: 10. Decimals allowed (rounded to 0.01s). `=0`
//                   skips the poster entirely — canvas stays black.

// Populated at Export time via string replacement — see
// tools/bundle-standalone.js. Stay `null` in normal play.html use;
// the exported HTML has them as base64 strings.
const EMBEDDED_PRG = null;
const EMBEDDED_D64 = null;

const disk = new GMDisk('player');
let audioContext = null;
let masterGain = null;
let vm = null;
let screen = null;
let charset = null;
let audioIndicator = null;
let currentProgramData = null;
let currentFileData = null;
let currentFileName = null;
let animationFrameToggle = false;

// User volume 0..1. Shared localStorage key across editor + player so a
// user's preference travels between the two contexts. Default: comfortable
// mid-range so first-visit isn't loud, isn't silent.
const VOLUME_KEY = 'gmc64-volume';
let userVolume = parseFloat(localStorage.getItem(VOLUME_KEY));
if (!isFinite(userVolume) || userVolume < 0 || userVolume > 1) userVolume = 0.75;

// SFX_BASELINE is the pre-user-volume gain the host masterGain was pinned
// at before we introduced the slider. Keep it as the "100% user volume"
// ceiling so cranking to 100 doesn't blow out ears vs the old default.
const SFX_BASELINE = 0.3;
// Handle to the mounted GMDiskPicker (assigned in init).
let picker = null;
// Handle to the mounted touch controls (null until startGame, no-op on desktop).
let touchControls = null;

// Input preset settings — persisted in localStorage. Different key from
// the editor so per-context choices don't leak between them.
const INPUT_SETTINGS_KEY = 'gmc64-player-input';
let inputSettings = GMPlayerChrome.loadInputSettings(
    INPUT_SETTINGS_KEY, GMPlayerChrome.DEFAULT_INPUT_SETTINGS);

// Input state read by gmRuntime. Same shape as editor.html.
const inputState = {
    joystick1: { up: false, down: false, left: false, right: false },
    joystick2: { up: false, down: false, left: false, right: false },
    button1: false,
    button2: false
};

function decode16bit(lo, hi) { return lo + (hi << 8); }

window.addEventListener('DOMContentLoaded', init);

async function init() {
    charset = new gmCharset();

    if (new URLSearchParams(location.search).get('nocredit') === '1') {
        document.querySelector('.credit').style.display = 'none';
    }

    // Tag body with phone-layout class before any layout math runs so
    // gameborder-h resolves against the mobile CSS from the first paint.
    // Tablets keep the desktop layout (they have room for chrome).
    if (GMTouchControls.isPhoneLayout()) {
        document.body.classList.add('mobile-phone');
    }

    // Populate hamburger button icon (declared as empty in HTML). Pause
    // icon initialized on first play state change.
    document.getElementById('hamburgerBtn').innerHTML = GMPlayerChrome.ICONS.hamburger;

    populateJoystickSelects();
    setupVolumeSlider();

    // Mount the shared disk picker inside the game border. Window-level
    // drops are enabled here too so someone with a game already loaded
    // can drag a fresh .d64 to swap games.
    picker = GMDiskPicker.mount(document.getElementById('gameBorder'), {
        extension: '/PRG',
        // Promote dropped disks into the shared localStorage pool + make
        // them the current disk. Other editors see the same pool.
        disk,
        windowDropEnabled: true,
        onPickFile: (name, bytes, d64 /*, diskLabel */) => {
            // gmParser needs loadFileByName to resolve multi-part sprite
            // references etc. — module wired it too, but re-set here so
            // we're consistent regardless of code path.
            globalThis.loadFileByName = (n) => {
                try { return d64.readFile(n); } catch (e) { return null; }
            };
            proceedWithProgram(name, bytes);
        }
    });

    document.getElementById('hamburgerBtn').addEventListener('click', toggleSettingsPopup);
    document.getElementById('playOverlay').addEventListener('click', startGame);
    document.getElementById('fullscreenToggle').addEventListener('click', toggleFullscreen);
    // Refresh fullscreen icon when the state actually changes (Escape key,
    // browser gesture) so it doesn't stick showing "enter fullscreen"
    // after the user has exited via a native path.
    document.addEventListener('fullscreenchange', refreshFullscreenIcon);
    document.addEventListener('webkitfullscreenchange', refreshFullscreenIcon);
    refreshFullscreenIcon();

    // Shared input listener — gates on vm being present and running so
    // key presses before start / after end don't leak into inputState.
    GMPlayerChrome.setupInputListeners({
        inputState,
        getPresets: () => inputSettings,
        isEnabled: () => vm && vm.running
    });

    // Close settings popup on click-outside or Escape.
    document.addEventListener('click', (e) => {
        const popup = document.getElementById('settingsPopup');
        if (!popup.classList.contains('active')) return;
        const burger = document.getElementById('hamburgerBtn');
        if (!popup.contains(e.target) && !burger.contains(e.target)) {
            popup.classList.remove('active');
        }
    });
    document.addEventListener('keydown', (e) => {
        if (e.key !== 'Escape') return;
        const popup = document.getElementById('settingsPopup');
        if (popup.classList.contains('active')) popup.classList.remove('active');
    });

    await loadGame();
}

function toggleSettingsPopup(e) {
    if (e) e.stopPropagation();   // don't trip the click-outside handler
    document.getElementById('settingsPopup').classList.toggle('active');
}

// Volume slider — reads current userVolume, applies changes to both
// audio paths (SFX via host masterGain, music via vm.setConfig →
// _effectiveSongVolume), persists on 'input' so drags feel live.
function setupVolumeSlider() {
    const slider = document.getElementById('volumeSlider');
    slider.value = Math.round(userVolume * 100);
    slider.addEventListener('input', () => {
        userVolume = slider.value / 100;
        localStorage.setItem(VOLUME_KEY, String(userVolume));
        if (masterGain) masterGain.gain.value = SFX_BASELINE * userVolume;
        if (vm) vm.setConfig({ userVolume });
    });
}

// Fill the joy1/joy2 dropdowns from the shared PRESET_LABELS. Runs once
// at init. Selecting either dropdown updates inputSettings + persists.
function populateJoystickSelects() {
    for (const which of ['joy1', 'joy2']) {
        const sel = document.getElementById(which + 'Sel');
        sel.innerHTML = '';
        for (const [value, label] of GMPlayerChrome.PRESET_LABELS) {
            const opt = document.createElement('option');
            opt.value = value;
            opt.textContent = label;
            sel.appendChild(opt);
        }
        sel.value = inputSettings[which];
        sel.addEventListener('change', () => {
            inputSettings = { ...inputSettings, [which]: sel.value };
            GMPlayerChrome.saveInputSettings(INPUT_SETTINGS_KEY, inputSettings);
        });
    }
}

// Three entry modes:
//   1. Embedded (Export): EMBEDDED_PRG / EMBEDDED_D64 populated → skip
//      URL params entirely, decode bytes, jump straight to poster + play.
//   2. URL-driven: `?disk=<url>` present. `file=` optional — missing
//      falls back to auto-load (one PRG) or the program picker (2+).
//   3. Bare visit (no disk, no embedded): show the drop-zone so the
//      visitor can drop their own .d64.
async function loadGame() {
    if (EMBEDDED_PRG && EMBEDDED_D64) {
        const d64Bytes = _b64ToBytes(EMBEDDED_D64);
        const prgBytes = _b64ToBytes(EMBEDDED_PRG);
        const embeddedDisk = new D64(d64Bytes);
        globalThis.loadFileByName = (name) => {
            try { return embeddedDisk.readFile(name); } catch (e) { return null; }
        };
        proceedWithProgram('<embedded>', prgBytes);
        return;
    }

    const params = new URLSearchParams(location.search);
    if (!params.has('disk')) {
        picker.showDropZone();
        return;
    }

    const ok = await GMTools.loadDiskFromUrl({
        diskUrl: params.get('disk'), disk
    });
    if (!ok) {
        showPlayButtonError('invalid disk');
        return;
    }

    // gmParser needs this to compose multi-part sprites that reference
    // other files on the disk. Set up before any PRG parsing.
    globalThis.loadFileByName = (name) => disk.disk.readFile(name);

    const fileName = params.get('file');
    if (!fileName) {
        // No specific file requested — enumerate PRGs and auto-load if
        // there's only one, or hand off to the picker for multiple.
        const prgs = GMTools.listFilesByExtension(disk.disk, '/PRG');
        if (prgs.length === 0) {
            showPlayButtonError('no programs on disk');
            return;
        }
        if (prgs.length === 1) {
            proceedWithProgram(prgs[0], disk.disk.readFile(prgs[0]));
            return;
        }
        picker.showProgramPicker(disk.disk, prgs, disk.diskFileName || params.get('disk'));
        return;
    }

    const actualName = GMTools.findFileCaseInsensitive(disk.disk, fileName);
    if (!actualName) {
        showPlayButtonError('invalid file');
        return;
    }
    if (!actualName.toUpperCase().endsWith('/PRG')) {
        showPlayButtonError('invalid file type');
        return;
    }

    const fileData = disk.disk.readFile(actualName);
    if (!fileData) {
        showPlayButtonError('invalid file');
        return;
    }

    proceedWithProgram(actualName, fileData);
}

// Once we have a name + bytes for the program we want to run, this
// commits it, kicks off the poster, and reveals the play button.
// Shared by all three entry modes (embedded, URL, drop).
function proceedWithProgram(name, bytes) {
    currentFileName = name;
    currentFileData = bytes;
    currentProgramData = parseProgramData(bytes);
    picker.hide();
    document.getElementById('playOverlay').classList.add('active');
    // Fire-and-forget — a poster failure never blocks the play button.
    generatePoster();
}

// Decode a base64 string to a Uint8Array. Chunk-loop because atob
// returns a binary string and we need byte codes.
function _b64ToBytes(b64) {
    const bin = atob(b64);
    const out = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
    return out;
}

function showPlayButtonError(text) {
    const btn = document.getElementById('playButton');
    btn.textContent = text;
    btn.disabled = true;
    btn.setAttribute('aria-label', text);
    // The play overlay is hidden by default now — surface it so the
    // error message is actually visible.
    document.getElementById('playOverlay').classList.add('active');
}

// The play button is the user gesture that both starts the VM and
// unlocks the AudioContext. Everything audio-related happens inside
// this handler so browser autoplay policies stay satisfied.
async function startGame() {
    if (!currentProgramData) return;
    document.getElementById('playOverlay').classList.remove('active');

    if (!screen) screen = new c64Screen('gameCanvas');
    if (!vm) vm = new gmVM(screen);

    if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioContext.createGain();
        masterGain.gain.value = SFX_BASELINE * userVolume;
        masterGain.connect(audioContext.destination);
    }
    if (audioContext.state === 'suspended') {
        audioContext.resume();
    }

    // Push the persisted user volume into the fresh vm's config so the
    // very first song starts at the right level (rather than defaulting
    // to 1.0 and then getting corrected on the first slider tick).
    vm.setConfig({ userVolume });

    if (!audioIndicator) {
        // Mount inside #gameControls so it flexes with the other icons.
        // (The shared CSS defaults the indicator to position:absolute; our
        // #gameControls .gm-audio-indicator override neutralises that.)
        audioIndicator = new GMAudioIndicator(document.getElementById('gameControls'));
        audioIndicator.bind({
            getMuted: () => vm.config.audioMuted,
            setMuted: (muted) => vm.setConfig({ audioMuted: muted }),
            getAudioContext: () => audioContext,
            onUnlock: () => {
                if (vm && vm.currentSong) {
                    try {
                        vm.currentSong.stop();
                        vm.currentSong.play();
                        vm.currentSong.setVolume(vm._effectiveSongVolume());
                    } catch (e) {
                        console.warn('Failed to restart song after audio unlock:', e.message);
                    }
                }
            }
        });
    }

    // Reveal the control cluster (hidden until first play) and wire the
    // pause button once. Icon reflects current vm.paused state.
    document.getElementById('gameControls').style.display = '';
    const pauseBtn = document.getElementById('pauseToggle');
    if (!pauseBtn.dataset.wired) {
        pauseBtn.dataset.wired = '1';
        pauseBtn.addEventListener('click', togglePause);
    }

    // Mount touch controls on the play area (idempotent — no-op on desktop
    // and if already mounted). We wait until startGame rather than mounting
    // in init so the joystick doesn't appear on top of the play overlay.
    if (!touchControls) {
        touchControls = GMTouchControls.mount(
            document.getElementById('playArea'),
            { inputState, port: 1 });
    }

    // Re-parse so the real run gets a fresh mediaStore, unmutated by
    // whatever the poster VM did.
    const programData = parseProgramData(currentFileData);
    const ast = buildAST(programData);
    vm.loadProgram(ast, currentFileData);
    // frameMs pinned to NTSC C64 rate (59.94Hz), catchup on so game speed
    // is wall-clock consistent even under browser throttling.
    vm.start({ opsPerFrame: 50, frameMs: 1000 / 59.94, catchup: true });
    GMPlayerChrome.setPauseIcon(pauseBtn, false);
}

function togglePause() {
    if (!vm) return;
    if (vm.paused) vm.resume();
    else vm.pause();
    GMPlayerChrome.setPauseIcon(document.getElementById('pauseToggle'), vm.paused);
}

// Fullscreen toggle — targets documentElement so the game AND any floating
// touch controls both scale into the fullscreen box. Uses webkit prefix
// as fallback for iPad Safari, which supports Fullscreen API only under
// that name. iOS iPhone Safari doesn't support it at all (silent no-op).
function toggleFullscreen() {
    const el = document.documentElement;
    if (document.fullscreenElement || document.webkitFullscreenElement) {
        (document.exitFullscreen || document.webkitExitFullscreen).call(document);
    } else {
        const req = el.requestFullscreen || el.webkitRequestFullscreen;
        if (req) req.call(el);
    }
}

function refreshFullscreenIcon() {
    const btn = document.getElementById('fullscreenToggle');
    if (!btn) return;
    const active = !!(document.fullscreenElement || document.webkitFullscreenElement);
    // "Enter" icon: outward arrows. "Exit" icon: inward arrows. Chosen for
    // shape recognition rather than reading — the fine strokes render fine
    // even in the reduced-opacity mobile chrome.
    btn.innerHTML = active
        ? `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
             <path d="M9 4 L9 9 L4 9 M15 4 L15 9 L20 9 M20 15 L15 15 L15 20 M4 15 L9 15 L9 20"
                   fill="none" stroke="currentColor" stroke-width="2"
                   stroke-linecap="round" stroke-linejoin="round"/>
           </svg>`
        : `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
             <path d="M4 9 L4 4 L9 4 M15 4 L20 4 L20 9 M20 15 L20 20 L15 20 M9 20 L4 20 L4 15"
                   fill="none" stroke="currentColor" stroke-width="2"
                   stroke-linecap="round" stroke-linejoin="round"/>
           </svg>`;
}

// Kick off a poster render on the game canvas. Screen has to exist first
// so the temp VM has something to draw on. Fire-and-forget — a poster
// failure never blocks the user from starting the game.
async function generatePoster() {
    if (!screen) screen = new c64Screen('gameCanvas');
    const params = new URLSearchParams(location.search);
    await GMPoster.generatePoster({
        screen,
        fileData: currentFileData,
        posterSeconds: GMPoster.getPosterSeconds(params)
    });
}

</script>
