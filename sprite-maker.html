// ==================== LOAD MODE ====================
// Cycling / keyboard / yes-no prompt UI is handled by GMTools.previewLoader.
// This wrapper just supplies the sprite-specific preview rendering and the
// save/restore-state hooks, plus syncs a few fields back into loadMode so the
// existing click guards (`if (loadMode.active) return`) and tests keep working.

function enterLoadMode() {
    // Snapshot of everything that needs to come back if the user cancels.
    const snapshot = {
        sprite: currentSprite,
        fileName: currentSpriteFileName,
        setupState: { ...setupState },
        // The palette lives on the sprite itself, so the sprite reference
        // already preserves it for restore. Snapshot the array anyway for
        // any test/UI code that inspects loadMode.savedSpriteColors.
        spriteColors: currentSprite ? currentSprite.getPalette() : [...DEFAULT_SPRITE_COLORS],
        currentFrame,
        currentQuad
    };

    const entered = GMTools.previewLoader.enter({
        disk,
        fileType: GMDisk.FILE_TYPES.SPRITE,
        messageArea: document.getElementById('messageArea'),
        emptyMessage: 'no sprites on disk',
        saveState: () => snapshot,
        onPreview: (fileName, fileData) => {
            try {
                const previewSprite = new gmSprite(fileData);
                loadMode.previewSprite = previewSprite;
                currentSprite = previewSprite;
                currentFrame = 0;
                currentQuad = 0;

                const header = currentSprite.sprite[0];
                setupState.isMultiColor = header.isMultiColor;
                setupState.vMag = header.yDouble;
                setupState.hMag = header.xDouble;
                setupState.numSprites = header.numSprites;

                rebuildFatBitsGrid();
                loadQuadPixelData();
                updateFatBits();
                updatePaletteDisplay();
                updatePaletteForColorMode();
                updatePreview();
                startLoadAnimation();

                // Mirror framework state into loadMode for click guards & tests
                loadMode.spriteFiles = GMTools.previewLoader.files();
                loadMode.currentIndex = GMTools.previewLoader.currentIndex();
            } catch (e) {
                console.error('Failed to preview sprite:', e);
            }
        },
        onConfirm: (fileName) => {
            currentSpriteFileName = fileName;
            // No animaMode writes — anima end is on the sprite and start
            // resets to 1 inside enterAnimaMode.
        },
        onCancel: (saved) => {
            currentSprite = saved.sprite;
            currentSpriteFileName = saved.fileName;
            currentFrame = saved.currentFrame;
            currentQuad = saved.currentQuad;

            setupState.isMultiColor = saved.setupState.isMultiColor;
            setupState.vMag = saved.setupState.vMag;
            setupState.hMag = saved.setupState.hMag;
            setupState.numSprites = saved.setupState.numSprites;

            // Sprite reference restored above already carries its palette.
            // No separate restore needed — the palette is sprite-owned now.

            if (currentSprite) {
                rebuildFatBitsGrid();
                loadQuadPixelData();
                updateFatBits();
                updatePaletteDisplay();
                updatePaletteForColorMode();
                updatePreview();
            }
        },
        onExit: () => {
            // Stop the load-mode animation loop
            if (loadMode.animationId) {
                cancelAnimationFrame(loadMode.animationId);
                loadMode.animationId = null;
            }
            // Reset the mirror
            loadMode.active = false;
            loadMode.spriteFiles = [];
            loadMode.currentIndex = 0;
            loadMode.previewSprite = null;
            loadMode.savedSprite = null;
            loadMode.savedFileName = null;
            loadMode.savedSetupState = null;
            loadMode.savedSpriteColors = null;
            // Drop back out of the file menu too
            exitFileMenuMode();
        }
    });

    if (!entered) return; // empty disk — previewLoader already flashed the message

    // Mirror state into loadMode so guards/tests can observe it
    loadMode.active = true;
    loadMode.savedSprite = snapshot.sprite;
    loadMode.savedFileName = snapshot.fileName;
    loadMode.savedSetupState = snapshot.setupState;
    loadMode.savedSpriteColors = snapshot.spriteColors;
    loadMode.savedCurrentFrame = snapshot.currentFrame;
    loadMode.savedCurrentQuad = snapshot.currentQuad;

    // Blank toolbar buttons except 'load' (matches anima-mode behaviour)
    document.getElementById('btn1').innerHTML = '&nbsp;';
    document.getElementById('btn2').innerHTML = '&nbsp;';
    document.getElementById('btn4').innerHTML = '&nbsp;';
    document.getElementById('btn5').innerHTML = '&nbsp;';
    document.getElementById('btn6').innerHTML = '&nbsp;';
}

function startLoadAnimation() {
    // Stop any existing animation
    if (loadMode.animationId) {
        cancelAnimationFrame(loadMode.animationId);
    }

    loadMode.currentFrame = 0;
    loadMode.lastFrameTime = performance.now();

    function animateLoad(timestamp) {
        if (!loadMode.active) return;

        // Animation speed 28: frame delay = (32 - 28) * 33 = 132ms
        const frameDelay = (32 - 28) * 33;

        if (timestamp - loadMode.lastFrameTime >= frameDelay) {
            loadMode.lastFrameTime = timestamp;

            // Advance frame
            const numFrames = currentSprite ? currentSprite.getNumFrames() : 1;
            loadMode.currentFrame = (loadMode.currentFrame + 1) % numFrames;

            // Update preview with animated frame
            updateAnimatedLoadPreview();
        }

        loadMode.animationId = requestAnimationFrame(animateLoad);
    }

    loadMode.animationId = requestAnimationFrame(animateLoad);
}

function updateAnimatedLoadPreview() {
    if (!currentSprite || !previewScreen) return;

    // Clear to transparent - sprites render over the background block
    previewScreen.clearTransparent();

    // Get sprite position (in fat pixel space, normalized by gmSprite at load time)
    const gmX = (currentSprite.sprite[0].xPosition || 0) + 12;
    const gmY = (currentSprite.sprite[0].yPosition || 0) + 50;

    // Render sprite at the current animation frame
    currentSprite.blitToBuffer(
        previewScreen.pixels,
        c64Screen.WIDTH,
        c64Screen.HEIGHT,
        gmX,
        gmY,
        loadMode.currentFrame
    );

    previewScreen.present();
}

// ==================== SAVE MODE ====================
// Thin wrapper over GMTools.saveDialog — sprite-maker provides the empty-disk
// pre-check, button blanking, and per-tool serialise/restore via callbacks.

function enterSaveMode() {
    if (!currentSprite) {
        GMTools.flashingMessage.show(
            document.getElementById('messageArea'),
            'no sprite to save'
        );
        const dismissHandler = () => {
            GMTools.flashingMessage.hide();
            clearMessage();
            document.removeEventListener('click', dismissHandler, true);
        };
        document.addEventListener('click', dismissHandler, true);
        return;
    }

    saveMode.active = true;

    // Blank out toolbar buttons; save label stays visible
    document.getElementById('btn1').innerHTML = '&nbsp;';
    document.getElementById('btn2').innerHTML = '&nbsp;';
    document.getElementById('btn3').innerHTML = '&nbsp;';
    document.getElementById('btn5').innerHTML = '&nbsp;';
    document.getElementById('btn6').innerHTML = '&nbsp;';

    GMTools.saveDialog.enter({
        disk,
        fileType: GMDisk.FILE_TYPES.SPRITE,
        messageArea: document.getElementById('messageArea'),
        suggestedName: currentSpriteFileName
            ? currentSpriteFileName.replace(/\/SPR$/i, '').trim()
            : '',
        // Same path as the d64 popup's Save button — single source of truth
        // for serialization (strips trailing blank frames via serializeSprite)
        // and disk write.
        onSave: saveSprite,
        onExit: () => {
            saveMode.active = false;
            saveMode.confirmingOverwrite = false;
            exitFileMenuMode();
        }
    });
}

// confirmSave is referenced by sprite-save.test.js to drive the save flow
// from test scripts; the dialog owns the actual implementation. The mirror
// keeps saveMode.confirmingOverwrite in sync for any sprite-maker code that
// observes it.
function confirmSave() {
    GMTools.saveDialog.confirm();
    saveMode.confirmingOverwrite = GMTools.saveDialog.confirmingOverwrite();
}

// Flip and shift are "any-click-exits" modes: the user is committing to a
// transient gesture (use arrow keys), and any click on the canvas, palette,
// or empty space should treat that click as "I'm done". Returns true if a
// mode was exited so callers can skip their own action (e.g. cellMouseDown
// shouldn't ALSO draw the pixel the user clicked to exit on).
//
// Buttons stay clickable but their own onclick guards refuse during these
// modes — so clicks on btn1/3/4/5/6/7/8 quietly do nothing as before.
function _exitTransientCmdSubmode() {
    if (flipMode.active)  { exitFlipMode();  return true; }
    if (shiftMode.active) { exitShiftMode(); return true; }
    return false;
}

// ==================== FLIP MODE ====================

function enterFlipMode() {
    flipMode.active = true;

    // Show flip message
    showMessage('flip graphics using arrow keys');

    // Blank out other buttons, keep only flip and ok
    document.getElementById('btn1').textContent = 'flip';
    document.getElementById('btn2').textContent = 'ok';
    document.getElementById('btn3').innerHTML = '&nbsp;';
    document.getElementById('btn4').innerHTML = '&nbsp;';
    document.getElementById('btn5').innerHTML = '&nbsp;';
    document.getElementById('btn6').innerHTML = '&nbsp;';
    _blankCmdExtraRow();

    document.addEventListener('keydown', flipKeyHandler);
}

function exitFlipMode() {
    flipMode.active = false;

    // Clear message
    clearMessage();

    // Exit cmd mode as well (clicking ok in flip mode exits both)
    exitCmdMode();

    document.removeEventListener('keydown', flipKeyHandler);
}

function flipKeyHandler(e) {
    if (!flipMode.active) return;

    switch (e.key) {
        case 'ArrowLeft':
        case 'ArrowRight':
            flipAllQuadsHorizontal();
            e.preventDefault();
            break;
        case 'ArrowUp':
        case 'ArrowDown':
            flipAllQuadsVertical();
            e.preventDefault();
            break;
        case 'Enter':
        case 'Escape':
            exitFlipMode();
            e.preventDefault();
            break;
    }
}

function flipAllQuadsHorizontal() {
    if (!currentSprite) return;

    // Flip all quads horizontally (current frame only)
    for (let q = 0; q < currentSprite.sprite.length; q++) {
        const quad = currentSprite.sprite[q];
        if (!quad.imageData) continue;

        flipImageDataHorizontal(quad.imageData[currentFrame], quad.isMultiColor);
    }

    // Reload pixel data and update display
    loadQuadPixelData();
    updateFatBits();
    updatePreview();
}

function flipAllQuadsVertical() {
    if (!currentSprite) return;

    // Flip all quads vertically (current frame only)
    for (let q = 0; q < currentSprite.sprite.length; q++) {
        const quad = currentSprite.sprite[q];
        if (!quad.imageData) continue;

        flipImageDataVertical(quad.imageData[currentFrame]);
    }

    // Reload pixel data and update display
    loadQuadPixelData();
    updateFatBits();
    updatePreview();
}

function flipImageDataHorizontal(imageData, isMultiColor) {
    // Each row is 3 bytes
    // In multicolor: 4 pixel pairs per byte (2 bits each)
    // In hi-res: 8 pixels per byte (1 bit each)

    for (let row = 0; row < 21; row++) {
        const offset = row * 3;
        const byte0 = imageData[offset];
        const byte1 = imageData[offset + 1];
        const byte2 = imageData[offset + 2];

        if (isMultiColor) {
            // Multicolor: reverse the 2-bit pairs within each byte, then swap bytes
            // Byte has 4 pairs: [p0 p1 p2 p3] becomes [p3 p2 p1 p0]
            const rev0 = reverseBitPairs(byte2);
            const rev1 = reverseBitPairs(byte1);
            const rev2 = reverseBitPairs(byte0);

            imageData[offset] = rev0;
            imageData[offset + 1] = rev1;
            imageData[offset + 2] = rev2;
        } else {
            // Hi-res: reverse bits within each byte, then swap bytes
            const rev0 = reverseBits(byte2);
            const rev1 = reverseBits(byte1);
            const rev2 = reverseBits(byte0);

            imageData[offset] = rev0;
            imageData[offset + 1] = rev1;
            imageData[offset + 2] = rev2;
        }
    }
}

function flipImageDataVertical(imageData) {
    // Swap rows (each row is 3 bytes)
    for (let row = 0; row < 10; row++) {
        const topOffset = row * 3;
        const bottomOffset = (20 - row) * 3;

        // Swap the 3 bytes
        for (let i = 0; i < 3; i++) {
            const temp = imageData[topOffset + i];
            imageData[topOffset + i] = imageData[bottomOffset + i];
            imageData[bottomOffset + i] = temp;
        }
    }
}

function reverseBitPairs(byte) {
    // Reverse 2-bit pairs: [p0 p1 p2 p3] -> [p3 p2 p1 p0]
    const p0 = (byte >> 6) & 0x03;
    const p1 = (byte >> 4) & 0x03;
    const p2 = (byte >> 2) & 0x03;
    const p3 = byte & 0x03;
    return (p3 << 6) | (p2 << 4) | (p1 << 2) | p0;
}

function reverseBits(byte) {
    // Reverse all 8 bits
    let result = 0;
    for (let i = 0; i < 8; i++) {
        result |= ((byte >> i) & 1) << (7 - i);
    }
    return result;
}

// ==================== SHIFT MODE ====================

function enterShiftMode() {
    shiftMode.active = true;

    // Show shift message
    showMessage('shift graphics using arrow keys');

    // Blank out other buttons, keep only shift and ok
    document.getElementById('btn1').innerHTML = '&nbsp;';
    document.getElementById('btn2').textContent = 'ok';
    document.getElementById('btn3').innerHTML = '&nbsp;';
    document.getElementById('btn4').innerHTML = '&nbsp;';
    // btn5 stays as 'shift'
    document.getElementById('btn6').innerHTML = '&nbsp;';
    _blankCmdExtraRow();

    document.addEventListener('keydown', shiftKeyHandler);
}

function exitShiftMode() {
    shiftMode.active = false;

    // Clear message
    clearMessage();

    // Exit cmd mode as well
    exitCmdMode();

    document.removeEventListener('keydown', shiftKeyHandler);
}

function shiftKeyHandler(e) {
    if (!shiftMode.active) return;

    switch (e.key) {
        case 'ArrowLeft':
            shiftAllQuadsHorizontal(1);
            e.preventDefault();
            break;
        case 'ArrowRight':
            shiftAllQuadsHorizontal(-1);
            e.preventDefault();
            break;
        case 'ArrowUp':
            shiftAllQuadsVertical(-1);
            e.preventDefault();
            break;
        case 'ArrowDown':
            shiftAllQuadsVertical(1);
            e.preventDefault();
            break;
        case 'Enter':
        case 'Escape':
            exitShiftMode();
            e.preventDefault();
            break;
    }
}

function shiftAllQuadsHorizontal(direction) {
    if (!currentSprite) return;

    const isMultiColor = currentSprite.sprite[0].isMultiColor;

    // Shift all quads horizontally (current frame only)
    for (let q = 0; q < currentSprite.sprite.length; q++) {
        const quad = currentSprite.sprite[q];
        if (!quad.imageData) continue;

        shiftImageDataHorizontal(quad.imageData[currentFrame], direction, isMultiColor);
    }

    // Reload pixel data and update display
    loadQuadPixelData();
    updateFatBits();
    updatePreview();
}

function shiftAllQuadsVertical(direction) {
    if (!currentSprite) return;

    // Shift all quads vertically (current frame only)
    for (let q = 0; q < currentSprite.sprite.length; q++) {
        const quad = currentSprite.sprite[q];
        if (!quad.imageData) continue;

        shiftImageDataVertical(quad.imageData[currentFrame], direction);
    }

    // Reload pixel data and update display
    loadQuadPixelData();
    updateFatBits();
    updatePreview();
}

function shiftImageDataHorizontal(imageData, direction, isMultiColor) {
    // Each row is 3 bytes (24 bits)
    // Multicolor: 12 fat pixels (2 bits each)
    // Hi-res: 24 thin pixels (1 bit each)

    for (let row = 0; row < 21; row++) {
        const offset = row * 3;
        const byte0 = imageData[offset];
        const byte1 = imageData[offset + 1];
        const byte2 = imageData[offset + 2];

        if (isMultiColor) {
            // Shift by one fat pixel (2 bits)
            if (direction > 0) {
                // Shift right: wrap leftmost pixel to right
                const leftPixel = (byte0 >> 6) & 0x03;
                imageData[offset] = ((byte0 << 2) | (byte1 >> 6)) & 0xFF;
                imageData[offset + 1] = ((byte1 << 2) | (byte2 >> 6)) & 0xFF;
                imageData[offset + 2] = ((byte2 << 2) | leftPixel) & 0xFF;
            } else {
                // Shift left: wrap rightmost pixel to left
                const rightPixel = byte2 & 0x03;
                imageData[offset + 2] = ((byte2 >> 2) | (byte1 << 6)) & 0xFF;
                imageData[offset + 1] = ((byte1 >> 2) | (byte0 << 6)) & 0xFF;
                imageData[offset] = ((byte0 >> 2) | (rightPixel << 6)) & 0xFF;
            }
        } else {
            // Shift by one thin pixel (1 bit)
            if (direction > 0) {
                // Shift right: wrap leftmost bit to right
                const leftBit = (byte0 >> 7) & 0x01;
                imageData[offset] = ((byte0 << 1) | (byte1 >> 7)) & 0xFF;
                imageData[offset + 1] = ((byte1 << 1) | (byte2 >> 7)) & 0xFF;
                imageData[offset + 2] = ((byte2 << 1) | leftBit) & 0xFF;
            } else {
                // Shift left: wrap rightmost bit to left
                const rightBit = byte2 & 0x01;
                imageData[offset + 2] = ((byte2 >> 1) | (byte1 << 7)) & 0xFF;
                imageData[offset + 1] = ((byte1 >> 1) | (byte0 << 7)) & 0xFF;
                imageData[offset] = ((byte0 >> 1) | (rightBit << 7)) & 0xFF;
            }
        }
    }
}

function shiftImageDataVertical(imageData, direction) {
    // Each row is 3 bytes
    if (direction > 0) {
        // Shift down: save bottom row, shift all rows down, put saved at top
        const savedRow = [imageData[60], imageData[61], imageData[62]];
        for (let row = 20; row > 0; row--) {
            const dstOffset = row * 3;
            const srcOffset = (row - 1) * 3;
            imageData[dstOffset] = imageData[srcOffset];
            imageData[dstOffset + 1] = imageData[srcOffset + 1];
            imageData[dstOffset + 2] = imageData[srcOffset + 2];
        }
        imageData[0] = savedRow[0];
        imageData[1] = savedRow[1];
        imageData[2] = savedRow[2];
    } else {
        // Shift up: save top row, shift all rows up, put saved at bottom
        const savedRow = [imageData[0], imageData[1], imageData[2]];
        for (let row = 0; row < 20; row++) {
            const dstOffset = row * 3;
            const srcOffset = (row + 1) * 3;
            imageData[dstOffset] = imageData[srcOffset];
            imageData[dstOffset + 1] = imageData[srcOffset + 1];
            imageData[dstOffset + 2] = imageData[srcOffset + 2];
        }
        imageData[60] = savedRow[0];
        imageData[61] = savedRow[1];
        imageData[62] = savedRow[2];
    }
}

// ==================== ANIMATION MODE ====================

function enterAnimaMode() {
    if (!currentSprite) return;

    animaMode.active = true;

    // fromFrame always resets to 1 — see animaMode docs. Anima end is read
    // straight off the sprite (numFrames), no syncing needed.
    animaMode.fromFrame = 1;

    // Start at the from frame
    animaMode.currentFrame = animaMode.fromFrame - 1; // Convert to 0-based

    // Show anima controls in message area
    updateAnimaMessage();

    // Blank out other buttons, keep only anima and ok
    document.getElementById('btn1').innerHTML = '&nbsp;';
    document.getElementById('btn2').textContent = 'ok';
    // btn3 stays as 'anima'
    document.getElementById('btn4').innerHTML = '&nbsp;';
    document.getElementById('btn5').innerHTML = '&nbsp;';
    document.getElementById('btn6').innerHTML = '&nbsp;';
    _blankCmdExtraRow();

    // Add keyboard listener for enter key
    document.addEventListener('keydown', animaEnterHandler);

    // Start animation loop
    animaMode.lastFrameTime = performance.now();
    animaMode.animationId = requestAnimationFrame(animationLoop);
}

function exitAnimaMode() {
    animaMode.active = false;

    // Stop animation loop
    if (animaMode.animationId) {
        cancelAnimationFrame(animaMode.animationId);
        animaMode.animationId = null;
    }

    // Close any open dropdown
    closeAnimaDropdown();

    // Clear message
    clearMessage();

    // Exit cmd mode as well
    exitCmdMode();

    // Remove keyboard listener
    document.removeEventListener('keydown', animaEnterHandler);

    // Stay on whatever frame anima last displayed — the user can resume
    // editing at that frame and the inc/dec arrows operate from a sensible
    // starting point. (Previously we reset to frame 0, which left the
    // frame button label stale: button kept showing the last animated
    // frame while currentFrame was actually 0, so inc/dec acted from 1.)
    currentFrame = animaMode.currentFrame;
    loadQuadPixelData();
    updateFrameButton();
    updateFatBits();
    updatePreview();
}

function animaEnterHandler(e) {
    if (!animaMode.active) return;

    if (e.key === 'Enter') {
        exitAnimaMode();
        e.preventDefault();
    } else if (e.key === 'Escape') {
        closeAnimaDropdown();
        e.preventDefault();
    }
}

function updateAnimaMessage() {
    const fromStr = animaMode.fromFrame.toString().padStart(2, '0');
    const toStr = currentSprite.getNumFrames().toString().padStart(2, '0');
    const speedStr = animaMode.speed.toString().padStart(2, '0');

    const messageArea = document.getElementById('messageArea');
    messageArea.innerHTML =
        `animate-from <span class="anima-value anima-from">${fromStr}</span> to <span class="anima-value anima-to">${toStr}</span><br>` +
        `speed = <span class="anima-value anima-speed">${speedStr}</span>`;

    // Cache the spans and update text in-place on value changes so the focused
    // / interacting element is preserved (full innerHTML rebuild would destroy it).
    const fromSpan = messageArea.querySelector('.anima-from');
    const toSpan = messageArea.querySelector('.anima-to');
    const speedSpan = messageArea.querySelector('.anima-speed');

    const refresh = () => {
        fromSpan.textContent = animaMode.fromFrame.toString().padStart(2, '0');
        toSpan.textContent = currentSprite.getNumFrames().toString().padStart(2, '0');
        speedSpan.textContent = animaMode.speed.toString().padStart(2, '0');
    };

    // GM allows the full 1-31 range for both fields independently — including
    // from > to. When that's set, the animation loop just sits on the end
    // frame (see animationLoop). The "to" value writes through to the sprite's
    // numFrames so it survives reload via the normal save path.
    GMTools.draggableField.attach(fromSpan, {
        type: 'numeric',
        min: 1,
        max: MAX_FRAMES,
        getValue: () => animaMode.fromFrame,
        setValue: (v) => {
            animaMode.fromFrame = v;
            animaMode.currentFrame = animaMode.fromFrame - 1;
            refresh();
        }
    });

    GMTools.draggableField.attach(toSpan, {
        type: 'numeric',
        min: 1,
        max: MAX_FRAMES,
        getValue: () => currentSprite.getNumFrames(),
        setValue: (v) => {
            currentSprite.setNumFrames(v);
            animaMode.currentFrame = animaMode.fromFrame - 1;
            refresh();
        }
    });

    GMTools.draggableField.attach(speedSpan, {
        type: 'numeric',
        min: 1,
        max: 31,
        getValue: () => animaMode.speed,
        setValue: (v) => {
            animaMode.speed = v;
            refresh();
        }
    });
}

function closeAnimaDropdown() {
    document.getElementById('animaDropdown').classList.remove('open');
}

function animationLoop(timestamp) {
    if (!animaMode.active) return;

    // Calculate time between frames based on speed
    // Speed 31 = fastest (every frame), speed 1 = slowest
    // At 60fps, we want to match C64's ~30fps at speed 31
    // Formula: delay = (32 - speed) * 33ms (roughly)
    const frameDelay = (32 - animaMode.speed) * 33;

    if (timestamp - animaMode.lastFrameTime >= frameDelay) {
        animaMode.lastFrameTime = timestamp;

        // GM behaviour: if from > to, there's no range to loop — just sit on
        // the end frame (no animation). Otherwise advance and wrap normally.
        const toFrame = currentSprite.getNumFrames();
        if (animaMode.fromFrame > toFrame) {
            animaMode.currentFrame = toFrame - 1;
        } else {
            animaMode.currentFrame++;
            if (animaMode.currentFrame > toFrame - 1) {
                animaMode.currentFrame = animaMode.fromFrame - 1;
            }
        }

        // Update preview with animated frame
        updateAnimatedPreview();
    }

    animaMode.animationId = requestAnimationFrame(animationLoop);
}

function updateAnimatedPreview() {
    if (!previewScreen || !currentSprite) return;

    // Clear to transparent
    previewScreen.clearTransparent();

    // Update background color block
    updatePreviewBgColor();

    // Sync current edits to sprite before rendering
    syncToSprite();

    // xPosition is always in fat pixel space (normalized by gmSprite at load time)
    const gmX = (currentSprite.sprite[0].xPosition || 0) + 12;
    const gmY = (currentSprite.sprite[0].yPosition || 0) + 50;

    // Render at the animated frame
    currentSprite.blitToBuffer(
        previewScreen.pixels,
        c64Screen.WIDTH,
        c64Screen.HEIGHT,
        gmX,
        gmY,
        animaMode.currentFrame
    );

    previewScreen.present();
}

// Close dropdown when clicking elsewhere
document.addEventListener('click', (e) => {
    if (!e.target.closest('.anima-dropdown') && !e.target.classList.contains('anima-value')) {
        closeAnimaDropdown();
    }
});

// ==================== CLEAR COMMAND ====================

// Clear mode state
let clearMode = {
    active: false
};

function showClearConfirmation() {
    clearMode.active = true;

    // Show confirmation in message area
    const html = `clear the sprite area?<br>` +
                 `<span class="anima-value" onclick="confirmClear(true)">yes</span> ` +
                 `<span class="anima-value" onclick="confirmClear(false)">no</span>`;
    document.getElementById('messageArea').innerHTML = html;

    // Blank out other buttons, keep only clear and ok
    document.getElementById('btn1').innerHTML = '&nbsp;';
    document.getElementById('btn2').textContent = 'ok';
    document.getElementById('btn3').innerHTML = '&nbsp;';
    // btn4 stays as 'clear'
    document.getElementById('btn5').innerHTML = '&nbsp;';
    document.getElementById('btn6').innerHTML = '&nbsp;';
    _blankCmdExtraRow();

    // Add keyboard listener
    document.addEventListener('keydown', clearKeyHandler);
}

function confirmClear(doIt) {
    clearMode.active = false;

    // Remove keyboard listener
    document.removeEventListener('keydown', clearKeyHandler);

    if (doIt) {
        // Preserve the palette across the reset. newSprite() builds a fresh
        // sprite with the default palette; we copy the user's current colours
        // onto it afterwards so a clear doesn't yank the palette back to green.
        const savedPalette = currentSprite ? currentSprite.getPalette() : [...DEFAULT_SPRITE_COLORS];

        // Reset sprite-shape defaults: multicolor on, no V/H magnification.
        // newSprite() reads setupState, so set this before calling it.
        setupState.isMultiColor = true;
        setupState.vMag = false;
        setupState.hMag = false;

        // Create a new blank sprite
        newSprite();

        // Restore palette onto the fresh sprite
        if (currentSprite) {
            currentSprite.setPalette(savedPalette);
        }
        updatePaletteDisplay();
        updatePreview();
        updateFatBits();
    }

    // Clear message and exit cmd mode
    clearMessage();
    exitCmdMode();
}

function clearKeyHandler(e) {
    if (!clearMode.active) return;

    if (e.key === 'Enter' || e.key === 'Escape') {
        confirmClear(false);
        e.preventDefault();
    } else if (e.key === 'y' || e.key === 'Y') {
        confirmClear(true);
        e.preventDefault();
    } else if (e.key === 'n' || e.key === 'N') {
        confirmClear(false);
        e.preventDefault();
    }
}

// ==================== COPY COMMAND ====================

function enterCopyMode() {
    if (!currentSprite) return;

    copyMode.active = true;
    copyMode.fromFrame = currentFrame + 1;  // Default to current frame (1-based)
    copyMode.toFrame = currentFrame + 1;
    copyMode.selectedField = null;

    // Show copy controls in message area
    updateCopyMessage();

    // Blank out other buttons, keep only copy and ok
    document.getElementById('btn1').innerHTML = '&nbsp;';
    document.getElementById('btn2').textContent = 'ok';
    document.getElementById('btn3').innerHTML = '&nbsp;';
    document.getElementById('btn4').innerHTML = '&nbsp;';
    document.getElementById('btn5').innerHTML = '&nbsp;';
    // btn6 stays as 'copy'
    _blankCmdExtraRow();

    // Add keyboard listener
    document.addEventListener('keydown', copyKeyHandler);
}

function exitCopyMode() {
    copyMode.active = false;
    copyMode.selectedField = null;

    // Close any open dropdown
    closeAnimaDropdown();

    // Restore the frame we were editing before copy mode
    loadQuadPixelData();
    updateFatBits();
    updatePreview();

    // Clear message
    clearMessage();

    // Exit cmd mode as well
    exitCmdMode();

    // Remove keyboard listener
    document.removeEventListener('keydown', copyKeyHandler);
}

function updateCopyMessage() {
    const fromStr = copyMode.fromFrame.toString().padStart(2, '0');
    const toStr = copyMode.toFrame.toString().padStart(2, '0');

    const html = `copy from frame <span class="anima-value" onclick="selectCopyFrame('from', event)">${fromStr}</span> to <span class="anima-value" onclick="selectCopyFrame('to', event)">${toStr}</span><br>` +
                 `<span class="anima-value" onclick="confirmCopy(true)">yes</span> ` +
                 `<span class="anima-value" onclick="confirmCopy(false)">no</span>`;

    document.getElementById('messageArea').innerHTML = html;
}

function selectCopyFrame(field, event) {
    event.stopPropagation();

    copyMode.selectedField = field;

    // Show the selected frame in the editor
    const frameToShow = field === 'from' ? copyMode.fromFrame : copyMode.toFrame;
    currentFrame = frameToShow - 1;  // Convert to 0-based
    loadQuadPixelData();
    updateFatBits();
    updatePreview();

    // Show dropdown for frame selection
    showCopyDropdown(field, event);
}

function showCopyDropdown(field, event) {
    const dropdown = document.getElementById('animaDropdown');
    dropdown.innerHTML = '';

    // GM's copy command lets you pick any of the 31 frame slots as source or
    // destination, regardless of whether the slot has data — blank slots
    // copy as transparent.
    const currentValue = field === 'from' ? copyMode.fromFrame : copyMode.toFrame;

    for (let i = 1; i <= MAX_FRAMES; i++) {
        const optDiv = document.createElement('div');
        optDiv.className = 'anima-dropdown-option' + (i === currentValue ? ' selected' : '');
        optDiv.textContent = i.toString().padStart(2, '0');
        optDiv.onclick = (e) => {
            e.stopPropagation();
            selectCopyOption(field, i);
        };
        dropdown.appendChild(optDiv);
    }

    // Position dropdown near the clicked element
    const rect = event.target.getBoundingClientRect();
    const screenRect = document.getElementById('screen').getBoundingClientRect();
    dropdown.style.left = (rect.left - screenRect.left) + 'px';
    dropdown.style.top = (rect.bottom - screenRect.top + 2) + 'px';

    dropdown.classList.add('open');

    // Scroll to selected option
    const selected = dropdown.querySelector('.selected');
    if (selected) {
        selected.scrollIntoView({ block: 'center' });
    }
}

function selectCopyOption(field, value) {
    if (field === 'from') {
        copyMode.fromFrame = value;
    } else {
        copyMode.toFrame = value;
    }

    // Show the newly selected frame
    currentFrame = value - 1;
    loadQuadPixelData();
    updateFatBits();
    updatePreview();

    closeAnimaDropdown();
    updateCopyMessage();
}

function confirmCopy(doIt) {
    if (doIt && copyMode.fromFrame !== copyMode.toFrame) {
        // Copy frame data from source to destination for all quads. Either
        // index may point beyond imageData's current length (user can pick
        // any of 31 slots) — treat a missing source as blank and lazily
        // extend imageData so the destination slot exists.
        const srcFrame = copyMode.fromFrame - 1;  // 0-based
        const dstFrame = copyMode.toFrame - 1;    // 0-based

        for (let q = 0; q < currentSprite.sprite.length; q++) {
            const quad = currentSprite.sprite[q];
            if (!quad.imageData) continue;

            const srcData = quad.imageData[srcFrame];
            while (quad.imageData.length <= dstFrame) {
                quad.imageData.push(new Uint8Array(63));
            }
            const dstData = quad.imageData[dstFrame];
            if (srcData) {
                for (let i = 0; i < srcData.length; i++) dstData[i] = srcData[i];
            } else {
                // Source slot doesn't exist yet → blank copy (already zeroed)
                for (let i = 0; i < dstData.length; i++) dstData[i] = 0;
            }
            quad.totalFrames = quad.imageData.length;
        }

        // Set current frame to destination
        currentFrame = dstFrame;
    }

    exitCopyMode();
}

function copyKeyHandler(e) {
    if (!copyMode.active) return;

    if (e.key === 'Enter') {
        confirmCopy(true);
        e.preventDefault();
    } else if (e.key === 'Escape') {
        confirmCopy(false);
        e.preventDefault();
    } else if (e.key === 'y' || e.key === 'Y') {
        confirmCopy(true);
        e.preventDefault();
    } else if (e.key === 'n' || e.key === 'N') {
        confirmCopy(false);
        e.preventDefault();
    }
}

// ==================== COLOR SWAP ====================
// Swap the contents of two colour slots: both the slot's palette colour
// AND every pixel using that slot trade places. The sprite looks visually
// identical after the swap; only the slot LABELS have moved. Useful when
// the editor's "unique per slot" constraint means the colour you want to
// vary needs to live in slot 1 — this lets the user reorganise without
// repainting.
//
// Internally pixelData is stored as raw C64 hardware values (0-3); the
// SLOT_PIXEL_MAP translates UI slot → hardware. Walk all quads/frames,
// rewriting bytes 2-bit pairs through a permutation that swaps the two
// hardware values, then swap the corresponding palette entries.

function enterSwapMode(fromSlot) {
    if (!currentSprite) return;
    // Refuse if another mutually-exclusive mode is active.
    if (animaMode.active || flipMode.active || clearMode.active ||
        shiftMode.active || copyMode.active || loadMode.active ||
        cmdMode || fileMenuMode.active || swapMode.active) return;

    swapMode.active = true;
    swapMode.fromSlot = fromSlot;
    // Default the target to a different slot so the dropdown has somewhere
    // useful to start. Picking the same slot is allowed but is a no-op.
    swapMode.toSlot = (fromSlot === 1) ? 2 : 1;
    updateSwapMessage();
    document.addEventListener('keydown', swapKeyHandler);
}

function exitSwapMode() {
    swapMode.active = false;
    closeAnimaDropdown();
    clearMessage();
    document.removeEventListener('keydown', swapKeyHandler);
}

// "b" for the background slot matches the palette row labels.
function _swapSlotLabel(slot) {
    return slot === 0 ? 'b' : String(slot);
}

function updateSwapMessage() {
    const from = _swapSlotLabel(swapMode.fromSlot);
    const to   = _swapSlotLabel(swapMode.toSlot);
    document.getElementById('messageArea').innerHTML =
        `swap color ` +
        `<span class="anima-value" onclick="showSwapSourceDropdown(event)">${from}</span>` +
        ` pixels with color ` +
        `<span class="anima-value" onclick="showSwapTargetDropdown(event)">${to}</span><br>` +
        `<span class="anima-value" onclick="confirmSwap(true)">yes</span> ` +
        `<span class="anima-value" onclick="confirmSwap(false)">no</span>`;
}

// Shared dropdown builder for the two swap-slot pickers. The "from" and
// "to" dropdowns are structurally identical (same options, same position
// logic, same updateSwapMessage refresh) — they only differ in which
// swapMode field they read/write.
function _showSwapSlotDropdown(event, currentSlot, onPick) {
    event.stopPropagation();
    const dropdown = document.getElementById('animaDropdown');
    dropdown.innerHTML = '';

    // All four slots are valid (including the currently-selected one,
    // which is a no-op — kept selectable so the dropdown isn't surprising).
    [1, 2, 3, 0].forEach(slot => {
        const opt = document.createElement('div');
        opt.className = 'anima-dropdown-option' + (slot === currentSlot ? ' selected' : '');
        opt.textContent = _swapSlotLabel(slot);
        opt.onclick = (e) => {
            e.stopPropagation();
            onPick(slot);
            updateSwapMessage();
            closeAnimaDropdown();
        };
        dropdown.appendChild(opt);
    });

    const rect = event.target.getBoundingClientRect();
    const screenRect = document.getElementById('screen').getBoundingClientRect();
    dropdown.style.left = (rect.left - screenRect.left) + 'px';
    dropdown.style.top = (rect.bottom - screenRect.top + 2) + 'px';
    dropdown.classList.add('open');

    const selected = dropdown.querySelector('.selected');
    if (selected) selected.scrollIntoView({ block: 'center' });
}

function showSwapSourceDropdown(event) {
    _showSwapSlotDropdown(event, swapMode.fromSlot, (slot) => { swapMode.fromSlot = slot; });
}

function showSwapTargetDropdown(event) {
    _showSwapSlotDropdown(event, swapMode.toSlot, (slot) => { swapMode.toSlot = slot; });
}

function confirmSwap(doIt) {
    if (doIt && swapMode.fromSlot !== swapMode.toSlot) {
        // Translate UI slots → raw C64 hardware pixel values.
        const a = SLOT_PIXEL_MAP[swapMode.fromSlot];
        const b = SLOT_PIXEL_MAP[swapMode.toSlot];

        // Build a 4-entry lookup: idx = original hw value, val = new hw value.
        const remap = [0, 1, 2, 3];
        remap[a] = b;
        remap[b] = a;

        // Rewrite every byte of every frame of every quad. Each byte holds
        // four 2-bit pixel values; remap each one through the table.
        for (const quad of currentSprite.sprite) {
            if (!quad.imageData) continue;
            for (const frame of quad.imageData) {
                if (!frame) continue;
                for (let i = 0; i < frame.length; i++) {
                    const byte = frame[i];
                    let out = 0;
                    for (let bitPair = 0; bitPair < 4; bitPair++) {
                        const shift = 6 - bitPair * 2;
                        const v = (byte >> shift) & 0b11;
                        out |= (remap[v] << shift);
                    }
                    frame[i] = out;
                }
            }
        }

        // Swap the two palette slots on the sprite itself.
        const palette = currentSprite.getPalette();
        [palette[swapMode.fromSlot], palette[swapMode.toSlot]] =
            [palette[swapMode.toSlot], palette[swapMode.fromSlot]];
        currentSprite.setPalette(palette);

        // Reload the visible quad/frame from the rewritten bytes and refresh
        // the palette display so the swatch colours match.
        loadQuadPixelData();
        updatePaletteDisplay();
        updateFatBits();
        updatePreview();
    }
    exitSwapMode();
}

function swapKeyHandler(e) {
    if (!swapMode.active) return;
    if (e.key === 'Enter' || e.key === 'y' || e.key === 'Y') {
        confirmSwap(true);
        e.preventDefault();
    } else if (e.key === 'Escape' || e.key === 'n' || e.key === 'N') {
        confirmSwap(false);
        e.preventDefault();
    }
}

function initApp() {
    // Apply the canonical base-mode label so LABEL_MENU is the only place
    // the string lives (the HTML literal is a placeholder for static views).
    document.getElementById('btn2').textContent = LABEL_MENU;

    // Build the fat bits table (12x21 grid for multicolor)
    const fatbits = document.getElementById("fatbits");
    for (let y = 0; y < 21; y++) {
        const row = document.createElement("tr");
        for (let x = 0; x < 12; x++) {
            const cell = document.createElement("td");
            cell.setAttribute("data-x", x);
            cell.setAttribute("data-y", y);
            cell.style.backgroundColor = "transparent";
            cell.addEventListener("mousedown", cellMouseDown);
            cell.addEventListener("mouseover", cellHover);
            row.appendChild(cell);
        }
        fatbits.appendChild(row);
    }

    // Initialize pixel data
    initPixelData();

    // Select color 1 by default
    selectColor(1);
    updatePaletteDisplay();

    // Initialize c64Screen for preview
    initPreviewScreen();
    window.addEventListener('resize', initPreviewScreen);

    // Initialize with new sprite, then attempt to restore last session
    newSprite();
    restoreSpriteSession();
}

// ==================== SESSION PERSISTENCE ====================
// Persists in-progress sprite work to localStorage so navigating away and back
// to the editor doesn't drop unsaved changes. See GMTools.session.

const saveSpriteSession = GMTools.session.debouncedSaver('sprite-maker', () => {
    if (!currentSprite) return null;
    return {
        bytes: GMTools.session.bytesToBase64(serializeSprite()),
        fileName: currentSpriteFileName,
        frame: currentFrame,
        quad: currentQuad,
        // Palette is already inside the serialised bytes; we still store it
        // separately for legacy session-restore inspection but reading back
        // from the sprite is authoritative.
        colors: currentSprite.getPalette(),
        setupState: { ...setupState }
    };
});

function restoreSpriteSession() {
    const s = GMTools.session.load('sprite-maker');
    if (!s || !s.bytes) return;
    try {
        const bytes = GMTools.session.base64ToBytes(s.bytes);
        currentSprite = new gmSprite(bytes);
        currentSpriteFileName = s.fileName || null;
        currentFrame = s.frame || 0;
        currentQuad = s.quad || 0;
        // Palette was restored as part of the deserialised sprite bytes; the
        // separate s.colors field is legacy and intentionally ignored.
        if (s.setupState) {
            setupState.isMultiColor = s.setupState.isMultiColor;
            setupState.vMag = s.setupState.vMag;
            setupState.hMag = s.setupState.hMag;
            setupState.numSprites = s.setupState.numSprites;
        }
        rebuildFatBitsGrid();
        loadQuadPixelData();
        updateFrameButton();
        updateQuadButton();
        updatePaletteDisplay();
        updateFatBits();
        updatePreview();
    } catch (e) {
        console.warn('sprite-maker: failed to restore session, starting fresh:', e.message);
        // newSprite() already ran in initApp, so we're already in a clean state
    }
}

function initPreviewScreen() {
    const canvas = document.getElementById("preview");

    // Set canvas to full c64Screen dimensions (320x200)
    // CSS handles scaling (1.5x, 2x)
    canvas.width = c64Screen.WIDTH;
    canvas.height = c64Screen.HEIGHT;

    // Create c64Screen instance
    previewScreen = new c64Screen(canvas);

    // Initialize background block color
    updatePreviewBgColor();

    updatePreview();
}

function updatePreviewBgColor() {
    const bgBlock = document.getElementById("previewBg");
    if (bgBlock) {
        // Called once during initPreviewScreen before newSprite() runs, so
        // fall back to defaults when there's no sprite yet.
        const bg = currentSprite ? currentSprite.getColor(0) : DEFAULT_SPRITE_COLORS[0];
        bgBlock.style.background = paletteToCSS(bg);
    }
}

function initPixelData() {
    pixelData = [];
    const width = setupState.isMultiColor ? 12 : 24;
    for (let y = 0; y < 21; y++) {
        pixelData[y] = [];
        for (let x = 0; x < width; x++) {
            pixelData[y][x] = 0; // All transparent initially
        }
    }
}

function rebuildFatBitsGrid() {
    const fatbits = document.getElementById("fatbits");
    fatbits.innerHTML = '';

    const width = setupState.isMultiColor ? 12 : 24;
    const cellWidth = setupState.isMultiColor ? 30 : 15; // Multicolor 3:2, hi-res 3:4 (height=20)

    for (let y = 0; y < 21; y++) {
        const row = document.createElement("tr");
        for (let x = 0; x < width; x++) {
            const cell = document.createElement("td");
            cell.setAttribute("data-x", x);
            cell.setAttribute("data-y", y);
            cell.style.backgroundColor = "transparent";
            cell.style.width = cellWidth + "px";
            cell.addEventListener("mousedown", cellMouseDown);
            cell.addEventListener("mouseover", cellHover);
            row.appendChild(cell);
        }
        fatbits.appendChild(row);
    }

    // Re-initialize pixel data for new width (will be populated by loadQuadPixelData if sprite exists)
    initPixelData();
}

// Convert current pixel data to raw bytes (for preserving across mode switches when no sprite)
function pixelDataToRawBytes() {
    const rawBytes = new Uint8Array(64);

    if (setupState.isMultiColor) {
        // Multicolor: 4 pixels per byte (2 bits each)
        for (let row = 0; row < 21; row++) {
            for (let col = 0; col < 3; col++) {
                let byte = 0;
                for (let bitPair = 0; bitPair < 4; bitPair++) {
                    const x = col * 4 + bitPair;
                    const colorIndex = (pixelData[row] && pixelData[row][x]) ? (pixelData[row][x] & 0b11) : 0;
                    byte |= (colorIndex << (6 - bitPair * 2));
                }
                rawBytes[row * 3 + col] = byte;
            }
        }
    } else {
        // Hi-res: 8 pixels per byte (1 bit each)
        for (let row = 0; row < 21; row++) {
            for (let col = 0; col < 3; col++) {
                let byte = 0;
                for (let bit = 0; bit < 8; bit++) {
                    const x = col * 8 + bit;
                    const isSet = (pixelData[row] && pixelData[row][x]) ? 1 : 0;
                    byte |= (isSet << (7 - bit));
                }
                rawBytes[row * 3 + col] = byte;
            }
        }
    }

    return rawBytes;
}

// Convert raw bytes to pixel data in current mode
function rawBytesToPixelData(rawBytes) {
    initPixelData();

    if (setupState.isMultiColor) {
        // Multicolor: Each row is 3 bytes, 4 pixels per byte (2 bits each)
        for (let row = 0; row < 21; row++) {
            for (let col = 0; col < 3; col++) {
                const byte = rawBytes[row * 3 + col];
                for (let bitPair = 0; bitPair < 4; bitPair++) {
                    const colorIndex = (byte >> (6 - bitPair * 2)) & 0b11;
                    const x = col * 4 + bitPair;
                    pixelData[row][x] = colorIndex;
                }
            }
        }
    } else {
        // Hi-res: Each row is 3 bytes, 8 pixels per byte (1 bit each)
        for (let row = 0; row < 21; row++) {
            for (let col = 0; col < 3; col++) {
                const byte = rawBytes[row * 3 + col];
                for (let bit = 0; bit < 8; bit++) {
                    const isSet = (byte >> (7 - bit)) & 0b1;
                    const x = col * 8 + bit;
                    pixelData[row][x] = isSet ? 1 : 0;
                }
            }
        }
    }
}

// Create a new blank sprite
function newSprite() {
    currentFrame = 0;
    currentQuad = 0;
    currentSpriteFileName = null;

    // Create actual sprite object with default palette baked in.
    currentSprite = gmSprite.createBlank({
        name: 'NEW',
        isMultiColor: setupState.isMultiColor,
        xDouble: setupState.hMag,
        yDouble: setupState.vMag,
        numFrames: 1,
        xPosition: 100,
        yPosition: 100,
        bgColor:  DEFAULT_SPRITE_COLORS[0],
        gmColor1: DEFAULT_SPRITE_COLORS[1],
        gmColor2: DEFAULT_SPRITE_COLORS[2],
        gmColor3: DEFAULT_SPRITE_COLORS[3]
    });

    // Rebuild the grid in case the previous sprite had a different color mode —
    // multicolor uses 12 cells per row, hi-res uses 24. Without this, stale
    // DOM cells from the previous mode would survive a clear/reset and show
    // ghost pixels (since updateFatBits only iterates the active mode's width).
    rebuildFatBitsGrid();

    initPixelData();
    updateFrameButton();
    updateQuadButton();
    updatePaletteDisplay();
    updatePaletteForColorMode();
    updateFatBits();
    updatePreview();
}

// Mouse state for drag drawing
let drawMode = null; // 'draw' or 'erase' - set on mousedown based on initial cell

document.onmouseup = function(event) {
    drawMode = null;
};

function cellMouseDown(event) {
    if (animaMode.active) return; // No drawing during animation
    if (loadMode.active) return;  // No drawing during load
    if (saveMode.active) return;  // No drawing during save
    // Any click during flip/shift is "I'm done" — exit and don't draw.
    if (_exitTransientCmdSubmode()) { event.preventDefault(); return; }
    event.preventDefault(); // Prevent text selection while dragging
    const x = parseInt(event.target.getAttribute("data-x"));
    const y = parseInt(event.target.getAttribute("data-y"));

    // pixelData stores raw C64 hardware values (00/01/10/11); map from the
    // GM slot the user picked to the corresponding hardware value.
    const drawValue = setupState.isMultiColor ? SLOT_PIXEL_MAP[selectedColorSlot] : 1;

    // Determine draw mode based on initial click
    // In hi-res, check if pixel is set (non-zero); in multicolor check exact color match
    const isCurrentColor = setupState.isMultiColor
        ? (pixelData[y][x] === drawValue)
        : (pixelData[y][x] !== 0 && selectedColorSlot !== 0);

    if (isCurrentColor) {
        // Clicking on same color = erase mode
        drawMode = 'erase';
        pixelData[y][x] = 0;
    } else {
        // Clicking on different color = draw mode
        drawMode = 'draw';
        pixelData[y][x] = drawValue;
    }

    updateFatBits();
    updatePreview();
    syncToSprite();
}

function cellHover(event) {
    if (drawMode) {
        const x = parseInt(event.target.getAttribute("data-x"));
        const y = parseInt(event.target.getAttribute("data-y"));

        if (drawMode === 'erase') {
            pixelData[y][x] = 0;
        } else {
            // Same slot→hardware mapping as cellMouseDown above.
            const drawValue = setupState.isMultiColor ? SLOT_PIXEL_MAP[selectedColorSlot] : 1;
            pixelData[y][x] = drawValue;
        }

        updateFatBits();
        updatePreview();
        syncToSprite();
    }
}

// Select which color slot to draw with
function selectColor(slot) {
    // Any click during flip/shift is "I'm done" — exit and don't change colour.
    if (_exitTransientCmdSubmode()) return;
    // In single color mode:
    // - Row 1 displays color 2 (so clicking row 1 selects color 2)
    // - Rows 2 and 3 are disabled
    if (!setupState.isMultiColor) {
        if (slot === 1) {
            slot = 2; // Row 1 controls color 2 in single-color mode
        } else if (slot === 2 || slot === 3) {
            return; // Rows 2 and 3 are disabled
        }
    }

    selectedColorSlot = slot;

    // Update selection highlight
    // In single-color mode, highlight row 1 when color 2 is selected
    for (let i = 0; i <= 3; i++) {
        const row = document.getElementById("color" + i);
        const shouldHighlight = setupState.isMultiColor
            ? (i === slot)
            : (i === 0 && slot === 0) || (i === 1 && slot === 2);
        if (shouldHighlight) {
            row.classList.add("colorSelected");
        } else {
            row.classList.remove("colorSelected");
        }
    }
}

// Click on color swatch to change it
// Name cell opens the colour picker. We stopPropagation so the row's
// selectColor onclick doesn't also fire — picking a colour shouldn't
// double as selecting that slot for drawing.
// (Swatch click intentionally has no handler: it bubbles up to the row's
// onclick=selectColor, so clicking the swatch sets the drawing colour.)
document.getElementById('color0Name').addEventListener('click', (e) => { e.stopPropagation(); showColorPicker(0, e); });
document.getElementById('color1Name').addEventListener('click', (e) => { e.stopPropagation(); showColorPicker(1, e); });
document.getElementById('color2Name').addEventListener('click', (e) => { e.stopPropagation(); showColorPicker(2, e); });
document.getElementById('color3Name').addEventListener('click', (e) => { e.stopPropagation(); showColorPicker(3, e); });

function showColorPicker(slot, event) {
    // Any click during flip/shift is "I'm done" — exit and don't open picker.
    if (_exitTransientCmdSubmode()) return;
    // In hi-res mode only slots 0 (bg) and 1 (foreground) are rendered;
    // slots 2 and 3 aren't used so their swatches are inert. Hi-res
    // renders from _gmColor1 (slot 1), so the slot the user clicks is the
    // slot we write — no remap needed.
    if (!setupState.isMultiColor) {
        if (slot === 2 || slot === 3) return;
    }

    GMTools.colorPicker.show({
        x: event.clientX,
        y: event.clientY,
        onSelect: (c64ColorIndex) => {
            if (currentSprite) currentSprite.setColor(slot, c64ColorIndex);
            updatePaletteDisplay();
            updateFatBits();
            updatePreview();
        }
    });
}

function updatePaletteDisplay() {
    // Update color names and swatches
    const palette = currentSprite ? currentSprite.getPalette() : DEFAULT_SPRITE_COLORS;
    for (let slot = 0; slot < 4; slot++) {
        const colorIndex = palette[slot];
        document.getElementById('color' + slot + 'Name').textContent = c64ColorNames[colorIndex];
        document.getElementById('color' + slot + 'Swatch').style.color = paletteToCSS(colorIndex);
    }
}

function updatePaletteForColorMode() {
    const color1Row = document.getElementById('color1');
    const color2Row = document.getElementById('color2');
    const color3Row = document.getElementById('color3');
    const color1Name = document.getElementById('color1Name');
    const color2Name = document.getElementById('color2Name');
    const color3Name = document.getElementById('color3Name');
    const color1Swatch = document.getElementById('color1Swatch');
    const color2Swatch = document.getElementById('color2Swatch');
    const color3Swatch = document.getElementById('color3Swatch');

    const palette = currentSprite ? currentSprite.getPalette() : DEFAULT_SPRITE_COLORS;
    if (setupState.isMultiColor) {
        // Multicolor - show all colors in their normal slots
        color1Row.style.cursor = 'pointer';
        color2Row.style.cursor = 'pointer';
        color3Row.style.cursor = 'pointer';
        color1Name.textContent = c64ColorNames[palette[1]];
        color2Name.textContent = c64ColorNames[palette[2]];
        color3Name.textContent = c64ColorNames[palette[3]];
        color1Swatch.style.visibility = 'visible';
        color2Swatch.style.visibility = 'visible';
        color3Swatch.style.visibility = 'visible';
        color1Swatch.style.color = paletteToCSS(palette[1]);
        color2Swatch.style.color = paletteToCSS(palette[2]);
        color3Swatch.style.color = paletteToCSS(palette[3]);
    } else {
        // Hi-res mode: only background and foreground colors are used.
        // Slot 1 holds the foreground color (gmSprite normalizes this).
        // Display it in the "1" row, hide rows 2 and 3.
        color1Row.style.cursor = 'pointer';
        color2Row.style.cursor = 'default';
        color3Row.style.cursor = 'default';
        color1Name.textContent = c64ColorNames[palette[1]];
        color1Swatch.style.visibility = 'visible';
        color1Swatch.style.color = paletteToCSS(palette[1]);
        // Rows 2 and 3 unused in hi-res
        color2Name.textContent = '';
        color3Name.textContent = '';
        color2Swatch.style.visibility = 'hidden';
        color3Swatch.style.visibility = 'hidden';
    }
}

function updateFatBits() {
    const fatbits = document.getElementById("fatbits");
    const rows = fatbits.getElementsByTagName("tr");
    const width = setupState.isMultiColor ? 12 : 24;
    const palette = currentSprite ? currentSprite.getPalette() : DEFAULT_SPRITE_COLORS;

    // SLOT_PIXEL_MAP is its own inverse, so we use it to go pixel→slot here too.
    for (let y = 0; y < 21; y++) {
        const cells = rows[y].getElementsByTagName("td");
        for (let x = 0; x < width; x++) {
            const pixelValue = pixelData[y][x];
            if (pixelValue === 0) {
                cells[x].style.backgroundColor = paletteToCSS(palette[0]); // Background color
            } else if (setupState.isMultiColor) {
                const colorIndex = SLOT_PIXEL_MAP[pixelValue];
                cells[x].style.backgroundColor = paletteToCSS(palette[colorIndex]);
            } else {
                // Hi-res mode: foreground uses GM "Color 1"
                cells[x].style.backgroundColor = paletteToCSS(palette[1]);
            }
        }
    }

    // Update fatbits background to match sprite bg color
    fatbits.style.backgroundColor = paletteToCSS(palette[0]);
}

function updatePreview() {
    if (!previewScreen) return;

    // Persist current state to localStorage (debounced — fires ~500ms after the
    // last edit, so we don't pummel localStorage during rapid editing).
    saveSpriteSession();

    // Clear to transparent - sprites render over the background block
    previewScreen.clearTransparent();

    // Update the background color block
    updatePreviewBgColor();

    if (!currentSprite) return;

    // Sync current edits to sprite before rendering
    syncToSprite();

    // xPosition is always in fat pixel space (normalized by gmSprite at load time)
    const gmX = (currentSprite.sprite[0].xPosition || 0) + 12;
    const gmY = (currentSprite.sprite[0].yPosition || 0) + 50;

    // Use gmSprite's blitToBuffer for authentic rendering
    currentSprite.blitToBuffer(
        previewScreen.pixels,
        c64Screen.WIDTH,
        c64Screen.HEIGHT,
        gmX,
        gmY,
        currentFrame
    );

    // Display the rendered frame
    previewScreen.present();
}

// Frame selection
function showFrameSelector(event) {
    event.stopPropagation();

    if (!currentSprite) {
        // No sprite loaded - only frame 1
        return;
    }

    const dropdown = document.getElementById('frameDropdown');

    // Toggle: clicking fr=NN closes the dropdown if it's already open.
    // (The dedicated < > arrows next to the button now handle stepping;
    // we don't need the click-to-advance behaviour any more.)
    if (dropdown.classList.contains('open')) {
        closeFrameDropdown();
        return;
    }

    // Mutual exclusion: opening this dropdown closes any sibling dropdown
    // so the user never ends up with two stacked open at once.
    closeQuadDropdown();

    dropdown.innerHTML = '';

    // GM exposes all 31 frame slots — user can navigate to any of them without
    // an explicit "add". Blank slots simply render as empty; the serializer
    // trims trailing blanks on save.
    for (let i = 0; i < MAX_FRAMES; i++) {
        const option = document.createElement('div');
        option.className = 'selector-option' + (i === currentFrame ? ' selected' : '');
        option.textContent = 'frame ' + (i + 1).toString().padStart(2, '0');
        option.onclick = (e) => { e.stopPropagation(); selectFrame(i); };
        dropdown.appendChild(option);
    }

    // Prevent clicks inside dropdown from closing it
    dropdown.onclick = (e) => e.stopPropagation();

    // Position dropdown below the fr= button
    const btn = document.getElementById('btn5');
    const rect = btn.getBoundingClientRect();
    const controlsRect = document.getElementById('controls').getBoundingClientRect();
    dropdown.style.left = (rect.left - controlsRect.left) + 'px';
    dropdown.style.top = (rect.bottom - controlsRect.top + 2) + 'px';

    dropdown.classList.add('open');

    // Add keyboard listener for arrow navigation
    document.addEventListener('keydown', frameDropdownKeyHandler);
}

// Advance to next frame (cycles, doesn't add new)
function advanceFrame() {
    if (!currentSprite) return;

    syncToSprite();

    // Wrap through all 31 slots — matches the dropdown showing 1-31.
    currentFrame = (currentFrame + 1) % MAX_FRAMES;

    loadQuadPixelData();
    updateFrameButton();
    updateFatBits();
    updatePreview();

    updateFrameDropdownSelection();
}

function updateFrameDropdownSelection() {
    const dropdown = document.getElementById('frameDropdown');
    const options = dropdown.querySelectorAll('.selector-option');
    options.forEach((opt, i) => {
        opt.classList.toggle('selected', i === currentFrame);
    });
}

function frameDropdownKeyHandler(e) {
    const dropdown = document.getElementById('frameDropdown');
    if (!dropdown.classList.contains('open')) return;
    if (!currentSprite) return;

    if (e.key === 'ArrowDown') {
        e.preventDefault();
        syncToSprite();
        currentFrame = (currentFrame + 1) % MAX_FRAMES;
        loadQuadPixelData();
        updateFrameButton();
        updateFatBits();
        updatePreview();
        updateFrameDropdownSelection();
    } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        syncToSprite();
        currentFrame = (currentFrame - 1 + MAX_FRAMES) % MAX_FRAMES;
        loadQuadPixelData();
        updateFrameButton();
        updateFatBits();
        updatePreview();
        updateFrameDropdownSelection();
    } else if (e.key === 'Enter' || e.key === 'Escape') {
        e.preventDefault();
        closeFrameDropdown();
    }
}

function closeFrameDropdown() {
    document.getElementById('frameDropdown').classList.remove('open');
    document.removeEventListener('keydown', frameDropdownKeyHandler);
}

function selectFrame(frameIndex) {
    // Save current pixel data back to sprite before switching. Navigating to
    // a frame that doesn't exist in imageData yet is fine — loadQuadPixelData
    // shows a blank grid for missing frames; the slot only materializes in
    // imageData if the user actually paints (see syncToSprite).
    syncToSprite();

    currentFrame = frameIndex;
    loadQuadPixelData();
    updateFrameButton();
    updateFatBits();
    updatePreview();

    closeFrameDropdown();
}

function updateFrameButton() {
    // The label span is preserved when only the label changes; when a
    // mode overwrites btn5.innerHTML entirely we rebuild the full cell.
    const labelEl = document.getElementById('frameLabel');
    const text = 'fr=' + (currentFrame + 1).toString().padStart(2, '0');
    if (labelEl) {
        labelEl.textContent = text;
    } else {
        document.getElementById('btn5').innerHTML =
            '<span id="frameLabel">' + text + '</span>' +
            '<div id="frameArrowsRow">' +
                '<div class="frame-arrow" onclick="event.stopPropagation(); stepFrame(-1)">&lt;</div>' +
                '<div class="frame-arrow" onclick="event.stopPropagation(); stepFrame(1)">&gt;</div>' +
            '</div>';
    }
}

// Step the current frame by +1 or -1 with wrap, matching advanceFrame's
// behaviour (all 31 slots reachable).
function stepFrame(direction) {
    if (!currentSprite) return;
    syncToSprite();
    currentFrame = (currentFrame + direction + MAX_FRAMES) % MAX_FRAMES;
    loadQuadPixelData();
    updateFrameButton();
    updateFatBits();
    updatePreview();
    // If the dropdown was open, close it — the arrows are a deliberate
    // navigation gesture that supersedes browsing the list.
    closeFrameDropdown();
}

// Close dropdown when clicking elsewhere, and dismiss cmd/file menu mode
document.addEventListener('click', (e) => {
    closeFrameDropdown();
    closeQuadDropdown();

    // Dismiss file menu mode when clicking outside buttons
    // But not during load mode - clicking should only affect yes/no in message area
    if (fileMenuMode.active && !loadMode.active && !e.target.closest('#buttons')) {
        exitFileMenuMode();
    }

    // Any click outside the buttons row exits a transient cmd submode
    // (flip/shift). cellMouseDown / selectColor / showColorPicker handle
    // clicks INSIDE the canvas and palette directly; this branch catches
    // clicks on empty background, the message area, etc.
    if (!e.target.closest('#buttons') && _exitTransientCmdSubmode()) {
        return;
    }

    // Dismiss cmd mode when clicking outside buttons (like clicking ok)
    // But not during animation mode - clicking background should do nothing
    if (cmdMode && !animaMode.active && !e.target.closest('#buttons')) {
        exitCmdMode();
    }
});

// Quad selection
// Cycle the current quad by direction (+1 or -1) with wrap. Single-quad
// sprites are a no-op. Used by both the < > arrows and the back-compat
// cycleQuad() wrapper.
function stepQuad(direction) {
    if (!currentSprite) return;
    const numQuads = currentSprite.sprite[0].numSprites;
    if (numQuads <= 1) return;

    syncToSprite();
    currentQuad = (currentQuad + direction + numQuads) % numQuads;

    loadQuadPixelData();
    updateQuadButton();
    updatePaletteDisplay();
    updateFatBits();
    updatePreview();
    updateQuadDropdownSelection();
    closeQuadDropdown();
}

// Back-compat shim for cmd-mode / older callers — advances one quad.
function cycleQuad() { stepQuad(1); }

function updateQuadButton() {
    // Mirrors updateFrameButton: update only the label span if the inner
    // structure is intact, otherwise rebuild after a mode overwrote btn6.
    // The < > arrows row is rendered only when the current sprite has
    // multiple quads (single-quad sprites get just the bare label).
    const btn = document.getElementById('btn6');
    const numQuads = currentSprite ? currentSprite.sprite[0].numSprites : 1;
    const text = 'spr=' + (currentQuad + 1);

    const labelEl = document.getElementById('quadLabel');
    const arrowsEl = document.getElementById('quadArrowsRow');
    if (labelEl) {
        labelEl.textContent = text;
        if (arrowsEl) arrowsEl.style.display = numQuads > 1 ? 'flex' : 'none';
        return;
    }

    // btn6 was overwritten by another mode — rebuild from scratch.
    const arrowsHtml = numQuads > 1
        ? '<div id="quadArrowsRow">' +
              '<div class="frame-arrow" onclick="event.stopPropagation(); stepQuad(-1)">&lt;</div>' +
              '<div class="frame-arrow" onclick="event.stopPropagation(); stepQuad(1)">&gt;</div>' +
          '</div>'
        : '<div id="quadArrowsRow" style="display:none">' +
              '<div class="frame-arrow" onclick="event.stopPropagation(); stepQuad(-1)">&lt;</div>' +
              '<div class="frame-arrow" onclick="event.stopPropagation(); stepQuad(1)">&gt;</div>' +
          '</div>';
    btn.innerHTML =
        '<span id="quadLabel" onclick="event.stopPropagation(); showQuadSelector(event)">' + text + '</span>' +
        arrowsHtml;
}

// Toggle the quad dropdown (or rebuild + show it if closed). Single-quad
// sprites have nothing to select between, so this is a no-op for them.
function showQuadSelector(event) {
    event.stopPropagation();
    if (!currentSprite) return;
    const numQuads = currentSprite.sprite[0].numSprites;
    if (numQuads <= 1) return;

    const dropdown = document.getElementById('quadDropdown');
    if (dropdown.classList.contains('open')) {
        closeQuadDropdown();
        return;
    }

    // Mutual exclusion: opening this dropdown closes any sibling dropdown
    // so the user never ends up with two stacked open at once.
    closeFrameDropdown();

    dropdown.innerHTML = '';
    for (let q = 0; q < numQuads; q++) {
        const option = document.createElement('div');
        option.className = 'selector-option' + (q === currentQuad ? ' selected' : '');
        option.textContent = 'sprite ' + (q + 1);
        option.onclick = (e) => { e.stopPropagation(); selectQuad(q); };
        dropdown.appendChild(option);
    }
    dropdown.onclick = (e) => e.stopPropagation();

    // Position dropdown below the spr= button
    const btn = document.getElementById('btn6');
    const rect = btn.getBoundingClientRect();
    const controlsRect = document.getElementById('controls').getBoundingClientRect();
    dropdown.style.left = (rect.left - controlsRect.left) + 'px';
    dropdown.style.top = (rect.bottom - controlsRect.top + 2) + 'px';
    dropdown.classList.add('open');
}

function closeQuadDropdown() {
    document.getElementById('quadDropdown').classList.remove('open');

// Load pixel data from current sprite quad/frame
function loadQuadPixelData() {
    if (!currentSprite) {
        initPixelData();
        return;
    }

    const quad = currentSprite.sprite[currentQuad];
    if (!quad || !quad.imageData || !quad.imageData[currentFrame]) {
        initPixelData();
        return;
    }

    // Palette is sprite-scoped (one set per sprite, applied to every quad
    // by the VIC), so we don't read per-quad colours here — the swatches
    // read currentSprite.getPalette() directly via updatePaletteDisplay.

    // Decode pixel data from raw bytes
    const imageData = quad.imageData[currentFrame];

    initPixelData();

    if (setupState.isMultiColor) {
        // Multicolor: Each row is 3 bytes, 4 pixels per byte (2 bits each)
        for (let row = 0; row < 21; row++) {
            for (let col = 0; col < 3; col++) {
                const byte = imageData[row * 3 + col];
                for (let bitPair = 0; bitPair < 4; bitPair++) {
                    const colorIndex = (byte >> (6 - bitPair * 2)) & 0b11;
                    const x = col * 4 + bitPair;
                    pixelData[row][x] = colorIndex;
                }
            }
        }
    } else {
        // Hi-res: Each row is 3 bytes, 8 pixels per byte (1 bit each)
        // Bit = 1 means foreground (color 1), bit = 0 means background
        for (let row = 0; row < 21; row++) {
            for (let col = 0; col < 3; col++) {
                const byte = imageData[row * 3 + col];
                for (let bit = 0; bit < 8; bit++) {
                    const isSet = (byte >> (7 - bit)) & 0b1;
                    const x = col * 8 + bit;
                    pixelData[row][x] = isSet ? 1 : 0;
                }
            }
        }
    }
}

// Sync pixel data back to sprite
function syncToSprite() {
    if (!currentSprite) return;

    const quad = currentSprite.sprite[currentQuad];
    if (!quad || !quad.imageData) return;

    // Encode pixel data to raw bytes
    const imageData = new Uint8Array(64); // 63 bytes + 1 padding

    if (setupState.isMultiColor) {
        // Multicolor: 4 pixels per byte (2 bits each)
        for (let row = 0; row < 21; row++) {
            for (let col = 0; col < 3; col++) {
                let byte = 0;
                for (let bitPair = 0; bitPair < 4; bitPair++) {
                    const x = col * 4 + bitPair;
                    const colorIndex = pixelData[row][x] & 0b11;
                    byte |= (colorIndex << (6 - bitPair * 2));
                }
                imageData[row * 3 + col] = byte;
            }
        }
    } else {
        // Hi-res: 8 pixels per byte (1 bit each)
        for (let row = 0; row < 21; row++) {
            for (let col = 0; col < 3; col++) {
                let byte = 0;
                for (let bit = 0; bit < 8; bit++) {
                    const x = col * 8 + bit;
                    const isSet = pixelData[row][x] ? 1 : 0;
                    byte |= (isSet << (7 - bit));
                }
                imageData[row * 3 + col] = byte;
            }
        }
    }

    // Lazy extension: if the user navigated to a frame beyond imageData's
    // current length, fill the gaps with blank frames so the array stays
    // contiguous (findLastNonBlankFrame and other walkers assume that).
    while (quad.imageData.length < currentFrame) {
        quad.imageData.push(new Uint8Array(63));
    }
    quad.imageData[currentFrame] = imageData;
    quad.totalFrames = quad.imageData.length;

    // Mark sprite as dirty so it re-renders. Palette is sprite-owned and
    // updated directly via setColor/setPalette by colour-changing flows,
    // so we don't need to copy anything here.
    currentSprite.dirty = true;
}
