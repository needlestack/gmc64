<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>C64 GameMaker Sprite Editor</title>
<link rel="stylesheet" href="css/gm-ui.css">
<style>
/* Page-specific styles */
#screen {
    background: dimgray;
    width: 720px;
    height: 520px;
    margin: 0 auto;
    position: relative;
}

/* Fat bits editor - 12x21 multicolor grid */
/* Large, fills left side below message area */
#fatbits {
    background: limegreen;
    border: 3px solid black;
    border-bottom: 6px solid black;
    border-right: 6px solid black;
    position: absolute;
    top: 70px;
    left: 10px;
    bottom: 10px;
    border-collapse: collapse;
}
#fatbits td {
    /* Multicolor: 2 screen px wide × 1 tall, at 1.5x display = 3:2 visible ratio */
    /* Hi-res: 1 screen px wide × 1 tall, at 1.5x display = 3:4 visible ratio */
    /* Using 30x20 for multicolor, 15x20 for hi-res (both whole numbers) */
    width: 30px;
    height: 20px;
    border-bottom: 1px solid rgba(0,0,0,0.2);
    border-right: 1px solid rgba(0,0,0,0.2);
}

/* Background color block - visual aid for sprite positioning */
#previewBg {
    position: absolute;
    top: 290px;
    right: 10px;
    bottom: 10px;
    width: 250px;
    border: 3px solid black;
    background: #59A849; /* Default green, updated dynamically */
}

/* Full c64Screen canvas overlay - 320x200 native, scaled to 480x400 */
/* Positioned to show sprites at actual screen coordinates */
#preview {
    position: absolute;
    /* Position so the screen's right edge aligns with the background block's right edge */
    /* and bottom edge aligns with background block's bottom */
    bottom: 10px;
    right: 10px;
    width: 480px;
    height: 400px;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    pointer-events: none; /* Allow clicks to pass through to elements below */
}

#controls {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 250px;
}

/* Buttons are a 2-column CSS grid (not a table) so btn5 can have its
   tall mega-frame layout while btn6 (spr=1) stays normal height beside it.
   align-items: start prevents cell-stretch-to-match. */
#buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    width: 100%;
    align-items: start;
}
.button {
    background: silver;
    border: 3px solid black;
    border-bottom: 6px solid black;
    border-right: 6px solid black;
    text-align: center;
    padding: 5px 10px;
    cursor: pointer;
    color: #0000AA;
    box-sizing: border-box;
}
.button:hover {
    background: #ccc;
}
.button.disabled {
    background: #888;
    color: #446;
    cursor: not-allowed;
}
.button.active {
    background: #8f8;
}
.button.cmd-mode {
    color: #AA0000;
}

/* Mega frame/quad button: NN label on top, < and > arrows attached below,
   all visually inside one button frame with a 3px black divider line
   between the label and the arrows. The arrows row uses negative
   horizontal margins so its top border runs the full width of the
   button's inner area. Shared between the fr= button (always shown)
   and the spr= button (only when there's more than one quad). */
#frameArrowsRow, #quadArrowsRow {
    display: flex;
    border-top: 3px solid black;
    margin: 5px -10px -5px -10px;
}
.frame-arrow {
    flex: 1;
    padding: 3px 0;
    text-align: center;
    cursor: pointer;
    color: #0000AA;
}
.frame-arrow:first-child {
    border-right: 3px solid black;
}
.frame-arrow:hover {
    background: #aaa;
}

#palette {
    border-spacing: 0px;
    border-collapse: collapse;
    width: 100%;
    margin-top: 10px;
}
#palette td {
    padding: 3px 5px;
    cursor: pointer;
    color: #ffff00;
}
#palette tr:hover {
    background: #444;
}

.colorSelected {
    background-color: #0000AA !important;
}



/* Disk popup handled by GMDisk (injects its own styles) */

/* Color picker styles from gm-ui.css */

/* Frame/quad selectors */
.selector {
    position: relative;
    display: inline-block;
}

.selector-dropdown {
    display: none;
    position: absolute;
    background: silver;
    border: 3px solid black;
    border-bottom: 6px solid black;
    border-right: 6px solid black;
    z-index: 100;
    max-height: 240px;
    overflow-y: auto;
}

.selector-dropdown.open {
    display: block;
}

.selector-option {
    padding: 2px 15px;
    line-height: 20px;   /* row = 2 + 20 + 2 = 24px */
    cursor: pointer;
    color: #0000AA;
    white-space: nowrap;  /* "sprite 1" etc. shouldn't soft-wrap */
}
.selector-option:hover {
    background: #ccc;
}
.selector-option.selected {
    background: #0000AA;
    color: #fff;
}
.selector-option.add-new {
    color: #888;
    font-style: italic;
}

/* Setup panel - styled box that appears below setup/ok row */
#setupPanel {
    display: none;
    background: silver;
    border: 3px solid black;
    border-bottom: 6px solid black;
    border-right: 6px solid black;
    padding: 4px 0;
    margin-top: 4px;
}

#setupPanel.open {
    display: block;
}

#setupPanel table {
    width: 100%;
    border-collapse: collapse;
}

#setupPanel td {
    padding: 2px 6px;
    cursor: pointer;
}

#setupPanel td:first-child {
    color: #800;
    text-align: right;
    padding-right: 10px;
}

#setupPanel td:last-child {
    color: #0000AA;
}

#setupPanel tr:hover {
    background: #ccc;
}
#setupPanel tr:active {
    background: #aaa;
}

/* Message area - two lines above fatbits */
#messageArea {
    position: absolute;
    top: 10px;
    left: 10px;
    width: 450px;
    height: 60px;
    color: #ffff00;
    line-height: 1.8;
    text-align: center;
}

/* Anima mode clickable values - white on blue like GM */
#messageArea .anima-value {
    background: #0000AA;
    color: #fff;
    cursor: pointer;
    padding: 0 4px;
}
#messageArea .anima-value:hover,
#messageArea .anima-value.is-interacting {
    background: #4444CC;
}

/* Anima dropdown */
.anima-dropdown {
    display: none;
    position: absolute;
    background: #888;
    border: 2px solid black;
    z-index: 100;
    max-height: 200px;
    overflow-y: auto;
}

.anima-dropdown.open {
    display: block;
}

.anima-dropdown-option {
    padding: 3px 10px;
    cursor: pointer;
    color: #000;
}
.anima-dropdown-option:hover {
    background: #aaa;
}
.anima-dropdown-option.selected {
    background: #0000AA;
    color: #fff;
}

</style>
</head>
<body>

<!-- Disk popup handled by GMDisk -->

<!-- Color picker created dynamically by GMTools -->

<div id="screen">

<!-- Message area above fatbits -->
<div id="messageArea"></div>

<!-- Anima dropdown (shared for from/to/speed selection) -->
<div class="anima-dropdown" id="animaDropdown"></div>

<div id="controls">

<div id="buttons">
    <div class="button" id="btn1" onclick="btn1Click()">setup</div>
    <!-- "menu" text is overwritten by LABEL_MENU on initApp; placeholder
         here only so static page views render the right button. -->
    <div class="button" id="btn2" onclick="btn2Click()">menu</div>
    <div class="button" id="btn3" onclick="btn3Click()">cmd</div>
    <div class="button" id="btn4" onclick="btn4Click()">file</div>
    <div class="button" id="btn5" onclick="btn5Click()"><span id="frameLabel">fr=01</span><div id="frameArrowsRow"><div class="frame-arrow" onclick="event.stopPropagation(); stepFrame(-1)">&lt;</div><div class="frame-arrow" onclick="event.stopPropagation(); stepFrame(1)">&gt;</div></div></div>
    <div class="button" id="btn6" onclick="btn6Click()" onmouseenter="highlightCurrentQuad(true)" onmouseleave="highlightCurrentQuad(false)"><span id="quadLabel" onclick="event.stopPropagation(); showQuadSelector(event)">spr=1</span><div id="quadArrowsRow" style="display:none"><div class="frame-arrow" onclick="event.stopPropagation(); stepQuad(-1)">&lt;</div><div class="frame-arrow" onclick="event.stopPropagation(); stepQuad(1)">&gt;</div></div></div>
    <!-- btn7/btn8: extra cmd-submenu row. Hidden by default; shown only when
         cmd mode is active. btn7 is intentionally blank to keep the grid
         shape (the right-hand cell holds the actual "swap" button). -->
    <div class="button" id="btn7" style="display:none">&nbsp;</div>
    <div class="button" id="btn8" onclick="btn8Click()" style="display:none">swap</div>
</div>

<!-- Frame selector dropdown -->
<div class="selector-dropdown" id="frameDropdown"></div>

<!-- Quad selector dropdown -->
<div class="selector-dropdown" id="quadDropdown"></div>

<!-- Setup panel - styled box that appears below setup/quit row when open -->
<div id="setupPanel">
    <table>
        <tr onclick="toggleColorMode()">
            <td>color</td>
            <td id="setupColorValue">mult</td>
        </tr>
        <tr onclick="toggleVMag()">
            <td>v mag</td>
            <td id="setupVMagValue">off</td>
        </tr>
        <tr onclick="toggleHMag()">
            <td>h mag</td>
            <td id="setupHMagValue">off</td>
        </tr>
        <tr onclick="cycleSpritesCount()">
            <td>sprites</td>
            <td id="setupSpritesValue">1</td>
        </tr>
    </table>
</div>

<!-- Palette rows: swatch on the LEFT, name on the RIGHT. Click semantics:
       row (including the swatch) → select that slot as the drawing colour;
       name cell → open the colour picker for that slot.
     Swap-slot is now reached via the "swap" button in the cmd submenu (lets
     the user pick BOTH from and to instead of being scoped to the clicked
     row). The previous swatch-on-right layout is in git history. -->
<table id="palette">
<tr id="color1" onclick="selectColor(1)"><td>1</td><td id="color1Swatch" style="font-size:16px;">&#9608;&#9608;&#9608;</td><td id="color1Name" class="color-name">---</td></tr>
<tr id="color2" onclick="selectColor(2)"><td>2</td><td id="color2Swatch" style="font-size:16px;">&#9608;&#9608;&#9608;</td><td id="color2Name" class="color-name">---</td></tr>
<tr id="color3" onclick="selectColor(3)"><td>3</td><td id="color3Swatch" style="font-size:16px;">&#9608;&#9608;&#9608;</td><td id="color3Name" class="color-name">---</td></tr>
<tr id="color0" onclick="selectColor(0)"><td>b</td><td id="color0Swatch" style="font-size:16px;">&#9608;&#9608;&#9608;</td><td id="color0Name" class="color-name">---</td></tr>
</table>

</div>

<table id="fatbits"></table>

<div id="previewBg"></div>
<canvas id="preview"></canvas>

</div>

<script src="js/d64lib.js"></script>
<script src="js/gmDisk.js"></script>
<script src="js/c64lib.js"></script>
<script src="js/gmTools.js"></script>
<script src="js/c64Screen.js"></script>
<script src="js/gmSprite.js"></script>
<script src="js/gif.js"></script>
<script src="js/gifWorkerBlob.js"></script>
<script>
// ============================================================================
// SPRITE EDITOR - Create and edit C64 GameMaker sprites
// ============================================================================
//
// This editor closely mimics the original GameMaker sprite editor UI while
// adding modern conveniences (keyboard shortcuts, GIF export, etc).
//
// === LAYOUT (matches GM screenshot layout1.png/layout2.png) ===
// - Fat bits grid (left): 12×21 pixel editor for multicolor, 24×21 for hi-res
// - Button panel (top right): setup, quit, cmd, file, fr=N, spr=N
// - Color palette (right): 4 color slots with C64 color picker
// - Preview area (bottom right): full sprite preview at screen position
//
// === KEY CONCEPTS ===
//
// COORDINATE SYSTEMS:
// - GM coordinates: X in fat pixels (0-159), Y in pixels (0-199)
// - Both multicolor and hi-res sprites use fat pixel X coords internally
// - gmSprite normalizes positions at load time (divides file X by 2)
// - serializeSprite converts back (multiplies X by 2) for GM compatibility
//
// FRAME MANAGEMENT:
// - numFrames: animation frame count (what GM loops through)
// - totalFrames: actual frames in file (may include hidden frames beyond animation)
// - Hidden frames: GM strips trailing blank frames on save, but preserves
//   non-blank frames beyond numFrames (useful for scratch work)
// - Bytes 20-21 in file header encode totalFrames via: (dataSize - 32) / 64
//
// MODES:
// - Normal: draw pixels, select colors, navigate frames/quads
// - CMD mode: access secondary functions (flip, shift, clear, copy, anima, posn)
// - Animation mode: preview animation with adjustable range and speed
// - Positioning mode: move sprite on screen with arrow keys
// - Setup panel: change sprite name, mode (multi/hi-res), doubling, quad count
//
// FILE FORMAT:
// - Sprites saved in GM .SPR format (see gmSprite.js for byte-level docs)
// - Round-trip compatible: load in editor, save, load in real GameMaker
//
// === UI POLISH ===
// - Frame dropdown: click opens, click again advances, arrow keys navigate
// - Disk popup: load/save from D64 images with keyboard navigation
// - Color picker: click swatch to change C64 color (0-15)
// - GIF export: create animated GIF of current sprite

// Use c64ColorNames from c64lib.js (access by index, e.g., c64ColorNames[0] = "black")

// Helper to convert c64Palette entry to CSS color string
function paletteToCSS(colorIndex) {
    const rgba = c64Palette[colorIndex];
    if (!rgba) return '#000';
    return `rgb(${rgba[0]}, ${rgba[1]}, ${rgba[2]})`;
}

// State
let currentSprite = null;
let currentFrame = 0;
let currentQuad = 0;
let selectedColorSlot = 1; // Which color slot is selected for drawing (0=bg, 1, 2, 3)
let currentSpriteFileName = null;

// Default palette for newly-created sprites (C64 palette indices 0-15).
// The sprite itself is the single source of truth for its current palette —
// the editor reads it via currentSprite.getColor()/getPalette() and writes
// it via setColor()/setPalette(). This constant is only used when creating
// a fresh sprite (newSprite) or as a fallback before currentSprite exists
// (the preview area renders once during initApp before newSprite() runs).
const DEFAULT_SPRITE_COLORS = [5, 1, 6, 0]; // green bg, white, blue, black

// btn2's base-mode label, restored after exiting any submode that overrode
// it (cmd / file menu / setup panel). Single source of truth — change once,
// applied at HTML render time via initApp and at every restore site.
const LABEL_MENU = 'menu';

// Pixel data for current quad (12x21 array of color indices 0-3)
let pixelData = [];

// GM sprites have 31 reachable frame slots. Any can be navigated to or used
// as a copy source/destination at any time, even if blank. On save we trim
// trailing-empty slots (but keep middle blanks and any covered by anima range).
const MAX_FRAMES = 31;

// Mapping between GM color-slot numbers (UI labels 0/1/2/3) and the raw
// C64 hardware pixel values stored in pixelData (multicolor: 00/01/10/11).
// Slot 1 ("Color 1") = hw 10 = pixel value 2 (gmColor1, the unique sprite color)
// Slot 2 ("Color 2") = hw 01 = pixel value 1 (gmColor2, shared)
// Slot 3 ("Color 3") = hw 11 = pixel value 3 (gmColor3, shared)
// The mapping is its own inverse (1↔2 swap; 0 and 3 fixed), so the same
// array converts in both directions.
const SLOT_PIXEL_MAP = [0, 2, 1, 3];

// CMD mode state
let cmdMode = false;

// Flip mode state
let flipMode = {
    active: false
};

// Shift mode state
let shiftMode = {
    active: false
};

// Copy mode state
let copyMode = {
    active: false,
    fromFrame: 1,  // 1-based
    toFrame: 1,    // 1-based
    selectedField: null  // 'from' or 'to'
};

// Color-swap mode state. fromSlot is the slot whose ellipsis the user
// clicked; toSlot is what they pick to swap with. The swap reassigns both
// the slot's colour AND the pixels using that slot, so the sprite looks
// identical after the swap — only the slot labels change.
let swapMode = {
    active: false,
    fromSlot: 0,
    toSlot: 0
};

// Animation mode state.
//
// The animation END is the sprite's numFrames itself: every time the user
// changes the "to" field we write through to currentSprite.setNumFrames().
// We don't duplicate it on animaMode any more — the sprite is the source of
// truth, so a session restore can never silently disagree with the saved
// bytes (which is what gave us the "01 to 01" bug after reload).
//
// fromFrame is purely transient anima-session state: it ALWAYS resets to
// 1 every time enterAnimaMode runs. The .SPR file format has no slot for
// it, and real GM doesn't persist it either — partial-range playback is a
// quick-look feature, not something the user should have to clear back to
// 1 by hand after every reload.
let animaMode = {
    active: false,
    fromFrame: 1,      // 1-based; reset to 1 on every enterAnimaMode
    speed: 28,         // 1-31
    currentFrame: 0,   // 0-based for internal use
    animationId: null, // requestAnimationFrame ID
    lastFrameTime: 0   // for timing control
};

// Positioning mode state
let positioningMode = {
    active: false,
    currentQuad: 0,
    positions: []  // [{x, y}, ...] for each quad
};

// File menu mode state
let fileMenuMode = {
    active: false
};

// Load mode state (within file menu)
// The cycling/keyboard/UI framework lives in GMTools.previewLoader; this object
// mirrors the relevant state so the rest of sprite-maker (click guards, tests)
// can read it without reaching into the framework's internals.
let loadMode = {
    active: false,
    spriteFiles: [],        // List of sprite filenames on disk
    currentIndex: 0,        // Currently previewed sprite index
    previewSprite: null,    // gmSprite instance for preview
    animationId: null,      // Animation frame ID
    lastFrameTime: 0,       // For animation timing
    currentFrame: 0,        // Current animation frame
    // Saved state mirror — actual save/restore is owned by previewLoader
    savedSprite: null,
    savedFileName: null,
    savedSetupState: null,
    savedSpriteColors: null,
    savedCurrentFrame: 0,
    savedCurrentQuad: 0
};

// Save mode state
let saveMode = {
    active: false,
    fileName: '',           // The filename being edited
    confirmingOverwrite: false  // True when showing overwrite confirmation
};

// c64Screen for preview rendering
let previewScreen = null;

// Initialize
document.addEventListener("DOMContentLoaded", initApp, false);

// Clamp all sprite positions to keep them on screen
function clampAllSpritePositions() {
    if (!currentSprite) return;

    const xDouble = currentSprite.sprite[0].xDouble ? 2 : 1;
    const yDouble = currentSprite.sprite[0].yDouble ? 2 : 1;
    const spriteWidth = 12 * xDouble;
    const spriteHeight = 21 * yDouble;

    // Clamp quad 0's absolute position
    const quad0 = currentSprite.sprite[0];
    quad0.xPosition = Math.max(0, Math.min(160 - spriteWidth, quad0.xPosition));
    quad0.yPosition = Math.max(0, Math.min(200 - spriteHeight, quad0.yPosition));

    // Clamp quads 1-3's absolute positions, then back-calculate relative
    for (let i = 1; i < currentSprite.sprite.length; i++) {
        const quad = currentSprite.sprite[i];
        const absX = quad0.xPosition + quad.xPosition;
        const absY = quad0.yPosition + quad.yPosition;

        const clampedAbsX = Math.max(0, Math.min(160 - spriteWidth, absX));
        const clampedAbsY = Math.max(0, Math.min(200 - spriteHeight, absY));

        quad.xPosition = clampedAbsX - quad0.xPosition;
        quad.yPosition = clampedAbsY - quad0.yPosition;
    }
}

// Convert mouse event to GM fat pixel coordinates
function mouseToGmCoords(e) {
    const preview = document.getElementById('preview');
    const rect = preview.getBoundingClientRect();

    // Canvas is 320x200 displayed at 480x400
    const scaleX = 320 / rect.width;
    const scaleY = 200 / rect.height;

    // Mouse position in screen pixels (0-319, 0-199)
    const screenX = (e.clientX - rect.left) * scaleX;
    const screenY = (e.clientY - rect.top) * scaleY;

    // Convert to GM coordinates (screen-relative: fat pixels for X, regular for Y)
    // screenX / 2 gives fat pixels
    const gmX = Math.floor(screenX / 2);
    const gmY = Math.floor(screenY);

    return { x: gmX, y: gmY };
}

function getQuadAtPosition(gmX, gmY) {
    // Check which quad (if any) contains this position
    // Check in reverse order so front quads are hit first
    const xDouble = currentSprite.sprite[0].xDouble ? 2 : 1;
    const yDouble = currentSprite.sprite[0].yDouble ? 2 : 1;
    const spriteWidth = 12 * xDouble;
    const spriteHeight = 21 * yDouble;

    for (let q = positioningMode.positions.length - 1; q >= 0; q--) {
        const pos = positioningMode.positions[q];

        // Calculate absolute position
        let absX, absY;
        if (q === 0) {
            absX = pos.x;
            absY = pos.y;
        } else {
            absX = positioningMode.positions[0].x + pos.x;
            absY = positioningMode.positions[0].y + pos.y;
        }

        // Check if click is within this quad's bounds
        if (gmX >= absX && gmX < absX + spriteWidth &&
            gmY >= absY && gmY < absY + spriteHeight) {
            return q;
        }
    }

    return -1; // No quad at this position
}

function positioningMouseDown(e) {
    if (!positioningMode.active) return;

    const gmCoords = mouseToGmCoords(e);
    const clickedQuad = getQuadAtPosition(gmCoords.x, gmCoords.y);

    // If clicked on background (no quad), do nothing
    if (clickedQuad === -1) {
        e.preventDefault();
        return;
    }

    // If clicked on a different quad, switch to it
    if (clickedQuad !== positioningMode.currentQuad) {
        positioningMode.currentQuad = clickedQuad;
        updatePreviewWithPositioning();
    }

    const q = positioningMode.currentQuad;
    const pos = positioningMode.positions[q];

    // Calculate the quad's current absolute position
    let absX, absY;
    if (q === 0) {
        absX = pos.x;
        absY = pos.y;
    } else {
        absX = positioningMode.positions[0].x + pos.x;
        absY = positioningMode.positions[0].y + pos.y;
    }

    // Store drag start info
    positioningMode.dragging = true;
    positioningMode.dragStart = {
        mouseX: gmCoords.x,
        mouseY: gmCoords.y,
        quadAbsX: absX,
        quadAbsY: absY
    };

    e.preventDefault();
}

function positioningMouseMove(e) {
    if (!positioningMode.active || !positioningMode.dragging) return;

    const gmCoords = mouseToGmCoords(e);
    const q = positioningMode.currentQuad;
    const pos = positioningMode.positions[q];
    const start = positioningMode.dragStart;

    // Calculate new absolute position based on drag delta
    const dx = gmCoords.x - start.mouseX;
    const dy = gmCoords.y - start.mouseY;
    let newAbsX = start.quadAbsX + dx;
    let newAbsY = start.quadAbsY + dy;

    // Clamp to screen bounds
    const xDouble = currentSprite.sprite[0].xDouble ? 2 : 1;
    const yDouble = currentSprite.sprite[0].yDouble ? 2 : 1;
    const spriteWidth = 12 * xDouble;
    const spriteHeight = 21 * yDouble;

    newAbsX = Math.max(0, Math.min(160 - spriteWidth, newAbsX));
    newAbsY = Math.max(0, Math.min(200 - spriteHeight, newAbsY));

    if (q === 0) {
        // Calculate actual movement
        const actualDx = newAbsX - pos.x;
        const actualDy = newAbsY - pos.y;

        pos.x = newAbsX;
        pos.y = newAbsY;

        // Adjust other quads so they stay in place
        for (let i = 1; i < positioningMode.positions.length; i++) {
            positioningMode.positions[i].x -= actualDx;
            positioningMode.positions[i].y -= actualDy;
        }
    } else {
        // Set relative position
        pos.x = newAbsX - positioningMode.positions[0].x;
        pos.y = newAbsY - positioningMode.positions[0].y;
    }

    updatePreviewWithPositioning();
}

function positioningMouseUp(e) {
    if (!positioningMode.active) return;
    positioningMode.dragging = false;
    positioningMode.dragStart = null;
}

// ==================== MESSAGE AREA ====================

// Track current sprite name for display
function showMessage(text) {
    document.getElementById('messageArea').innerHTML = text;
}

function clearMessage() {
    // Clear the message area (use innerHTML to fully clear any styled content)
    const messageArea = document.getElementById('messageArea');
    messageArea.innerHTML = '';
    // Force Safari to repaint by toggling display
    messageArea.style.display = 'none';
    void messageArea.offsetHeight;
    messageArea.style.display = '';
}

// ==================== BUTTON HANDLERS ====================
// Buttons change based on mode (normal vs cmd)

function btn1Click() {
    if (animaMode.active) return; // Disabled during animation
    if (flipMode.active) return;  // Already in flip mode
    if (shiftMode.active) return; // Disabled during shift
    if (clearMode.active) return; // Disabled during clear
    if (copyMode.active) return;  // Disabled during copy
    if (swapMode.active) return;  // Disabled during color swap
    if (loadMode.active) return;  // Disabled during load
    if (GMTools.quitMenu.isOpen()) return;  // Disabled during quit menu
    if (fileMenuMode.active) {
        // disk - show disk popup
        showDiskPopup();
    } else if (cmdMode) {
        // flip - enter flip mode
        enterFlipMode();
    } else {
        // setup
        showSetupPanel();
    }
}

function btn2Click() {
    if (animaMode.active) {
        // ok - exit anima mode
        exitAnimaMode();
    } else if (flipMode.active) {
        // ok - exit flip mode
        exitFlipMode();
    } else if (shiftMode.active) {
        // ok - exit shift mode
        exitShiftMode();
    } else if (clearMode.active) {
        // ok - cancel clear (same as clicking no)
        confirmClear(false);
    } else if (copyMode.active) {
        // ok - cancel copy (same as clicking no)
        confirmCopy(false);
    } else if (loadMode.active) {
        // Buttons disabled during load mode (yes/no are in message area)
        return;
    } else if (positioningMode.active) {
        // ok - confirm positioning
        exitPositioningMode(true);
    } else if (fileMenuMode.active) {
        // menu - exit file menu mode
        exitFileMenuMode();
    } else if (cmdMode) {
        // ok - exit cmd mode
        exitCmdMode();
    } else if (setupPanelOpen) {
        // ok - close setup panel
        setupOK();
    } else {
        // menu
        quitEditor();
    }
}

function btn3Click() {
    if (animaMode.active) return; // Already in anima mode
    if (flipMode.active) return;  // Disabled during flip
    if (shiftMode.active) return; // Disabled during shift
    if (clearMode.active) return; // Disabled during clear
    if (copyMode.active) return;  // Disabled during copy
    if (swapMode.active) return;  // Disabled during color swap
    if (loadMode.active) return;  // Disabled during load (yes/no are in message area)
    if (GMTools.quitMenu.isOpen()) return;  // Disabled during quit menu

        // load - enter load mode
        enterLoadMode();

        // anima - enter animation mode
        enterAnimaMode();
    } else {
        // cmd - enter cmd mode
        enterCmdMode();
    }
}

function btn4Click() {
    if (animaMode.active) return; // Disabled during animation
    if (flipMode.active) return;  // Disabled during flip
    if (shiftMode.active) return; // Disabled during shift
    if (clearMode.active) return; // Already in clear confirmation

function btn5Click() {

function btn6Click() {

// "swap" button in the cmd submenu. Exits cmd mode first because
// enterSwapMode refuses to start while cmd mode is active (mutually
// exclusive modes). Defaults to slot 1 → slot 2; both are user-changeable
// via the in-message dropdowns.
function btn8Click() {
    if (!cmdMode) return;
    // Refuse if a cmd submode is currently active. The button is visually
    // blanked in those modes (same as btn1/4/5/6) but the click handler
    // is still attached, so we have to gate here too.
    if (animaMode.active || flipMode.active || clearMode.active ||
        shiftMode.active || copyMode.active) return;
    exitCmdMode();
    enterSwapMode(1);
}

function enterCmdMode() {
    cmdMode = true;

    // Change button text and add red styling
    document.getElementById('btn1').textContent = 'flip';
    document.getElementById('btn1').classList.add('cmd-mode');

    document.getElementById('btn2').textContent = 'ok';
    document.getElementById('btn2').classList.add('cmd-mode');

    document.getElementById('btn3').textContent = 'anima';
    document.getElementById('btn3').classList.add('cmd-mode');

    document.getElementById('btn4').textContent = 'clear';
    document.getElementById('btn4').classList.add('cmd-mode');

    document.getElementById('btn5').textContent = 'shift';
    document.getElementById('btn5').classList.add('cmd-mode');

    document.getElementById('btn6').textContent = 'copy';
    document.getElementById('btn6').classList.add('cmd-mode');

    // Extra cmd-submenu row (blank + swap). Display: '' restores the grid

    document.getElementById('btn7').style.display = '';

    // Restore normal button text and remove red styling
    document.getElementById('btn1').textContent = 'setup';
    document.getElementById('btn1').classList.remove('cmd-mode');

    document.getElementById('btn2').textContent = LABEL_MENU;
    document.getElementById('btn2').classList.remove('cmd-mode');
    // Prevent the click that exited cmd mode from also triggering 'quit'
    GMTools.armClickCooldown(document.getElementById('btn2'));

    document.getElementById('btn3').textContent = 'cmd';
    document.getElementById('btn3').classList.remove('cmd-mode');

    document.getElementById('btn4').textContent = 'file';
    document.getElementById('btn4').classList.remove('cmd-mode');

    updateFrameButton();
    document.getElementById('btn5').classList.remove('cmd-mode');

    updateQuadButton();
    document.getElementById('btn6').classList.remove('cmd-mode');

    // Tear down the extra cmd-only row.
    document.getElementById('btn7').style.display = 'none';
    document.getElementById('btn7').classList.remove('cmd-mode');
    document.getElementById('btn8').style.display = 'none';
    document.getElementById('btn8').classList.remove('cmd-mode');
}
