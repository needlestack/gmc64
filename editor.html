        document.body.classList.remove('kbd-active');
        document.removeEventListener('mousemove', restore);
    };
    document.addEventListener('mousemove', restore);
}

function onEditorClick(e) {
    // Close asset picker on click outside
    if (assetPickerActive &&
        !e.target.closest('#assetPicker') &&
        !e.target.classList.contains('editable-field')) {
        hideAssetPicker();
    }

    // Exit arg edit mode on click (unless clicking an editable field or instruction picker)
    if (argEditMode &&
        !e.target.classList.contains('editable-field') &&
        !e.target.classList.contains('instruction-item') &&
        !e.target.closest('#instructionPicker') &&
        !e.target.closest('#assetPicker')) {
        exitArgEditMode();
    }
}

function onEditorKeyDown(e) {
    // Ignore if game is running (or paused but overlay visible) or editing a text field.
    // Primary blocking is via stopImmediatePropagation in game handlers, but this
    // provides a secondary check in case event order differs across browsers.
    if (vm && vm.running) return;
    if (document.getElementById('gameOverlay').classList.contains('active')) return;
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (document.querySelector('.string-edit-input')) return; // Text edit mode

    // Any editor keystroke means the user's eye is on keyboard focus,
    // not where the mouse happens to be parked. Suppress hover until the
    // mouse actually moves (one-shot listener restores it).
    suppressHoverUntilMouseMove();

    // Cmd+C / Ctrl+C - copy selected lines or all lines to clipboard
    if ((e.metaKey || e.ctrlKey) && e.key === 'c') {
        e.preventDefault();
        copyProgramListing();
        return;
    }

    // Asset picker takes priority when active
    if (assetPickerActive) {
        if (handleAssetPickerKey(e)) return;
    }

    // Handle keyboard input for selected numeric field
    if (selectedField && handleSelectedFieldKey(e)) {
        return;
    }

    if (argEditMode) {
        handleArgEditKey(e);
    } else {
        handleSearchKey(e);
    }
}

// Handle keyboard input when a numeric field is selected
function handleSelectedFieldKey(e) {
    const type = selectedField.dataset.type;

    // Escape or Enter clears selection
    if (e.key === 'Escape' || e.key === 'Enter') {
        e.preventDefault();
        clearFieldSelection();
        return true;
    }

    // Tab — move selection to the next editable field. Within a multi-arg
    // line that's arg1 → arg2 (Shift+Tab reverses); at line boundaries it
    // hops to the first/last field of the next/prev arg-bearing line.
    if (e.key === 'Tab') {
        e.preventDefault();
        const direction = e.shiftKey ? -1 : 1;
        const currentLine = parseInt(selectedField.dataset.lineIndex);
        const allLines = document.querySelectorAll('.program-line');
        const currentLineEl = allLines[currentLine];
        const fieldsOnLine = currentLineEl
            ? Array.from(currentLineEl.querySelectorAll('.editable-field'))
            : [];
        const currentIdx = fieldsOnLine.indexOf(selectedField);
        const nextIdx = currentIdx + direction;

        let nextField = null;
        if (nextIdx >= 0 && nextIdx < fieldsOnLine.length) {
            // Stay on this line
            nextField = fieldsOnLine[nextIdx];
        } else {
            // Hop to next/prev arg-bearing line
            const newLineIndex = _findNextArgEditableLine(currentLine, direction);
            if (newLineIndex !== -1) {
                const newLineEl = allLines[newLineIndex];
                const fieldsOnNewLine = newLineEl
                    ? Array.from(newLineEl.querySelectorAll('.editable-field'))
                    : [];
                if (fieldsOnNewLine.length > 0) {
                    nextField = direction > 0
                        ? fieldsOnNewLine[0]
                        : fieldsOnNewLine[fieldsOnNewLine.length - 1];
                    // Move the cursor block / line selection to follow
                    selectedLineIndex = newLineIndex;
                    selectedLines.clear();
                    selectedLines.add(newLineIndex);
                    updateLineSelectionUI();
                }
            }
        }

        if (nextField) {
            clearFieldSelection();
            nextField.classList.add('selected');
            selectedField = nextField;
            fieldInputBuffer = '';
        }
        return true;
    }

    // Number keys (0-9) - type to set value
    if (e.key >= '0' && e.key <= '9') {
        e.preventDefault();

        const lineIndex = parseInt(selectedField.dataset.lineIndex);
        const argNum = parseInt(selectedField.dataset.argNum);
        const displayOffset = parseInt(selectedField.dataset.offset) || 0;
        const instr = currentProgramData.instructions[lineIndex];
        const range = getFieldRange(type);

        // For list-mode fields (assets), don't allow typing
        if (range.list) {
            return true;
        }

        // Save undo state on first keypress
        if (fieldInputBuffer === '') {
            saveUndoState();
        }

        // Append digit to buffer
        fieldInputBuffer += e.key;

        // Convert the typed display value to storage. Several types display
        // a value offset from the raw storage (e.g. `sprite` formatter does
        // +1 so storage 0 displays "1"); typing "1" should write storage 0,
        // not storage 1. _typedToStorage handles all such cases by asking the
        // formatter what the display looks like for the min storage value.
        let typed = parseInt(fieldInputBuffer, 10);
        const maxTyped = _maxTypedDisplay(type, displayOffset, instr, range);
        if (typed > maxTyped) {
            fieldInputBuffer = e.key;
            typed = parseInt(e.key, 10);
        }
        let newValue = _typedToStorage(type, displayOffset, instr, typed, range);
        newValue = Math.max(range.min, Math.min(range.max, newValue));

        // Update instruction
        if (argNum === 1) {
            instr.arg1 = newValue;
        } else {
            instr.arg2 = newValue;
        }

        // Update display
        selectedField.textContent = formatFieldValue(type, newValue + displayOffset, instr);
        updateInstructionName(instr);
        saveCurrentProgram();

        return true;
    }

    // Backspace - remove last digit
    if (e.key === 'Backspace') {
        e.preventDefault();

        if (fieldInputBuffer.length > 0) {
            const lineIndex = parseInt(selectedField.dataset.lineIndex);
            const argNum = parseInt(selectedField.dataset.argNum);
            const displayOffset = parseInt(selectedField.dataset.offset) || 0;
            const instr = currentProgramData.instructions[lineIndex];
            const range = getFieldRange(type);

            if (range.list) return true;

            fieldInputBuffer = fieldInputBuffer.slice(0, -1);

            let newValue;
            if (fieldInputBuffer.length > 0) {
                const typed = parseInt(fieldInputBuffer, 10);
                newValue = _typedToStorage(type, displayOffset, instr, typed, range);
            } else {
                newValue = range.min;
            }
            newValue = Math.max(range.min, Math.min(range.max, newValue));

            if (argNum === 1) {
                instr.arg1 = newValue;
            } else {
                instr.arg2 = newValue;
            }

            selectedField.textContent = formatFieldValue(type, newValue + displayOffset, instr);
            updateInstructionName(instr);
            saveCurrentProgram();
        }

        return true;
    }

    // Arrow keys - increment/decrement
    if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
        e.preventDefault();

        const lineIndex = parseInt(selectedField.dataset.lineIndex);
        const argNum = parseInt(selectedField.dataset.argNum);
        const displayOffset = parseInt(selectedField.dataset.offset) || 0;
        const instr = currentProgramData.instructions[lineIndex];

        saveUndoState();

        const currentValue = argNum === 1 ? instr.arg1 : instr.arg2;
        const delta = e.key === 'ArrowUp' ? 1 : -1;
        const newValue = _nextFieldValue(type, currentValue, delta);

        if (argNum === 1) {
            instr.arg1 = newValue;
        } else {
            instr.arg2 = newValue;
        }

        fieldInputBuffer = String(newValue);
        selectedField.textContent = formatFieldValue(type, newValue + displayOffset, instr);
        updateInstructionName(instr);
        saveCurrentProgram();

        return true;
    }

    return false;
}

function handleSearchKey(e) {
    // Enter - insert the picker's highlighted instruction. Works whether
    // the user typed a search or just navigated the picker with arrows —
    // the highlighted line is always insertable while the picker has
    // focus (which it does whenever no field/asset-picker/arg-edit is
    // taking input).
    if (e.key === 'Enter') {
        e.preventDefault();
        const op = instructionOpcodes[selectedInstructionIndex];
        if (op) {
            clearInstructionSearch();
            placeInstructionAtCursor(op.opcode);
        }
        return;
    }

    // Escape - clear search
    if (e.key === 'Escape') {
        clearInstructionSearch();
        renderInstructionList();
        return;
    }

    // Backspace - remove last character from search
    if (e.key === 'Backspace') {
        e.preventDefault();
        if (instructionSearchText.length > 0) {
            instructionSearchText = instructionSearchText.slice(0, -1);
            findMatchingInstruction();
        }
        return;
    }

    // Arrow keys - navigate instruction list
    if (e.key === 'ArrowDown') {
        e.preventDefault();
        selectInstruction(Math.min(selectedInstructionIndex + 1, instructionOpcodes.length - 1));
        scrollSelectedInstructionIntoView();
        return;
    }
    if (e.key === 'ArrowUp') {
        e.preventDefault();
        selectInstruction(Math.max(selectedInstructionIndex - 1, 0));
        scrollSelectedInstructionIntoView();
        return;
    }

    // Letter keys - add to search. "/" included so users can type
    // names like "/ comment".
    if (e.key.length === 1 && /[a-zA-Z \/]/.test(e.key) && !e.ctrlKey && !e.metaKey) {
        instructionSearchText += e.key;
        findMatchingInstruction();

        // Clear search after timeout
        if (instructionSearchTimeout) clearTimeout(instructionSearchTimeout);
        instructionSearchTimeout = setTimeout(clearInstructionSearch, 1500);
    }
}

// Walk the instruction list in `direction` (±1) and return the first index
// past `currentLine` whose instruction has at least one numeric/arg field
// (comments and prints have string args which the arg-edit UI can't drive,
// so they're skipped — those open via click on the text field instead).
// Returns -1 if no such line exists in that direction.
// Returns the sorted list of arg slot numbers (1 or 2) that have
// editable fields for this opcode. An entry of 'unused' in opDef.args
// has no template placeholder and therefore no editable field, so we
// filter it out here. Arg slots align positionally with arg1 / arg2
// in the bytecode, so the value is 1-based.
function _editableArgNums(opDef) {
    if (!opDef || !opDef.args) return [];
    const nums = [];
    for (let i = 0; i < opDef.args.length; i++) {
        if (opDef.args[i] !== 'unused') nums.push(i + 1);
    }
    return nums;
}

function _findNextArgEditableLine(currentLine, direction) {
    const instructions = currentProgramData.instructions;
    let i = currentLine + direction;
    while (i >= 0 && i < instructions.length) {
        const instr = instructions[i];
        // Skip comment (0x2B) and print (0x3B) — they're text fields, not arg fields
        if (instr.opcode !== 0x2B && instr.opcode !== 0x3B) {
            const opDef = gmOpcodes[instr.opcode];
            if (_editableArgNums(opDef).length > 0) return i;
        }
        i += direction;
    }
    return -1;
}

function handleArgEditKey(e) {
    const instr = currentProgramData.instructions[argEditLineIndex];
    if (!instr) {
        exitArgEditMode();
        return;
    }

    const opDef = gmOpcodes[instr.opcode];
    const editableNums = _editableArgNums(opDef);

    // Tab — advance to the next editable field. Within a multi-arg line that
    // means the next editable arg slot; at the end of the line we hop to the
    // first arg of the next instruction line that has args (Shift+Tab reverses).
    // Comments and prints are skipped — they use a different text-input UI;
    // click to edit those directly.
    if (e.key === 'Tab') {
        e.preventDefault();
        const direction = e.shiftKey ? -1 : 1;
        const curPos = editableNums.indexOf(argEditArgNum);
        const nextPos = curPos + direction;

        if (nextPos >= 0 && nextPos < editableNums.length) {
            argEditArgNum = editableNums[nextPos];
        } else {
            const newLineIndex = _findNextArgEditableLine(argEditLineIndex, direction);
            if (newLineIndex === -1) {
                // No next editable line — treat Tab as Enter so the user
                // ends up on a blank line ready to insert the next
                // instruction (instead of being stuck on the current arg).
                exitArgEditMode();
                return;
            }

            const newInstr = currentProgramData.instructions[newLineIndex];
            const newEditableNums = _editableArgNums(gmOpcodes[newInstr.opcode]);

            argEditLineIndex = newLineIndex;
            argEditArgNum = direction > 0
                ? newEditableNums[0]
                : newEditableNums[newEditableNums.length - 1];

            // Move the cursor block + line selection along with the focused field
            selectedLineIndex = newLineIndex;
            selectedLines.clear();
            selectedLines.add(newLineIndex);
        }

        argEditValue = '';
        renderProgramListing();
        highlightCurrentArg();
        return;
    }

    // Arrow up/down - increment/decrement value
    if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
        e.preventDefault();
        const delta = e.key === 'ArrowUp' ? 1 : -1;
        const argType = opDef.args[argEditArgNum - 1];
        const currentVal = argEditArgNum === 1 ? instr.arg1 : instr.arg2;
        const newVal = _nextFieldValue(argType, currentVal, delta);

        if (argEditArgNum === 1) instr.arg1 = newVal;
        else                     instr.arg2 = newVal;

        argEditValue = '';
        updateInstructionName(instr);
        renderProgramListing();
        highlightCurrentArg();
        return;
    }

    // Enter or Escape - exit arg edit mode
    if (e.key === 'Enter' || e.key === 'Escape') {
        e.preventDefault();
        exitArgEditMode();
        return;
    }

    // Single-character typing. Dispatched type-first so each arg type
    // owns its accepted input modes and explicitly ignores everything
    // else — keeps wrong-mode keys (e.g. digits on a `var` field) from
    // falling through to a branch that happens to accept them.
    if (e.key.length === 1 && !e.ctrlKey && !e.metaKey) {
        const argType = opDef.args[argEditArgNum - 1];
        const isAlpha = /[a-zA-Z]/.test(e.key);
        const isDigit = /[0-9]/.test(e.key);

        // Enum types accept letters via cycle. Digits cycle only for the
        // subset whose displays contain meaningful digits (ENUM_DIGIT_CYCLE);
        // for direction, digit keys fall through to the numeric path below
        // so the user can type the raw 0-255 byte value directly.
        if (ENUM_ARG_TYPES.includes(argType)) {
            const cycleThis = isAlpha || (isDigit && ENUM_DIGIT_CYCLE.includes(argType));
            if (cycleThis) {
                const currentValue = argEditArgNum === 1 ? instr.arg1 : instr.arg2;
                const newValue = findEnumValueForKey(argType, e.key, currentValue, instr);
                if (newValue >= 0) {
                    if (argEditArgNum === 1) instr.arg1 = newValue;
                    else                     instr.arg2 = newValue;
                    // Reset the digit accumulator — without this, a
                    // subsequent numeric keystroke would append to a
                    // stale buffer (e.g. typing "r" then "1" on direction
                    // would interpret "1" as "<old buffer>1").
                    argEditValue = '';
                    updateInstructionName(instr);
                    renderProgramListing();
                    highlightCurrentArg();
                }
                return;
            }
            // Letters on pure-word enum or digit on alwaysOnce/onOff/etc.
            // → no useful input mode, ignore.
            if (isAlpha) return;
            // Digit + direction falls through to the numeric branch below.
            if (argType !== 'direction') return;
        }

        // Variables accept LETTERS only (a-z → 1-26). Digits would
        // otherwise leak into the numeric branch below and write the
        // raw 1-26 storage value, which displays as a different letter
        // — confusing class of bug. Explicit return makes the
        // "letters only" rule load-bearing.
        if (argType === 'var') {
            if (isAlpha) {
                const varVal = e.key.toLowerCase().charCodeAt(0) - 96;
                if (varVal >= 1 && varVal <= 26) {
                    if (argEditArgNum === 1) instr.arg1 = varVal;
                    else                     instr.arg2 = varVal;
                    argEditValue = '';   // see enum branch comment
                    updateInstructionName(instr);
                    renderProgramListing();
                    highlightCurrentArg();
                }
            }
            return;
        }

        // Numeric types accept DIGITS only. Goes through the shared
        // _typedToStorage / _maxTypedDisplay helpers (also used by
        // handleSelectedFieldKey) so both arg-entry paths agree on how
        // typed digits map to stored values for every field type.
        if (isDigit) {
            const range = getFieldRange(argType);
            if (range.list) return; // Asset/list fields don't take typed values

            const tentative = argEditValue + e.key;
            const maxTyped = _maxTypedDisplay(argType, 0, instr, range);
            argEditValue = (parseInt(tentative, 10) > maxTyped) ? e.key : tentative;

            const typed = parseInt(argEditValue, 10);
            let newValue = _typedToStorage(argType, 0, instr, typed, range);
            newValue = Math.max(range.min, Math.min(range.max, newValue));
            if (argEditArgNum === 1) instr.arg1 = newValue;
            else                     instr.arg2 = newValue;
            updateInstructionName(instr);
            renderProgramListing();
            highlightCurrentArg();
            return;
        }
    }

    // Backspace - remove last character from search/value
    if (e.key === 'Backspace') {
        e.preventDefault();
        if (argEditValue.length > 0) {
            argEditValue = argEditValue.slice(0, -1);
            // Re-render to update the highlight display
            renderProgramListing();
            highlightCurrentArg();
        }
        return;
    }
}

// === VALUE CONVERSION SYSTEM ===
// GM stores values internally (bytecode) differently than displayed:
// - Formatters (in gmOpcodes.js gmTypeFormatters) convert internal → display
// - Ranges (getFieldRange) define valid internal values
// - _typedToStorage / _maxTypedDisplay derive the typed↔storage offset
//   per-type by ASKING the formatter what the min/max displays look like.
//   No per-type list to keep in sync — adding a new offset/scaled type
//   means writing its formatter and that's it.
//
// Example: scene type
// - Internal: 0, 1 (stored in bytecode)
// - Display: "1", "2" (shown to user via formatter `val + 1`)
// - User types "2" → _typedToStorage returns 1 (formatter min "1" → offset 1)
//
// All three input paths (drag-edit mouseup → handleSelectedFieldKey,
// arg-edit Tab-walk → handleArgEditKey, post-insert arg-edit) go through
// _typedToStorage so digit input behaves identically across them.

function enterArgEditMode(lineIndex) {
    const instr = currentProgramData.instructions[lineIndex];
    if (!instr) return;

    const opDef = gmOpcodes[instr.opcode];
    const editableNums = _editableArgNums(opDef);
    if (editableNums.length === 0) return;

    argEditMode = true;
    argEditLineIndex = lineIndex;
    // Start on the first editable arg slot — skips 'unused' so e.g.
    // "jump to label l001" (args=['unused','label']) lands on arg2.
    argEditArgNum = editableNums[0];
    argEditValue = '';

    highlightCurrentArg();
}

function exitArgEditMode() {
    // If the user is still parked on the line they were editing (i.e.
    // didn't click somewhere else mid-edit, which would have moved
    // selectedLineIndex), advance the cursor one line. Matches the
    // user-expectation that "I'm done editing → cursor moves forward."
    // Click-elsewhere cases hit this with selectedLineIndex already
    // changed, so the advance is skipped — the click wins.
    const wasOnEditLine = (selectedLineIndex === argEditLineIndex && argEditLineIndex >= 0);
    const exitedFrom = argEditLineIndex;

    argEditMode = false;
    argEditLineIndex = -1;
    argEditArgNum = 0;
    argEditValue = '';

    if (wasOnEditLine && currentProgramData?.instructions) {
        selectedLineIndex = Math.min(exitedFrom + 1, currentProgramData.instructions.length);
        selectedLines.clear();
        selectedLines.add(selectedLineIndex);
    }
    renderProgramListing();
}

function highlightCurrentArg() {
    // Remove existing highlight
    document.querySelectorAll('.editable-field.arg-editing').forEach(el => {
        el.classList.remove('arg-editing');
    });

    // Find by (lineIndex, argNum). The span's data-arg-num is the source
    // of truth for which storage slot it edits — same identifier
    // dragging and the click path already use, so all three operations
    // resolve to the same DOM element by construction.
    const programLines = document.querySelectorAll('.program-line');
    const line = programLines[argEditLineIndex];
    if (line) {
        const field = line.querySelector(`.editable-field[data-arg-num="${argEditArgNum}"]`);
        if (field) {
            field.classList.add('arg-editing');

            const instr = currentProgramData.instructions[argEditLineIndex];
            const opDef = gmOpcodes[instr.opcode];
            const argType = opDef && opDef.args ? opDef.args[argEditArgNum - 1] : null;

            // For asset types, open the asset picker
            if (argType && ASSET_ARG_TYPES[argType]) {
                // Use setTimeout to ensure DOM is ready. showAssetPicker
                // expects argIndex (0-based opDef.args index), not argNum.
                setTimeout(() => {
                    showAssetPicker(field, argType, argEditLineIndex, argEditArgNum - 1);
                }, 0);
            }
        }
    }
}

function findMatchingInstruction() {
    const searchLower = instructionSearchText.toLowerCase();
    for (let i = 0; i < instructionOpcodes.length; i++) {
        if (instructionOpcodes[i].name.toLowerCase().startsWith(searchLower)) {
            selectInstruction(i);
            scrollSelectedInstructionIntoView();
            renderInstructionList();
            return;
        }
    }
    // No match - just re-render to show current search
    renderInstructionList();
}

function clearInstructionSearch() {
    instructionSearchText = '';
    if (instructionSearchTimeout) {
        clearTimeout(instructionSearchTimeout);
        instructionSearchTimeout = null;
    }
    renderInstructionList();
}

function scrollSelectedInstructionIntoView() {
    const picker = document.getElementById('instructionPicker');
    const selected = picker.querySelector('.instruction-item.selected');
    if (selected) {
        selected.scrollIntoView({ block: 'nearest' });
    }
}

// Place instruction at cursor position.
// - On blank line (end): adds new instruction, cursor moves to next blank line
// - On existing instruction: replaces it (preserving label), cursor moves to next line
// After placing, auto-enters text edit mode (for comments/print) or arg edit mode
// (for instructions with editable args) for efficient keyboard-driven editing.
function placeInstructionAtCursor(opcode) {
    if (!currentProgramData) {
        currentProgramData = {
            instructions: [],
            mediaStore: [null]
        };
    }

    const instructions = currentProgramData.instructions;

    // If no line selected, default to end (blank line)
    if (selectedLineIndex < 0) {
        selectedLineIndex = instructions.length;
    }

    const cost = getInstructionCost(opcode);
    const isBlankLine = selectedLineIndex >= instructions.length;

    // Calculate net cost (new cost minus old cost if replacing)
    let netCost = cost;
    if (!isBlankLine) {
        const oldCost = getInstructionCost(instructions[selectedLineIndex].opcode);
        netCost = cost - oldCost;
    }

    // Check for out of memory
    if (netCost > 0 && calculateFreeBlocks() < netCost) {
        showOutOfMemory();
        return;
    }

    // Save undo state
    saveUndoState();

    // Create new instruction with default args
    const opDef = gmOpcodes[opcode];
    const newInstr = {
        opcode: opcode,
        arg1: opDef && opDef.args && opDef.args[0] ? getDefaultArg(opDef.args[0]) : 0,
        arg2: opDef && opDef.args && opDef.args[1] ? getDefaultArg(opDef.args[1]) : 0,
        label: 0,
        instructionName: ''
    };

    // Generate instruction name
    newInstr.instructionName = formatInstruction(
        newInstr.opcode,
        newInstr.arg1,
        newInstr.arg2,
        currentProgramData.mediaStore,
        c64ColorNames
    );

    // A new comment should start blank — the generic string formatter would
    // otherwise fill it with placeholder underscores (intentional for print
    // statements, not for comments).
    if (newInstr.opcode === 0x2B) {
        newInstr.instructionName = '/ ';
    }

    const insertedIndex = isBlankLine ? instructions.length : selectedLineIndex;

    if (isBlankLine) {
        instructions.push(newInstr);
    } else {
        // Replace existing instruction (preserve label)
        const existingLabel = instructions[selectedLineIndex].label;
        newInstr.label = existingLabel;
        instructions[selectedLineIndex] = newInstr;
    }

    // Cursor stays on the inserted line while the user finishes editing
    // its args or text — advancing immediately makes the cursor block
    // visually compete with the field being edited. Advancement happens
    // on exit: exitArgEditMode for arg fields, saveEdit for comment/print.
    // For no-args instructions there's nothing to edit, so advance now.
    const hasArgs = opDef && opDef.args && opDef.args.length > 0;
    const isTextEdit = opcode === 0x2B || opcode === 0x3B;
    if (!hasArgs && !isTextEdit) {
        selectedLineIndex = insertedIndex + 1;
    } else {
        selectedLineIndex = insertedIndex;
    }
    selectedLines.clear();
    selectedLines.add(selectedLineIndex);

    renderProgramListing();
    scrollToSelectedLine();

    // Auto-enter text edit mode for comments and print statements
    if (isTextEdit) {
        const programLines = document.querySelectorAll('.program-line');
        const insertedLine = programLines[insertedIndex];
        if (insertedLine) {
            const editableField = insertedLine.querySelector('.editable-field');
            if (editableField) editableField.click();
        }
    } else if (hasArgs) {
        enterArgEditMode(insertedIndex);
    }
}

// Get default value for an argument type. For any type whose getArgRange
// has min > 0, an explicit case is required here — otherwise the default
// is below the legal range and the inserted line displays a value the
// user can't even drag to (since drag clamps to [min, max]). Each case
// below mirrors its getArgRange's min.
function getDefaultArg(argType) {
    switch (argType) {
        case 'var': return 1;        // 1-26 (a-z)
        case 'label': return 1;      // labels are 1-255
        case 'seconds': return 1;    // 0.1s — zero-duration pause is nonsense
        case 'color23': return 1;    // 1=colr2, 2=colr3 (no colr1 in shared)
        case 'rndRange': return 1;   // "rnd 0..0" would always return 0
        case 'sprite': return 0;
        case 'color':
        case 'colorName': return 0;
        case 'num': return 0;
        default: return 0;
    }
}

// Scroll program area to keep selected line visible
function scrollToSelectedLine() {
    const programArea = document.getElementById('programArea');
    const selectedEl = programArea.querySelector('.program-line.selected');
    if (selectedEl) {
        selectedEl.scrollIntoView({ block: 'nearest' });
    }
}

function selectInstruction(index) {
    selectedInstructionIndex = index;
    // Update selection visually without full re-render
    document.querySelectorAll('#instructionPicker .instruction-item').forEach((el, i) => {
        el.classList.toggle('selected', i === index);
    });
}

// Get memory cost for an instruction opcode
function getInstructionCost(opcode) {
    if (opcode === 0x2B) return 7;  // Comment: 28 bytes = 7 units
    if (opcode === 0x3B) return 6;  // Print: 24 bytes = 6 units
    return 1;                        // Normal: 4 bytes = 1 unit
}


// === PROGRAM DISPLAY ===

// Editing state
let activeField = null;  // Currently active editable field (during drag)
let activeFieldPointerId = undefined;  // Pointer ID captured by activeField (for pointer capture / cleanup)
let selectedField = null;  // Currently selected field (for keyboard input)
let fieldInputBuffer = '';  // Buffer for typed digits
let dragStartY = 0;      // Y position when drag started
let dragStartValue = 0;  // Value when drag started

function renderProgramListing() {
    // Persist the edited program to localStorage (debounced) so unsaved work
    // survives navigating to another editor and back.
    _scheduleSessionSave();

    const listing = document.getElementById('programListing');
    listing.innerHTML = '';

    if (!currentProgramData || !currentProgramData.instructions) {
        return;
    }

    const instructions = currentProgramData.instructions;
    let indentLevel = 0;

    for (let i = 0; i < instructions.length; i++) {
        const instr = instructions[i];
        const div = document.createElement('div');
        div.className = 'program-line';
        div.dataset.index = i;

        // Adjust indent for endif/otherwise before rendering
        if (instr.opcode === 0x55 || instr.opcode === 0x54) {
            indentLevel = Math.max(0, indentLevel - 1);
        }

        // Add class for line type and selection state
        if (i === selectedLineIndex) {
            div.classList.add('selected');
        } else if (selectedLines.has(i)) {
            div.classList.add('multi-selected');
        }
        if (instr.opcode === 0x2B) {
            // Comment
            div.classList.add('comment-line');
        } else if (isIfOpcode(instr.opcode) || instr.opcode === 0x54 || instr.opcode === 0x55) {
            // Logic statement (if/otherwise/endif)
            div.classList.add('logic-line');
        }

        // Label column (editable)
        const labelSpan = document.createElement('span');
        labelSpan.className = 'label';
        labelSpan.dataset.lineIndex = i;
        if (instr.label > 0) {
            labelSpan.textContent = 'l' + instr.label.toString().padStart(3, '0');
        }
        labelSpan.addEventListener('pointerdown', onLabelMouseDown);
        div.appendChild(labelSpan);

        // Cursor block (between label and instruction)
        const cursorBlock = document.createElement('span');
        cursorBlock.className = 'cursor-block';
        div.appendChild(cursorBlock);

        // Instruction column with indent and editable fields
        const instrSpan = document.createElement('span');
        instrSpan.className = 'instruction';
        const indent = '  '.repeat(indentLevel);
        instrSpan.appendChild(document.createTextNode(indent));

        // Render instruction with editable fields
        renderEditableInstruction(instrSpan, instr, i);
        div.appendChild(instrSpan);

        div.onclick = (e) => {
            // Only select line if not clicking an editable field. Drag-select
            // (mousedown on the line div) also handles selection, so we skip
            // the click if a drag just happened.
            if (e.target.classList.contains('editable-field')) return;
            if (lineDrag.dragHappened) {
                lineDrag.dragHappened = false;
                return;
            }
            selectLine(i, e.shiftKey);
        };
        div.addEventListener('mousedown', (e) => onLineDragStart(e, i));
        listing.appendChild(div);

        // Increase indent after if/otherwise
        if (isIfOpcode(instr.opcode) || instr.opcode === 0x54) {
            indentLevel++;
        }
    }

    // Add blank line at end for adding new instructions
    const blankIndex = instructions.length;
    const blankDiv = document.createElement('div');
    blankDiv.className = 'program-line blank-line';
    blankDiv.dataset.index = blankIndex;

    if (blankIndex === selectedLineIndex) {
        blankDiv.classList.add('selected');
    } else if (selectedLines.has(blankIndex)) {
        blankDiv.classList.add('multi-selected');
    }

    // Empty label (same order as regular lines: label, cursor, instruction)
    const blankLabel = document.createElement('span');
    blankLabel.className = 'label';
    blankDiv.appendChild(blankLabel);

    // Cursor block
    const blankCursor = document.createElement('span');
    blankCursor.className = 'cursor-block';
    blankDiv.appendChild(blankCursor);

    // Empty instruction
    const blankInstr = document.createElement('span');
    blankInstr.className = 'instruction';
    blankInstr.innerHTML = '&nbsp;'; // Non-breaking space for clickable area
    blankDiv.appendChild(blankInstr);

    blankDiv.onclick = (e) => selectLine(blankIndex, e.shiftKey);
    listing.appendChild(blankDiv);

    // Update free blocks display
    updateFreeBlocks();
}

// Render instruction text with editable spans for each field
function renderEditableInstruction(container, instr, lineIndex) {
    const opDef = gmOpcodes[instr.opcode];

    // Comments and print statements - editable text field
    if (instr.opcode === 0x2B || instr.opcode === 0x3B) {
        const isComment = instr.opcode === 0x2B;
        const prefix = isComment ? '/ ' : 'print ';
        let text = instr.instructionName.startsWith(prefix)
            ? instr.instructionName.substring(prefix.length)
            : instr.instructionName;

        // Comments are space-padded, so trim trailing spaces for display
        // Print statements use 0x3B padding which shows as underscores - keep them
        if (isComment) {
            text = text.trimEnd();
        }

        container.appendChild(document.createTextNode(prefix));

        const span = document.createElement('span');
        span.className = 'editable-field';
        span.dataset.lineIndex = lineIndex;
        span.dataset.type = isComment ? 'comment' : 'print';
        span.textContent = text;
        span.addEventListener('click', onStringFieldClick);
        container.appendChild(span);
        return;
    }

    // If no template or no args, just show plain text
    if (!opDef || !opDef.template || !opDef.args || opDef.args.length === 0) {
        container.appendChild(document.createTextNode(instr.instructionName));
        return;
    }

    const template = opDef.template;
    // Match {type:argNum} or {type:argNum+offset} patterns
    const regex = /\{([^:}]+):(\d)(\+\d+)?\}/g;
    let lastIndex = 0;
    let match;
    // Templates can reference the same arg twice (e.g. `set {var:1} = {var:1}
    // + {num:2}`). Only the FIRST occurrence becomes an editable field —
    // subsequent occurrences render as plain text, kept in sync because the
    // whole line re-renders on every edit. This way Tab navigation /
    // highlightCurrentArg index naturally into the editable spans, with
    // count == opDef.args.length, no per-template fiddling.
    const seenArgs = new Set();

    while ((match = regex.exec(template)) !== null) {
        // Add literal text before this match
        if (match.index > lastIndex) {
            container.appendChild(document.createTextNode(template.substring(lastIndex, match.index)));
        }

        const type = match[1];
        const argNum = parseInt(match[2]);
        const displayOffset = match[3] ? parseInt(match[3]) : 0;  // e.g., +1 for 1-indexed display
        const value = argNum === 1 ? instr.arg1 : instr.arg2;
        const displayText = formatFieldValue(type, value + displayOffset, instr);

        if (seenArgs.has(argNum)) {
            // Mirror of a previous occurrence — plain text, no interaction.
            container.appendChild(document.createTextNode(displayText));
            lastIndex = match.index + match[0].length;
            continue;
        }
        seenArgs.add(argNum);

        // Create editable span
        const span = document.createElement('span');
        span.className = 'editable-field';
        span.dataset.lineIndex = lineIndex;
        span.dataset.argNum = argNum;
        span.dataset.type = type;
        span.dataset.offset = displayOffset;
        span.textContent = displayText;

        if (type === 'colorName') {
            // Use GMTools.draggableField for colour fields — gives us a
            // dropdown of all 16 C64 colours with swatches, plus drag/type-
            // search/arrow-key navigation. Replaces the cycle-on-drag handler
            // that other field types still use.
            attachColorDraggable(span, instr, argNum);
        } else {
            // Pointer Events unify mouse + touch + stylus. The handler
            // stays named onFieldMouseDown for git-blame continuity and
            // to keep the surrounding editor code (which references its
            // globals like activeField) intact.
            span.addEventListener('pointerdown', onFieldMouseDown);
        }

        container.appendChild(span);
        lastIndex = match.index + match[0].length;
    }

    // Add remaining literal text
    if (lastIndex < template.length) {
        container.appendChild(document.createTextNode(template.substring(lastIndex)));
    }
}

// Attach the shared draggable widget to a colorName field. Drag scrubs through
// colours, single-click opens a dropdown with C64-coloured swatches + names,
// typing letters search-filters the dropdown.
function attachColorDraggable(span, instr, argNum) {
    GMTools.draggableField.attach(span, {
        type: 'enum',
        values: Array.from({ length: 16 }, (_, i) => i),
        getValue: () => argNum === 1 ? instr.arg1 : instr.arg2,
        setValue: (v) => {
            saveUndoState();
            if (argNum === 1) instr.arg1 = v;
            else instr.arg2 = v;
            span.textContent = formatFieldValue('colorName', v, instr);
            updateInstructionName(instr);
            saveCurrentProgram();
        },
        // Used for typed-search matching ("re" → red)
        formatValue: (v) => c64ColorNames[v] || '',
        // Dropdown item: swatch chip + colour name
        renderItem: (v) => {
            const wrap = document.createElement('span');
            wrap.style.display = 'inline-flex';
            wrap.style.alignItems = 'center';
            wrap.style.gap = '6px';
            const swatch = document.createElement('span');
            const rgb = c64Palette[v];
            swatch.style.cssText = `display:inline-block;width:14px;height:14px;` +
                `background:rgb(${rgb[0]},${rgb[1]},${rgb[2]});border:1px solid var(--c64-black);`;
            const label = document.createElement('span');
            label.textContent = c64ColorNames[v];
            wrap.appendChild(swatch);
            wrap.appendChild(label);
            return wrap;
        }
    });
}

// Format a field value for display
function formatFieldValue(type, value, instr) {
    const formatter = gmTypeFormatters[type];
    if (formatter) {
        return formatter(value, currentProgramData ? currentProgramData.mediaStore : null, c64ColorNames);
    }
    return String(value);
}

// When the user types a number into an editable field, they're typing the
// DISPLAYED value, not the raw storage value. Several formatters add an
// offset (e.g. `sprite` shows storage 0 as "1"); typing 1 should then write
// storage 0. We derive the offset by asking the formatter what storage
// range.min looks like — if the formatter returns "1" for storage 0, the
// per-keystroke conversion is `storage = typed - 1`. Non-numeric formatters
// (e.g. colorName → "black") leave typed values unchanged so the existing
// behavior carries forward.
//
// Pulls a single number out of the formatter's output by stripping
// non-digit characters and parsing what's left. Concatenating works for:
//   - pure-digit displays:      "001"   → 1
//   - leading-word displays:    "sprite 1" → 1
//   - decimal displays:         "00.1"  → 1     (seconds: 0.1s = storage 1)
//                               "25.5"  → 255   (seconds: 25.5s = storage 255)
//   - dual-number displays:     "100  141°" → 100141 (direction's raw+degrees)
// The dual-number case ends up with a generous max-typed cap (whatever the
// concat of the max-value display is), which is fine — the actual range
// clamp downstream catches the real overflow.
function _extractDisplayNumber(str) {
    const digits = String(str).replace(/\D/g, '');
    return digits === '' ? NaN : parseInt(digits, 10);
}

function _typedToStorage(type, displayOffset, instr, typed, range) {
    const baseStr = formatFieldValue(type, range.min + displayOffset, instr);
    const baseDisplay = _extractDisplayNumber(baseStr);
    if (isNaN(baseDisplay)) return typed;
    return typed - (baseDisplay - range.min);
}

// The largest display number typing should accept before resetting the
// buffer. Same per-type derivation as _typedToStorage, with one
// type-specific override: `direction` caps at range.max because its
// display has two unrelated digit groups ("byte  degrees°") whose
// concatenation gives a huge nonsense max — e.g. formatter(255) =
// "255  357°" → 255357. We want typing past 255 to reset, not to grow
// to six digits before tripping the cap.
function _maxTypedDisplay(type, displayOffset, instr, range) {
    if (type === 'direction') return range.max;
    const maxStr = formatFieldValue(type, range.max + displayOffset, instr);
    const maxDisplay = _extractDisplayNumber(maxStr);
    return isNaN(maxDisplay) ? range.max : maxDisplay;
}

// Increment/decrement a field value by `delta` (+1 or -1). Used by both
// arg-edit paths (handleArgEditKey + handleSelectedFieldKey arrow keys)
// so they agree on edge behaviour. Clamps at the endpoints for every
// type — wraparound feels disorienting for both narrow enum lists and
// wide numeric ranges, so we stick with the unsurprising clamp.
function _nextFieldValue(type, currentVal, delta) {
    const range = getFieldRange(type);
    if (range.list) {
        const list = range.list;
        const start = list.indexOf(currentVal);
        const safeStart = start === -1 ? 0 : start;
        return list[Math.max(0, Math.min(list.length - 1, safeStart + delta))];
    }
    return Math.max(range.min, Math.min(range.max, currentVal + delta));
}

// Get the range of valid INTERNAL values for a field type
function getFieldRange(type) {
    // Data page types return list of valid indices
    if (type === 'spriteName' || type === 'sceneName' || type === 'sound' || type === 'song') {
        return getDataPageRange(type);
    }

    switch (type) {
        case 'var': return { min: 1, max: 26 };
        case 'num': return { min: 0, max: 255 };
        case 'label': return { min: 1, max: 255 };
        case 'sprite': return { min: 0, max: 7 };
        case 'hitTarget': return { min: 0, max: 9 };
        case 'scene': return { min: 0, max: 1 };  // Internal 0-1, displays as 1-2
        case 'sceneTarget': return { min: 0, max: 2 };  // 0=scene1, 1=scene2, 2=both
        case 'score': return { min: 0, max: 1 };  // Internal 0-1, displays as 1-2
        case 'color':
        case 'colorName': return { min: 0, max: 15 };
        case 'colorSlot': return { min: 0, max: 2 };  // Internal 0-2, displays as 1-3
        case 'plotColor': return { min: 0, max: 3 };  // Plot color: 0=bg, 1-3=scene colors
        case 'sceneColorSlot': return { min: 0, max: 3 };
        case 'color23': return { min: 1, max: 2 };
        case 'joystick': return { min: 0, max: 1 };
        case 'joyDir': return { min: 0, max: 4 };
        case 'button': return { min: 0, max: 1 };
        case 'channel': return { min: 0, max: 2 };
        case 'onOff': return { min: 0, max: 1 };
        case 'alwaysOnce': return { min: 0, max: 1 };
        case 'overUnder': return { min: 0, max: 1 };
        case 'direction': return { min: 0, max: 255 };
        case 'animSpeed': return { min: 0, max: 32 };
        case 'row': return { min: 0, max: 24 };
        case 'col': return { min: 0, max: 19 };
        case 'volume': return { min: 0, max: 15 };
        // seconds: storage × 0.1 = displayed seconds. Min storage is 1
        // (display "00.1") — a zero-duration pause is nonsense in GM.
        case 'seconds': return { min: 1, max: 255 };
        case 'scoreValue': return { min: 0, max: 100 };
        // scoreComp displays as internal × 1000; capping the internal
        // max at 100 keeps the displayed cap at 100000 (the practical
        // max for "if scoreN > XXXXXX" comparisons).
        case 'scoreComp': return { min: 0, max: 100 };
        case 'rndRange': return { min: 1, max: 255 };
        default: return { min: 0, max: 255 };
    }
}

// Get list of valid data page indices for a type
function getDataPageRange(type) {
    const typeMap = {
        'spriteName': 'sprite',
        'sceneName': 'scene',
        'sound': 'sound',
        'song': 'song'
    };
    const entryType = typeMap[type];

    const validIndices = [];
    if (currentProgramData && currentProgramData.mediaStore) {
        for (let i = 1; i < currentProgramData.mediaStore.length; i++) {
            const entry = currentProgramData.mediaStore[i];
            if (entry && entry.type === entryType) {
                validIndices.push(i);
            }
        }
    }

    // Return as list mode (not min/max)
    return { list: validIndices.length > 0 ? validIndices : [0] };
}

// Allowed characters in comment / print fields = the GM character set
// minus the underscore (which is reserved as the print-padding character).
// Source of truth: encodeChar() in c64lib.js. No '@' — the GM charset
// doesn't have one.
function filterGmInput(s) {
    return s.toLowerCase().replace(/[^a-z0-9 \/+\-=.'?\[\]<>]/g, '');
}

// Click on string field (comment/print) - show text input
function onStringFieldClick(e) {
    // If a drag-select happened on this comment/print field, the click event
    // still fires on mouseup — don't open the text editor; let the drag's
    // selection stand. Reset the flag so the next click works normally.
    if (lineDrag.dragHappened) {
        lineDrag.dragHappened = false;
        return;
    }

    e.preventDefault();
    e.stopPropagation();

    const span = e.target;
    const lineIndex = parseInt(span.dataset.lineIndex);
    const instr = currentProgramData.instructions[lineIndex];
    const fieldType = span.dataset.type;  // 'comment' or 'print'
    const isComment = fieldType === 'comment';
    const maxLen = isComment ? 25 : 21;  // Comments: 25, Print: 21

    // Move the line selection to this line — clicking a text field should
    // behave like clicking the line itself, so the cursor block moves here
    // and the previously-selected line's blue editable-field highlight clears.
    // updateLineSelectionUI only toggles classes; it doesn't rebuild the DOM,
    // so the span we're about to replace is still valid below.
    selectLine(lineIndex);

    // Save state for undo
    saveUndoState();

    // Get actual text (comments already trimmed, print has underscore padding)
    const fullText = span.textContent;
    const actualText = isComment ? fullText : fullText.replace(/_+$/, '');

    // Create input field
    const input = document.createElement('input');
    input.type = 'text';
    input.value = filterGmInput(actualText);
    input.maxLength = maxLen;
    input.className = 'string-edit-input';

    // Force the value through the GM-charset filter on every keystroke.
    // The C64 GameMaker character set has no uppercase distinction and a
    // restricted symbol set — typing anything outside it would write a byte
    // the runtime can't render. Lowercase-only + filter to allowed chars.
    input.addEventListener('input', () => {
        const filtered = filterGmInput(input.value);
        if (input.value !== filtered) {
            const pos = input.selectionStart;
            input.value = filtered;
            // Best-effort restore caret position (off by 1 if a stripped char
            // was at/before the caret, but smoother than jumping to the end)
            input.setSelectionRange(pos - 1 >= 0 ? pos - 1 : 0, pos - 1 >= 0 ? pos - 1 : 0);
        }
    });

    // Both comment and print get a container so the synthetic block
    // cursor has a positioned ancestor to anchor to.
    const container = document.createElement('span');
    container.className = 'string-edit-container';

    const cursor = document.createElement('span');
    cursor.className = 'string-edit-cursor';

    // Reposition the synthetic cursor to wherever the input's caret is.
    // 1ch = width of one char in the monospace C64 font, so left =
    // selectionEnd * 1ch puts the block right on the next type position.
    const updateCursor = () => {
        const pos = input.selectionEnd ?? 0;
        cursor.style.left = pos + 'ch';
    };

    if (isComment) {
        input.style.width = maxLen + 'ch';
        container.appendChild(input);
        container.appendChild(cursor);
        span.parentNode.replaceChild(container, span);
    } else {
        // Print: show underscore padding in realtime.
        const paddingSpan = document.createElement('span');
        paddingSpan.className = 'string-edit-padding';

        const updatePadding = () => {
            const textLen = input.value.length;
            const padLen = Math.max(0, maxLen - textLen);
            paddingSpan.textContent = '_'.repeat(padLen);
            input.style.width = textLen === 0 ? '1px' : textLen + 'ch';
        };
        updatePadding();

        container.appendChild(input);
        container.appendChild(paddingSpan);
        container.appendChild(cursor);
        span.parentNode.replaceChild(container, span);

        input.addEventListener('input', updatePadding);
    }

    // Caret can move via typing, arrows, clicks, or focus — listen for
    // all of them. (selectionchange on document would catch them all
    // too but doesn't reliably fire for <input> across browsers.)
    ['input', 'keyup', 'mouseup', 'focus'].forEach(evt => {
        input.addEventListener(evt, updateCursor);
    });
    // Held arrow keys repeat keydown without ever firing keyup until
    // release — so without this the synthetic cursor sits still while
    // the real caret races across. We can't just read selectionEnd in
    // the keydown handler: the browser updates the selection *after*
    // the handler returns. requestAnimationFrame defers the read to
    // the next frame, by which point the new caret position is live.
    input.addEventListener('keydown', () => requestAnimationFrame(updateCursor));

    input.focus();
    input.select();

    // Handle save on blur or Enter
    const saveEdit = () => {
        const prefix = isComment ? '/ ' : 'print ';
        if (isComment) {
            // Comments: space-padded (but we just store trimmed for display)
            instr.instructionName = prefix + input.value;
        } else {
            // Print: underscore-padded for display
            const paddedText = input.value + '_'.repeat(maxLen - input.value.length);
            instr.instructionName = prefix + paddedText;
        }
        // Mirror exitArgEditMode's cursor-advance: if the user is still
        // parked on the line they just edited, advance to the next line.
        // Click-elsewhere paths already moved selectedLineIndex, so the
        // guard prevents fighting that.
        if (currentProgramData?.instructions) {
            const editedLine = currentProgramData.instructions.indexOf(instr);
            if (editedLine >= 0 && editedLine === selectedLineIndex) {
                selectedLineIndex = Math.min(editedLine + 1, currentProgramData.instructions.length);
                selectedLines.clear();
                selectedLines.add(selectedLineIndex);
            }
        }
        renderProgramListing();
    };

    // Commit the edit on any click outside the input. Without this, handlers
    // like onFieldMouseDown / onLabelMouseDown preventDefault on mousedown,
    // which keeps focus on the input and prevents the natural blur — so the
    // edit silently lingers behind the new selection. Capture phase runs
    // before those handlers; removeEventListener fires from the blur handler.
    const onOutsideMouseDown = (e) => {
        if (!input.contains(e.target)) input.blur();
    };
    document.addEventListener('mousedown', onOutsideMouseDown, true);

    input.addEventListener('blur', () => {
        document.removeEventListener('mousedown', onOutsideMouseDown, true);
        saveEdit();
    });
    input.addEventListener('keydown', (e) => {
        e.stopPropagation();
        if (e.key === 'Enter') {
            e.preventDefault();
            input.blur();
        } else if (e.key === 'Escape') {
            e.preventDefault();
            renderProgramListing();
        }
    });
}

// === LABEL EDITING ===
// Labels can be edited by clicking and dragging:
// - Click existing label: drag to move it to another line (keeps its number)
// - Click empty label area: creates new label with first available number
// - Drag over existing label: your label hides "behind" the stationary one
// - Release over existing label: your dragged label is deleted
// - Drag left outside program area: label is deleted
// - Labels are numbered 1-255, displayed as "l001", "l002", etc.

// Get first available label number (1-255)
function getFirstAvailableLabel() {
    const usedLabels = new Set();
    if (currentProgramData && currentProgramData.instructions) {
        for (const instr of currentProgramData.instructions) {
            if (instr.label > 0) {
                usedLabels.add(instr.label);
            }
        }
    }
    for (let i = 1; i <= 255; i++) {
        if (!usedLabels.has(i)) return i;
    }
    return 0; // No labels available
}

// Label drag state - we snapshot all labels at drag start so we can
// restore them during drag preview without losing the original state
let labelDragSourceIndex = -1;
let labelDragCurrentIndex = -1;
let labelDragValue = 0;
let labelDragOriginalLabels = null; // Snapshot of labels before drag (source set to 0)
let labelDragPointerId = undefined; // Pointer ID captured on the source label span

// Mouse down on label - start editing
function onLabelMouseDown(e) {
    if (e.isPrimary === false) return;
    e.preventDefault();
    e.stopPropagation();

    const span = e.target;
    const lineIndex = parseInt(span.dataset.lineIndex);
    const instr = currentProgramData.instructions[lineIndex];

    // Save state for undo
    saveUndoState();

    // If no label, create one with first available number
    if (instr.label === 0) {
        const newLabel = getFirstAvailableLabel();
        if (newLabel === 0) {
            showMessage('No labels available');
            return;
        }
        instr.label = newLabel;
    }

    labelDragSourceIndex = lineIndex;
    labelDragCurrentIndex = lineIndex;
    labelDragValue = instr.label;
    labelDragPointerId = e.pointerId;

    // Snapshot all labels before dragging, but clear the source position
    // so restoring doesn't put the label back there
    labelDragOriginalLabels = currentProgramData.instructions.map(i => i.label);
    labelDragOriginalLabels[lineIndex] = 0;

    // Remove from source immediately
    instr.label = 0;

    renderProgramListing();
    highlightLabelAt(lineIndex);

    // Pointer capture keeps pointermove events flowing to this span even
    // as the user drags across other program lines (line-lookup is done
    // via e.clientY in the move handler, not target-inspection).
    try { span.setPointerCapture(e.pointerId); } catch {}
    span.addEventListener('pointermove',   onLabelMouseMove);
    span.addEventListener('pointerup',     onLabelMouseUp);
    span.addEventListener('pointercancel', onLabelMouseUp);
}

// Highlight the label span at a given index
function highlightLabelAt(index) {
    const labels = document.querySelectorAll('.program-line .label');
    if (labels[index]) {
        labels[index].classList.add('active');
        labels[index].textContent = 'l' + labelDragValue.toString().padStart(3, '0');
    }
}

// Mouse move while dragging label
function onLabelMouseMove(e) {
    if (labelDragSourceIndex === -1) return;

    const instructions = currentProgramData.instructions;
    const programArea = document.getElementById('programArea');
    const programRect = programArea.getBoundingClientRect();

    // Check if dragged outside to the left (delete zone)
    if (e.clientX < programRect.left) {
        // Clear any current placement
        if (labelDragCurrentIndex !== -1) {
            instructions[labelDragCurrentIndex].label = labelDragOriginalLabels[labelDragCurrentIndex];
        }
        labelDragCurrentIndex = -1;
        renderProgramListing();
        return;
    }

    // Find which line we're over
    const programLines = document.querySelectorAll('.program-line');
    let targetIndex = -1;

    for (let i = 0; i < programLines.length; i++) {
        const rect = programLines[i].getBoundingClientRect();
        if (e.clientY >= rect.top && e.clientY < rect.bottom) {
            targetIndex = i;
            break;
        }
    }

    if (targetIndex === -1) return;
    if (targetIndex === labelDragCurrentIndex) return;

    // Restore previous position's original label
    if (labelDragCurrentIndex !== -1) {
        instructions[labelDragCurrentIndex].label = labelDragOriginalLabels[labelDragCurrentIndex];
    }

    // Check if target has an existing label (from original snapshot)
    const targetHasLabel = labelDragOriginalLabels[targetIndex] > 0;

    if (targetHasLabel) {
        // Don't place our label here - the existing label stays visible
        labelDragCurrentIndex = targetIndex;
        renderProgramListing();
        // Don't highlight - the existing label shows
    } else {
        // Place our label here
        instructions[targetIndex].label = labelDragValue;
        labelDragCurrentIndex = targetIndex;
        renderProgramListing();
        highlightLabelAt(targetIndex);
    }
}

// Mouse up - finish label editing
function onLabelMouseUp(e) {
    if (labelDragSourceIndex === -1) return;
    if (e && e.pointerId !== undefined && e.pointerId !== labelDragPointerId) return;

    const instructions = currentProgramData.instructions;
    const programArea = document.getElementById('programArea');
    const programRect = programArea.getBoundingClientRect();

    // Check if released outside to the left (delete)
    const deleteLabel = e.clientX < programRect.left;

    // Check if released over an existing label (also delete)
    const overExistingLabel = labelDragCurrentIndex !== -1 &&
        labelDragOriginalLabels[labelDragCurrentIndex] > 0;

    if (deleteLabel || overExistingLabel) {
        // Restore all original labels (source is already 0 in snapshot)
        for (let i = 0; i < instructions.length; i++) {
            instructions[i].label = labelDragOriginalLabels[i];
        }
    } else if (labelDragCurrentIndex !== -1) {
        // Place the label at the current position
        instructions[labelDragCurrentIndex].label = labelDragValue;
    }

    const span = e && e.currentTarget;
    labelDragSourceIndex = -1;
    labelDragCurrentIndex = -1;
    labelDragOriginalLabels = null;

    if (span) {
        span.removeEventListener('pointermove',   onLabelMouseMove);
        span.removeEventListener('pointerup',     onLabelMouseUp);
        span.removeEventListener('pointercancel', onLabelMouseUp);
        try { span.releasePointerCapture(labelDragPointerId); } catch {}
    }
    labelDragPointerId = undefined;

    renderProgramListing();
    saveCurrentProgram();
}

// Mouse down on editable field - start drag or show asset picker
function onFieldMouseDown(e) {
    if (e.isPrimary === false) return;   // ignore extra fingers during pinch
    e.preventDefault();
    e.stopPropagation();

    let span = e.target;
    const type = span.dataset.type;
    const lineIndex = parseInt(span.dataset.lineIndex);
    const argNum = parseInt(span.dataset.argNum);

    // Clicking an arg also moves the cursor / selection to its line —
    // without this, the user can edit args on line N while the cursor
    // sits on some unrelated line, which is confusing. Re-render and
    // re-find the span because the DOM was rebuilt.
    if (lineIndex !== selectedLineIndex) {
        selectedLineIndex = lineIndex;
        selectedLines.clear();
        selectedLines.add(lineIndex);
        renderProgramListing();
        const lines = document.querySelectorAll('.program-line');
        const refound = lines[lineIndex]?.querySelector(
            `.editable-field[data-arg-num="${argNum}"]`
        );
        if (!refound) return;
        span = refound;
    }

    // For asset types, show the asset picker instead of drag editing
    if (ASSET_ARG_TYPES[type]) {
        clearFieldSelection();
        showAssetPicker(span, type, lineIndex, argNum - 1);  // argNum is 1 or 2, convert to 0 or 1
        return;
    }

    // Clear any previous selection
    clearFieldSelection();

    // Save state for undo before making changes
    saveUndoState();

    activeField = span;
    activeFieldPointerId = e.pointerId;
    span.classList.add('active');

    const instr = currentProgramData.instructions[lineIndex];

    dragStartY = e.clientY;
    dragStartValue = argNum === 1 ? instr.arg1 : instr.arg2;

    // Capture the pointer on the span so pointermove/pointerup keep firing
    // even if the finger drifts off it during the drag. Same shape we use
    // in draggableField and the maker apps' drag code.
    try { span.setPointerCapture(e.pointerId); } catch {}
    span.addEventListener('pointermove',   onFieldMouseMove);
    span.addEventListener('pointerup',     onFieldMouseUp);
    span.addEventListener('pointercancel', onFieldMouseUp);
}

// Mouse move while dragging - cycle values
function onFieldMouseMove(e) {
    if (!activeField) return;

    const span = activeField;
    const type = span.dataset.type;
    const lineIndex = parseInt(span.dataset.lineIndex);
    const argNum = parseInt(span.dataset.argNum);
    const displayOffset = parseInt(span.dataset.offset) || 0;
    const instr = currentProgramData.instructions[lineIndex];

    const range = getFieldRange(type);
    let newValue;

    // Sensitivity budget: full range covered in ~200px of drag, but
    // capped at 10px per step so small ranges (score1 slot 1..8, joystick
    // 1..2, etc.) don't feel like a dead-zone on touch. Old formula
    // demanded 25px per step for an 8-value field which felt broken on
    // mobile — you'd drag 20px and nothing happened. Cap keeps touch
    // ergonomic while leaving desktop behaviour reasonable (large-range
    // fields still use the finer-grained 1-2 px/step you'd want with a
    // mouse).
    if (range.list) {
        // List mode (for data page types)
        const list = range.list;
        const startIndex = list.indexOf(dragStartValue);
        const startIdx = startIndex >= 0 ? startIndex : 0;

        const deltaY = dragStartY - e.clientY;
        const sensitivity = Math.max(1, Math.min(10, Math.floor(200 / list.length)));
        const deltaIndex = Math.floor(deltaY / sensitivity);

        // Clamp to valid range
        const newIndex = Math.max(0, Math.min(list.length - 1, startIdx + deltaIndex));
        newValue = list[newIndex];
    } else {
        // Min/max mode
        const totalValues = range.max - range.min + 1;

        // Calculate value change based on vertical drag
        // Drag up = increase, drag down = decrease
        const deltaY = dragStartY - e.clientY;
        const sensitivity = Math.max(1, Math.min(10, Math.floor(200 / totalValues)));
        const deltaValue = Math.floor(deltaY / sensitivity);

        // Clamp to valid range
        newValue = Math.max(range.min, Math.min(range.max, dragStartValue + deltaValue));
    }

    // Update instruction
    if (argNum === 1) {
        instr.arg1 = newValue;
    } else {
        instr.arg2 = newValue;
    }

    // Update display (add offset for display, same as formatInstruction)
    span.textContent = formatFieldValue(type, newValue + displayOffset, instr);

    // Update instructionName
    updateInstructionName(instr);
}

// Pointer up (or cancel) — finish drag, keep field selected for keyboard input
function onFieldMouseUp(e) {
    if (!activeField) return;
    if (e && e.pointerId !== undefined && e.pointerId !== activeFieldPointerId) return;

    const span = activeField;

    // Transition from active (dragging) to selected (keyboard input)
    span.classList.remove('active');
    span.classList.add('selected');
    selectedField = span;
    fieldInputBuffer = '';  // Clear input buffer for fresh typing
    activeField = null;

    span.removeEventListener('pointermove',   onFieldMouseMove);
    span.removeEventListener('pointerup',     onFieldMouseUp);
    span.removeEventListener('pointercancel', onFieldMouseUp);
    try { span.releasePointerCapture(activeFieldPointerId); } catch {}
    activeFieldPointerId = undefined;

    // Save changes
    saveCurrentProgram();
}

// Clear field selection
function clearFieldSelection() {
    if (selectedField) {
        selectedField.classList.remove('selected');
        selectedField = null;
    }
    fieldInputBuffer = '';
}

// Copy program listing to clipboard
function copyProgramListing() {
    if (!currentProgramData) return;

    const instructions = currentProgramData.instructions;
    let lines = [];

    // If lines are selected, copy only those; otherwise copy all
    if (selectedLines.size > 0) {
        const sortedIndices = Array.from(selectedLines).sort((a, b) => a - b);
        for (const i of sortedIndices) {
            if (i < instructions.length) {
                const instr = instructions[i];
                const label = instr.label > 0 ? `${instr.label}: ` : '   ';
                lines.push(`${label}${instr.instructionName}`);
            }
        }
    } else {
        // Copy all lines
        for (let i = 0; i < instructions.length; i++) {
            const instr = instructions[i];
            const label = instr.label > 0 ? `${instr.label}: ` : '   ';
            lines.push(`${label}${instr.instructionName}`);
        }
    }

    const text = lines.join('\n');
    navigator.clipboard.writeText(text).catch(err => {
        console.error('Failed to copy:', err);
    });
}

// Update instruction's instructionName after arg change
function updateInstructionName(instr) {
    instr.instructionName = formatInstruction(
        instr.opcode,
        instr.arg1,
        instr.arg2,
        currentProgramData ? currentProgramData.mediaStore : null,
        c64ColorNames
    );
}

// Save current program to localStorage (called after edits)
function saveCurrentProgram() {
    saveCurrentProgramState();
}

function isIfOpcode(opcode) {
    return (opcode >= 0x13 && opcode <= 0x1B) ||
           opcode === 0x4A || opcode === 0x4B || opcode === 0x4C;
}

function selectLine(index, shiftKey = false) {
    // Picking a line is treated as a "found it, now I want to edit"
    // gesture — drop out of find mode so the highlights and search input
    // get out of the way.
    if (findMode.active) exitFindMode();

    // Clear any selected numeric field
    clearFieldSelection();

    if (shiftKey && selectedLineIndex >= 0) {
        // Shift-click: select range from anchor to clicked line
        const start = Math.min(selectedLineIndex, index);
        const end = Math.max(selectedLineIndex, index);
        selectedLines.clear();
        for (let i = start; i <= end; i++) {
            selectedLines.add(i);
        }
        // Keep selectedLineIndex as anchor (don't change it)
    } else {
        // Normal click: single selection
        selectedLineIndex = index;
        selectedLines.clear();
        selectedLines.add(index);
    }
    updateLineSelectionUI();
}

function updateLineSelectionUI() {
    // Every line in a multi-line selection gets the gray .multi-selected
    // background — including the primary — so the visible range always
    // matches what's in the buffer (previously the primary line was styled
    // differently from the rest, causing the cursor's current line to look
    // "selected" while neighbours looked "highlighted"). Single-line selection
    // keeps its original look: just .selected on the one line, no gray bg.
    const isMulti = selectedLines.size > 1;
    document.querySelectorAll('.program-line').forEach((el, i) => {
        const inSel = selectedLines.has(i);
        const isPrimary = i === selectedLineIndex;
        el.classList.toggle('selected', isPrimary);
        el.classList.toggle('multi-selected', inSel && isMulti);
    });
}

// === FILE HANDLING ===

function showFilePopup() {
    gmDisk.showPopup({
        fileType: GMDisk.FILE_TYPES.PROGRAM,
        showSave: true,
        suggestedSaveName: () => {
            const n = document.getElementById('programName').textContent.trim();
            return n || '';
        },
        onSave: saveToDisk,
        onSelect: (fileName, fileData) => {
            // Load first, then save the new state
            loadProgramData(fileName, fileData);
            saveProgram(fileName, fileData);
            updateStatusInfo();
        },
        customButtons: [
            { label: 'Export Game', onClick: () => showExportDialog() }
        ]
    });
}

// Save current program to D64 disk
// Serializes all instructions and data (sprites, sounds, songs, strings) to PRG format
// Called by gmDisk's built-in save row. The popup already handles filename
// input, validation, existence check, and the overwrite prompt \u2014 we just
// serialize the current program and write it.
function saveToDisk(fullFileName) {
    if (!currentProgramData || !currentProgramData.instructions ||
        currentProgramData.instructions.length === 0) {
        gmDisk.showInfoMessage('No program to save');
        return false;
    }

    try {
        // Pass the original file data so we can preserve the pre-header
        // (memory layout info gmParser doesn't model)
        const prgBytes = serializeProgram(currentProgramData, currentFileData);
        if (gmDisk.saveFile(fullFileName, prgBytes)) {
            const baseName = fullFileName.replace(/\/PRG$/i, '').trim().toLowerCase();
            document.getElementById('programName').textContent = baseName.padEnd(6, '\u00A0');
            return true;
        } else {
            gmDisk.showInfoMessage('Failed to save. Disk may be full.');
            return false;
        }
    } catch (e) {
        console.error('Save failed:', e);
        gmDisk.showInfoMessage('Save error: ' + e.message);
        return false;
    }
}

// ==================== STANDALONE GAME EXPORT ====================
// Builds a single self-contained HTML file that plays the current
// program anywhere. The exported HTML is *literally* play.html with two
// consts (EMBEDDED_PRG, EMBEDDED_D64) patched to base64 strings. See
// tools/bundle-standalone.js for how the snapshot is produced, and
// play.html's `if (EMBEDDED_PRG && EMBEDDED_D64)` branch for the
// embedded-vs-URL routing.
//
// `customFilename` overrides the default <programName>.html. Returns
// true on success so callers can gate UI feedback on it. Errors surface
// via gmDisk.showInfoMessage.
async function exportStandaloneGame(customFilename) {
    if (!currentProgramData?.instructions?.length) {
        gmDisk.showInfoMessage('No program to export');
        return false;
    }
    if (!gmDisk.disk) {
        gmDisk.showInfoMessage('No disk loaded');
        return false;
    }

    let prgBytes, d64Bytes;
    try {
        prgBytes = serializeProgram(currentProgramData, currentFileData);
        d64Bytes = gmDisk.disk.getData();
    } catch (e) {
        console.error('export: serialize failed', e);
        gmDisk.showInfoMessage('Export error: ' + e.message);
        return false;
    }

    const prgName = (document.getElementById('programName').textContent || 'game').trim() || 'game';

    // Snapshot comes from js/standalone-source.js (generated by
    // tools/bundle-standalone.js). Bundling as a <script>-loadable JS
    // file means Export works on file:// too - fetch is blocked there
    // in every modern browser.
    const snapshot = window._standaloneSource;
    if (!snapshot) {
        gmDisk.showInfoMessage(
            'Export needs the standalone bundle (run `node tools/bundle-standalone.js` and reload)',
            { duration: 8000 });
        return false;
    }

    // Patch the two placeholder consts in play.html's inline script
    // with base64-encoded game bytes. The literal strings on the left
    // are what play.html declares - keep them in sync.
    const html = snapshot
        .replace('const EMBEDDED_PRG = null;',
                 `const EMBEDDED_PRG = ${JSON.stringify(_bytesToBase64(prgBytes))};`)
        .replace('const EMBEDDED_D64 = null;',
                 `const EMBEDDED_D64 = ${JSON.stringify(_bytesToBase64(d64Bytes))};`);

    // Trigger download via blob URL.
    const blob = new Blob([html], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = customFilename || `${prgName}.html`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    return true;
}

// === EXPORT GAME DIALOG ===
// Unified download + embed flow. The top section downloads a self-
// contained HTML file the user hosts wherever they like. The embed
// section below generates an iframe snippet pointing at that hosted
// URL (or at gmc64.com/play.html for direct-from-disk embeds). No
// infrastructure on gmc64.com's side — the user's hosting is the
// source of truth.
function showExportDialog() {
    // programName UI shows just the 6-char base (lowercase). The actual
    // disk filename is `<NAME>/PRG`; the export filename is `<name>.html`.
    const rawName = (document.getElementById('programName').textContent || '').trim();
    const baseName = rawName || 'game';

    document.getElementById('exportFilename').value = `${baseName.toLowerCase()}.html`;
    // Hosted URL always blank — anything pre-filled implies a specific
    // intent (self-host vs play.html) that muddies the flow.
    document.getElementById('exportUrl').value = '';

    document.getElementById('exportWidth').value = 640;
    document.getElementById('exportPosterSeconds').value = 2;
    document.getElementById('exportNoCredit').checked = false;
    document.getElementById('exportCopyBtn').textContent = 'Copy';

    updateExportSnippet();
    document.getElementById('exportDialog').classList.add('active');
    gmDisk.closePopup();
}

function closeExportDialog() {
    document.getElementById('exportDialog').classList.remove('active');
}

async function triggerExportDownload() {
