    await exportStandaloneGame(filename);
}

// Backdrop click and Escape close the dialog. Both wired once — guards
// check `.active` so they no-op when the dialog isn't showing.
document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('exportDialog').addEventListener('click', (e) => {
        if (e.target.id === 'exportDialog') closeExportDialog();
    });
    document.addEventListener('keydown', (e) => {
        if (e.key !== 'Escape') return;
        const dialog = document.getElementById('exportDialog');
        if (dialog.classList.contains('active')) {
            closeExportDialog();
            e.stopPropagation();
        }
    }, true);   // capture so we run before the game's escape → stopProgram
});

// Rebuild the iframe snippet from current field values. Called on
// every input event so the textarea tracks live edits. poster_seconds
// and nocredit are merged into the URL as query params — they only
// affect play.html embeds (they're ignored by self-hosted exports),
// but including them here keeps the demo/play.html flow one-click.
function updateExportSnippet() {
    const raw = document.getElementById('exportUrl').value.trim();
    const width = parseInt(document.getElementById('exportWidth').value, 10) || 640;
    // Height auto-derived to preserve the CRT-authentic 6:5 display aspect
    // (same as the fluid canvas in play.html / editor.html game overlay).
    const height = Math.round(width * 5 / 6);
    document.getElementById('exportHeightReadout').textContent = height;
    const posterSecs = document.getElementById('exportPosterSeconds').value;
    const nocredit = document.getElementById('exportNoCredit').checked;

    let finalUrl;
    try {
        // Merge params via URL API so we don't blindly duplicate
        // existing ?disk= / ?file= if the user pasted a play.html URL.
        const url = new URL(raw || 'https://YOUR_URL/');
        if (posterSecs !== '' && parseFloat(posterSecs) !== 2) {
            url.searchParams.set('poster_seconds', posterSecs);
        } else {
            url.searchParams.delete('poster_seconds');
        }
        if (nocredit) {
            url.searchParams.set('nocredit', '1');
        } else {
            url.searchParams.delete('nocredit');
        }
        finalUrl = url.toString();
    } catch (e) {
        // URL didn't parse (partial input). Show as-is so live typing
        // doesn't blow up the snippet mid-keystroke.
        finalUrl = raw || 'https://YOUR_URL';
    }

    const snippet =
`<iframe src="${finalUrl}"
        width="${width}" height="${height}"
        allow="autoplay" loading="lazy"
        frameborder="0"></iframe>`;

    document.getElementById('exportSnippet').value = snippet;
}

async function copyExportSnippet() {
    const text = document.getElementById('exportSnippet').value;
    const btn = document.getElementById('exportCopyBtn');
    try {
        await navigator.clipboard.writeText(text);
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = 'Copy'; }, 1200);
    } catch (e) {
        // Older browsers / insecure contexts fall back to select-all
        // (user completes with Cmd/Ctrl+C themselves).
        document.getElementById('exportSnippet').select();
        btn.textContent = 'Press Cmd+C';
        setTimeout(() => { btn.textContent = 'Copy'; }, 2000);
    }
}

function _bytesToBase64(bytes) {
    // Process in chunks so we don't blow the call stack on large arrays.
    const CHUNK = 0x8000;
    let binary = '';
    for (let i = 0; i < bytes.length; i += CHUNK) {
        binary += String.fromCharCode.apply(null, bytes.subarray(i, i + CHUNK));
    }
    return btoa(binary);
}

function loadProgramData(fileName, fileData) {
    // Standalone detection: files that start with load addr $0302 are
    // self-launching memory images. Convert to a synthesised editor .PRG
    // so the rest of the editor works unchanged. Embedded scenes are
    // exposed by wrapping loadFileByName — parseProgramData looks up
    // .PIC files that way, and the wrapper hands back the standalone's
    // bitmap-memory bytes before falling back to the disk.
    //
    // We snapshot the "base" resolver once (the disk-backed one) and
    // rewrap from it on each load — so switching between a standalone
    // and a normal PRG never accumulates wrappers.
    if (!globalThis._baseLoadFileByName) {
        globalThis._baseLoadFileByName = globalThis.loadFileByName;
    }
    globalThis.loadFileByName = globalThis._baseLoadFileByName;
    if (fileData.length >= 2 && fileData[0] === 0x02 && fileData[1] === 0x03) {
        try {
            const scenes = standaloneToScenes(fileData);
            fileData = standaloneToPRG(fileData);
            const base = globalThis.loadFileByName;
            globalThis.loadFileByName = (name) => scenes[name] || base(name);
        } catch (e) {
            showMessage('Standalone extraction failed: ' + e.message);
            console.error(e);
            return;
        }
    }

    currentFileData = fileData;

    try {
        currentProgramData = parseProgramData(fileData);
        document.getElementById('programName').textContent = fileName.substring(0, 6).toLowerCase().padEnd(6, '\u00A0');
        renderProgramListing();
        selectedLineIndex = -1;
        selectedLines.clear();

        // Check for missing scenes and show flashing error
        if (currentProgramData.missingScenes && currentProgramData.missingScenes.length > 0) {
            const lines = ['file not found'];
            for (const scene of currentProgramData.missingScenes) {
                lines.push(`scene: ${scene.name}`);
            }
            showFlashingError(lines);
        } else {
            showMessage('');
        }
    } catch (e) {
        showMessage('Error: ' + e.message);
        console.error(e);
    }
}

// Save program state when loading from disk (keeps original binary for reference)
function saveProgram(fileName, fileData) {
    localStorage.setItem('gm_savedProgram', JSON.stringify({
        fileName: fileName,
        fileData: Array.from(fileData)
    }));
    // Also save the current edited state
    saveCurrentProgramState();
}

// Save the current edited program state (instructions + mediaStore)
function saveCurrentProgramState() {
    if (!currentProgramData) {
        localStorage.removeItem('gm_editedProgram');
        return;
    }

    // Serialize instructions (just the essential fields)
    const instructions = currentProgramData.instructions.map(instr => {
        const serialized = {
            opcode: instr.opcode,
            arg1: instr.arg1,
            arg2: instr.arg2,
            label: instr.label,
            stringData: instr.stringData || null
        };
        // Comments (0x2B) and print strings (0x3B) store text in instructionName
        // (not in mediaStore like assets) - must preserve it
        if (instr.opcode === 0x2B || instr.opcode === 0x3B) {
            serialized.instructionName = instr.instructionName;
        }
        // Print strings also need printBytes for runtime execution
        if (instr.opcode === 0x3B && instr.printBytes) {
            serialized.printBytes = instr.printBytes;
        }
        return serialized;
    });

    // Serialize mediaStore (name, type, and raw bytes)
    const mediaStore = [];
    if (currentProgramData.mediaStore) {
        for (let i = 0; i < currentProgramData.mediaStore.length; i++) {
            const entry = currentProgramData.mediaStore[i];
            if (!entry) {
                mediaStore.push(null);
                continue;
            }
            const serialized = {
                name: entry.name,
                type: entry.type,
                quadIndex: entry.quadIndex || 0
            };
            // Save raw file data for each type
            if (entry.spriteFileData) {
                serialized.spriteFileData = Array.from(entry.spriteFileData);
            }
            if (entry.soundFileData) {
                serialized.soundFileData = Array.from(entry.soundFileData);
            }
            if (entry.songFileData) {
                serialized.songFileData = Array.from(entry.songFileData);
            }
            // entry.name is always 6-char-padded (parser invariant), so the
            // disk filename "just works" — no re-padding needed. Upper-case
            // is still wanted in case some other code mutated the name.
            if (entry.type === 'scene') {
                serialized.sceneFileName = entry.name.toUpperCase() + '/PIC';
            }
            mediaStore.push(serialized);
        }
    }

    const programName = document.getElementById('programName').textContent.trim();

    localStorage.setItem('gm_editedProgram', JSON.stringify({
        programName: programName,
        instructions: instructions,
        mediaStore: mediaStore,
        selectedLineIndex: selectedLineIndex
    }));
}

// Debounced session save — called after every render so unsaved edits persist
// across navigations. Uses GMTools.session's debouncer for consistency with the
// other editors, even though the underlying storage key (gm_editedProgram) and
// format predate the shared module.
const _scheduleSessionSave = (() => {
    let timer = null;
    return () => {
        if (timer) clearTimeout(timer);
        timer = setTimeout(() => saveCurrentProgramState(), 500);
    };
})();

// Load the saved edited program state
function loadSavedProgram() {
    // First try to load edited state
    const edited = localStorage.getItem('gm_editedProgram');
    if (edited) {
        try {
            const data = JSON.parse(edited);
            restoreEditedProgram(data);
            // Verify the restore worked (check for valid data)
            if (currentProgramData && currentProgramData.instructions) {
                return true;
            }
        } catch (e) {
            console.error('Failed to restore edited program:', e);
        }
        // If restore failed, clear corrupted data and try original
        console.log('Clearing corrupted edited program state');
        localStorage.removeItem('gm_editedProgram');
    }

    // Fall back to original file data
    const saved = localStorage.getItem('gm_savedProgram');
    if (saved) {
        try {
            const data = JSON.parse(saved);
            const fileData = new Uint8Array(data.fileData);
            loadProgramData(data.fileName, fileData);
            return true;
        } catch (e) {
            console.error('Failed to restore saved program:', e);
            localStorage.removeItem('gm_savedProgram');
        }
    }
    return false;
}

// Restore program from edited state
function restoreEditedProgram(data) {
    // Rebuild mediaStore with parsed objects
    // Support both old "dataPage" key and new "mediaStore" key for backwards compatibility
    const sourceData = data.mediaStore || data.dataPage;
    const mediaStore = [null];  // Index 0 is always null
    if (sourceData) {
        for (let i = 1; i < sourceData.length; i++) {
            const entry = sourceData[i];
            if (!entry) {
                mediaStore.push(null);
                continue;
            }

            const restored = {
                name: entry.name,
                type: entry.type,
                ptr: 0,
                quadIndex: entry.quadIndex || 0
            };

            // Restore parsed objects from raw data
            try {
                if (entry.spriteFileData) {
                    const fileData = new Uint8Array(entry.spriteFileData);
                    restored.spriteFileData = fileData;
                    restored.sprite = new gmSprite(fileData);
                }
                if (entry.soundFileData) {
                    restored.soundFileData = new Uint8Array(entry.soundFileData);
                }
                if (entry.songFileData) {
                    restored.songFileData = new Uint8Array(entry.songFileData);
                }
                if (entry.type === 'scene' && entry.sceneFileName) {
                    // Try to load scene from disk
                    const sceneData = gmDisk.loadFile(entry.sceneFileName);
                    if (sceneData) {
                        restored.scene = new gmScene(sceneData);
                    }
                }
            } catch (e) {
                console.error('Failed to restore asset:', entry.name, e);
            }

            mediaStore.push(restored);
        }
    }

    // Rebuild instructions with instructionName
    const instructions = data.instructions.map(instr => {
        const restored = {
            opcode: instr.opcode,
            arg1: instr.arg1,
            arg2: instr.arg2,
            label: instr.label,
            stringData: instr.stringData || null,
            instructionName: ''
        };
        // Comments (0x2B) and print strings (0x3B) have text stored in instructionName
        // - don't regenerate with formatInstruction or the text is lost
        if ((instr.opcode === 0x2B || instr.opcode === 0x3B) && instr.instructionName) {
            restored.instructionName = instr.instructionName;
        } else {
            restored.instructionName = formatInstruction(
                restored.opcode, restored.arg1, restored.arg2,
                mediaStore, c64ColorNames
            );
        }
        // Restore printBytes for print strings (needed by runtime)
        if (instr.opcode === 0x3B && instr.printBytes) {
            restored.printBytes = instr.printBytes;
        }
        return restored;
    });

    // Set program state
    currentProgramData = {
        instructions: instructions,
        mediaStore: mediaStore
    };
    currentFileData = null;  // No original file data for edited programs

    // Update UI
    const programName = data.programName || '\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0';
    document.getElementById('programName').textContent = programName;
    selectedLineIndex = data.selectedLineIndex >= 0 ? data.selectedLineIndex : -1;
    selectedLines.clear();
    if (selectedLineIndex >= 0) selectedLines.add(selectedLineIndex);
    renderProgramListing();
}

// === STATUS ===

// === FREE BLOCKS CALCULATION ===
//
// === KNOWN ANCHOR POINTS ===
//   blank program: 3553 free
//   GMC64I and ALIENS both match real-hardware free-block counts exactly
//   with the serialize-and-measure approach. (An earlier instruction-
//   counting implementation was off by +162 on a complex program; that
//   discrepancy was a bug in the counter, not a real-hardware divergence.)
//
// === IMPLEMENTATION NOTES ===
//
// We could either (a) walk the AST + mediaStore and arithmetic-sum every
// piece's byte size, or (b) serialise the current state and read the
// length out of the file header. We do (b) — it's the same logic the
// serialiser already implements, so there's only one place where "how
// big does this end up?" knowledge lives. Cost is ~0.1ms per call on a
// 14KB program; only fires on edit, never on render.
//
// The `(fileData[515] - 6) * 256` adjustment is empirical — the high
// byte of the encoded program length is offset by 1536 bytes (six full
// high-byte units) from the actual instruction-area length. Origin is
// unknown but the answer is correct against real-GM anchors. Same goes
// for GM_MAX_FREE = 3553: the program area is 15237 raw bytes (3809
// units), so 256 units of fixed overhead live somewhere we don't need
// to model individually.
const GM_MAX_FREE = 3553;  // Free blocks when program area is empty
const GM_OFFSET = 0x3D90;  // 15760 - used in data area calculation
const PROGRAM_START = 523; // Where program instructions begin in file

// Returns SIGNED free-blocks count (negative on overflow). Used by the
// try-then-revert insertion paths (asset picker, paste) to detect when
// a proposed change would push the program past GM's 0000-free limit.
// The clamped public form below floors at 0 because the UI counter
// can't usefully show negative values.
function calculateFreeBlocksRaw() {
    if (!currentProgramData) return GM_MAX_FREE;

    // Serialise the live in-memory program to bytes and decode the file
    // header for the byte count. Works in every state — fresh load,
    // session restore, mid-edit — because we always operate on
    // currentProgramData, not on a stashed file snapshot.
    let fileData;
    try {
        fileData = serializeProgram(currentProgramData, currentFileData);
    } catch (e) {
        // Malformed in-memory state. Fall back to the on-disk bytes if
        // we have them; otherwise punt to "empty".
        if (!currentFileData || currentFileData.length <= 520) return GM_MAX_FREE;
        fileData = currentFileData;
    }

    const programEnd = 514 + (fileData[514] + ((fileData[515] - 6) * 256));
    const dataEnd = GM_OFFSET - (fileData[516] + (fileData[517] * 256));
    const programSize = programEnd - PROGRAM_START;
    const usedUnits = Math.floor((programSize + dataEnd) / 4);
    return GM_MAX_FREE - usedUnits;
}

function calculateFreeBlocks() {
    return Math.max(0, calculateFreeBlocksRaw());
}

function updateFreeBlocks() {
    const freeBlocks = calculateFreeBlocks();
    document.getElementById('freeBlocks').textContent = freeBlocks.toString().padStart(6, '\u00A0');
}

function updateStatusInfo() {
    updateFreeBlocks();
}

// Flashing message for errors like "out of memory" - alternates between
// lt-blue and red every 150ms, auto-clears after 2 seconds
let flashInterval = null;

function showFlashingMessage(msg) {
    const statusMessage = document.getElementById('statusMessage');
    statusMessage.textContent = msg;

    // Clear any existing flash
    if (flashInterval) {
        clearInterval(flashInterval);
    }

    // Alternate between blue and red
    let isRed = true;
    statusMessage.style.color = 'var(--c64-red)';

    flashInterval = setInterval(() => {
        isRed = !isRed;
        statusMessage.style.color = isRed ? 'var(--c64-red)' : 'var(--c64-lt-blue)';
    }, 150);

    // Stop flashing after ~2 seconds and clear message
    setTimeout(() => {
        if (flashInterval) {
            clearInterval(flashInterval);
            flashInterval = null;
        }
        statusMessage.style.color = '';
        statusMessage.textContent = '';
    }, 2000);
}

function showOutOfMemory() {
    showFlashingMessage('out of memory');
}

// === UNDO/REDO ===

function saveUndoState() {
    if (!currentProgramData || !currentProgramData.instructions) return;
    undoStack.push(JSON.stringify(currentProgramData.instructions));
    if (undoStack.length > MAX_UNDO) undoStack.shift();
    redoStack.length = 0;  // Clear redo on new change
    updateUndoRedoButtons();
}

function undo() {
    if (undoStack.length === 0) return;
    redoStack.push(JSON.stringify(currentProgramData.instructions));
    currentProgramData.instructions = JSON.parse(undoStack.pop());
    renderProgramListing();
    updateUndoRedoButtons();
    saveCurrentProgram();
}

function redo() {
    if (redoStack.length === 0) return;
    undoStack.push(JSON.stringify(currentProgramData.instructions));
    currentProgramData.instructions = JSON.parse(redoStack.pop());
    renderProgramListing();
    updateUndoRedoButtons();
    saveCurrentProgram();
}

function updateUndoRedoButtons() {
    document.getElementById('undoBtn').disabled = undoStack.length === 0;
    document.getElementById('redoBtn').disabled = redoStack.length === 0;
}

function showConfirmDialog(message, onYes) {
    const statusMessage = document.getElementById('statusMessage');
    statusMessage.style.textAlign = 'center';

    // Create confirmation UI with bracketed text options
    statusMessage.innerHTML = `
        <div>${message}</div>
        <div><span id="confirmYes" class="confirm-option">[yes]</span>&nbsp;&nbsp;&nbsp;&nbsp;<span id="confirmNo" class="confirm-option">[no]</span></div>
    `;

// Real GameMaker has a fixed 128-entry if/then table at runtime; overflow
// prints "too many if...thens" and refuses to run. We mirror that limit
// (checked at Run time, not while editing) so games authored under the
// same constraint behave the same here. skip-next-if opcodes (0x62/63/64)
// are single-line conditionals that don't consume from this budget —
// the documented workaround when authors hit the ceiling.
const MAX_IF_THENS = 128;
const IF_OPCODES = new Set([
    0x13, 0x14, 0x15, 0x16, 0x17, 0x18,  // if var =/></< 000 or [a]
    0x19, 0x1A,                            // if joystick / button
    0x1B,                                  // if sprite hit sprite
    0x4A, 0x4B, 0x4C,                     // if score comparisons
]);
function countIfThens(instructions) {
    let n = 0;
    for (const ins of instructions) if (IF_OPCODES.has(ins.opcode)) n++;
    return n;
}

function runProgram() {
    if (!currentProgramData) {
        showMessage('No program loaded');
        return;
    }

    // if/then budget check — matches real GM's runtime-only enforcement
    // (game loads fine into the editor even with too many, but refuses
    // to run). Message shows the actual count so authors know their
    // target for refactoring. Unlike real GM, we offer a [play anyway]
    // escape hatch because gmc64's JS runtime has no hardware limit —
    // helpful when mid-refactor and you want to sanity-check the game
    // while still over budget. The escape is per-click, not sticky:
    // the check re-fires on the next Run press.
    const ifCount = countIfThens(currentProgramData.instructions);
    if (ifCount > MAX_IF_THENS) {
        const el = document.getElementById('statusMessage');
        el.innerHTML =
            `<div>too many if...thens (${ifCount} > ${MAX_IF_THENS})</div>` +
            `<div><span id="playAnyway" class="confirm-option">[play anyway]</span></div>`;
        el.classList.add('flashing-error');
        document.getElementById('playAnyway').onclick = () => {
            // Clear the flashing error and fall through into the normal
            // run path. Slight duplication of runProgram's tail is
            // deliberate — keeps the check-and-bypass logic together.
            clearFlashingError();
            runProgramUnchecked();
        };
        return;
    }

    runProgramUnchecked();
}

// The VM-start body, extracted so the [play anyway] bypass and the normal
// path can share it. Called only after the if-budget check has passed OR
// been explicitly overridden.
function runProgramUnchecked() {
    // Initialize audio on user interaction (browser requirement)
    initAudio();

    // Initialize screen and VM if needed
    if (!screen) {
        screen = new c64Screen("gameCanvas");
    }

    if (!vm) {
        vm = new gmVM(screen);
    }

    // Build AST and start program
    try {
        const ast = buildAST(currentProgramData);
        // Push current chrome state into the VM. After this point the
        // control handlers (toggleSkipPauses/...) talk to vm.config
        // directly — the module-level lets above are just UI mirrors.
        vm.loadProgram(ast, currentFileData, {
            skipPauseInstructions,
            showHitboxes,
            audioMuted,
            userVolume
        });

        // Show game overlay and reset chrome state. The play-button
        // overlay is force-cleared here so pressing Run after a Stop
        // (following an initial ?play=1 landing) doesn't leave the
        // dimmed overlay + button sitting on top of the real game.
        // body.play-mode + viewport swap MUST happen here (not only in
        // the demo/URL play-button flow): they're what makes the
        // fullscreen play view use device-width and hide the
        // edit-mode fullscreen button. Without them, mobile Safari
        // renders the play chrome in 720-wide layout coordinates and
        // touch controls end up misaligned or hidden.
        document.body.classList.add('play-mode');
        setPlayModeViewport(true);
        document.getElementById('gameOverlay').classList.add('active');
        document.getElementById('gameBorder').style.background = 'rgb(0, 0, 0)';  // Reset border to black
        document.getElementById('playOverlay').classList.remove('active');
        document.getElementById('settingsPopup').classList.remove('active');
        setPauseButtonIcon(false);
        document.getElementById('stepBtn').disabled = true;
        document.getElementById('skipPausesToggle').checked = skipPauseInstructions;
        document.getElementById('hitboxToggle').checked = showHitboxes;
        document.getElementById('opsInput').value = maxInstructionsPerFrame;
        document.getElementById('fpsDisplay').textContent = '0';
        document.getElementById('opsDisplay').textContent = '0';
        frameCount = 0;
        lastFpsUpdate = Date.now();

        // VM owns its loop now. onFrame keeps the stats readout alive.
        // catchup:true → run as many virtual frames per browser tick as
        // wall-clock time has passed, keeping in-game speed independent of
        // browser drift/throttling. Paired with the NTSC frameMs above.
        vm.start({
            opsPerFrame: maxInstructionsPerFrame,
            frameMs: FRAME_TIME,
            catchup: true,
            onFrame: onVmFrame
        });
        showMessage('Running...');

        // Mount touch controls over the play area. GMTouchControls returns
        // a no-op sentinel on desktop (no visible overlay). Mount idempotent.
        if (!touchControls) {
            touchControls = GMTouchControls.mount(
                document.getElementById('playArea'),
                { inputState, port: 1 });
        }

    } catch (e) {
        showMessage('Error: ' + e.message);
        console.error(e);
    }
}

// Called by vm._loopTick after each render. We update the FPS / ops
// dashboard, the C64-border color, and the input indicator — anything
// the VM itself doesn't know about.
function onVmFrame({ opsExecuted }) {
    currentOpsPerFrame = opsExecuted;
    frameCount++;
    const now = Date.now();
    if (now - lastFpsUpdate >= 1000) {
        currentFps = frameCount;
        frameCount = 0;
        lastFpsUpdate = now;
        document.getElementById('fpsDisplay').textContent = currentFps;
    }
    document.getElementById('opsDisplay').textContent = currentOpsPerFrame;
    updateBorderColor();
    updateInputDisplay();
}

function stopProgram() {
    if (vm) vm.stop();
    document.getElementById('gameOverlay').classList.remove('active');
    document.getElementById('settingsPopup').classList.remove('active');
    setPauseButtonIcon(false);
    document.getElementById('stepBtn').disabled = true;
    // Tear down touch controls so the joystick overlay doesn't linger
    // over the editor UI once the game stops. Cheap to remount on next
    // run — mount lazily reads device state, no persistent listeners.
    if (touchControls) {
        touchControls.unmount();
        touchControls = null;
    }
    // Drop the play-mode body class so scale-to-fit CSS and the
    // edit-mode fullscreen button reappear. The stop button itself
    // stays styled as "stop & edit" everywhere — it's only visible
    // inside #gameOverlay which is display:none in edit mode anyway.
    document.body.classList.remove('play-mode');
    // Unlock the mobile viewport now that we're back in the editor
    // (pinch-zoom is a real accessibility win in the code view).
    setPlayModeViewport(false);
    showMessage('Stopped');
}

// Swap the viewport meta so pinch-zoom is disabled during gameplay
// (protects fixed dpad/fire-button positions on touch) and re-enabled
// in the editor. Rewriting the tag's `content` at runtime is the
// standard way to toggle this — browsers pick up the change immediately.
// Fullscreen toggle — targets documentElement so the game AND the
// editor chrome around it both scale into the fullscreen box. Uses the
// webkit-prefixed fallback for iPad Safari, which supports the API only
// under that name. iPhone Safari has partial support in recent versions
// (iOS 16.4+); older versions no-op silently, which is fine — the
// alternative is Add-to-Home-Screen via a PWA manifest and that's a
// separate rabbit hole.
function toggleFullscreen() {
    const el = document.documentElement;
    if (document.fullscreenElement || document.webkitFullscreenElement) {
        (document.exitFullscreen || document.webkitExitFullscreen).call(document);
    } else {
        const req = el.requestFullscreen || el.webkitRequestFullscreen;
        if (req) req.call(el);
    }
}

// Repaint every fullscreen toggle button (edit-mode float + play-mode
// bar button) to reflect current state. Handles the Escape-key exit
// path that bypasses our own toggleFullscreen.
function refreshFullscreenIcon() {
    const active = !!(document.fullscreenElement || document.webkitFullscreenElement);
    // "Enter" icon: outward-pointing arrows. "Exit" icon: inward-pointing
    // arrows. Recognized by shape rather than reading — the fine strokes
    // render fine even at the reduced icon opacity.
    const svg = active
        ? `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
             <path d="M9 4 L9 9 L4 9 M15 4 L15 9 L20 9 M20 15 L15 15 L15 20 M4 15 L9 15 L9 20"
                   fill="none" stroke="currentColor" stroke-width="2"
                   stroke-linecap="round" stroke-linejoin="round"/>
           </svg>`
        : `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
             <path d="M4 9 L4 4 L9 4 M15 4 L20 4 L20 9 M20 15 L20 20 L15 20 M9 20 L4 20 L4 15"
                   fill="none" stroke="currentColor" stroke-width="2"
                   stroke-linecap="round" stroke-linejoin="round"/>
           </svg>`;
    for (const id of ['fullscreenToggle', 'editorFullscreenBtn']) {
        const btn = document.getElementById(id);
        if (btn) btn.innerHTML = svg;
    }
}

// Hide fullscreen buttons if the browser doesn't support the API at
// all (embedded/kiosk builds, older iOS). Wire up state-change
// listeners once the page is ready.
document.addEventListener('DOMContentLoaded', () => {
    const el = document.documentElement;
    const supported = !!(el.requestFullscreen || el.webkitRequestFullscreen);
    if (!supported) {
        for (const id of ['fullscreenToggle', 'editorFullscreenBtn']) {
            const btn = document.getElementById(id);
            if (btn) btn.style.display = 'none';
        }
        return;
    }
    document.addEventListener('fullscreenchange', refreshFullscreenIcon);
    document.addEventListener('webkitfullscreenchange', refreshFullscreenIcon);
    refreshFullscreenIcon();
});

function setPlayModeViewport(playing) {
    const meta = document.querySelector('meta[name="viewport"]');
    if (!meta) return;
    // playing: lock to device-width with no pinch/scale so the virtual
    //          dpad and fire button stay pinned to fixed finger positions
    //          during gameplay.
    // editing: restore the fixed-720 layout that mobile browsers scale
    //          to fit the device — matches the default in the HTML.
    meta.setAttribute('content', playing
        ? 'width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover'
        : 'width=720, initial-scale=1'
    );
}

function togglePause() {
    if (!vm) return;
    const stepBtn = document.getElementById('stepBtn');
    if (vm.paused) {
        vm.resume();
        setPauseButtonIcon(false);
        stepBtn.disabled = true;
    } else {
        vm.pause();
        setPauseButtonIcon(true);
        stepBtn.disabled = false;
    }
}

// Thin wrapper — chrome's shared helper takes the button element directly,
// so callers don't have to look it up themselves.
function setPauseButtonIcon(paused) {
    GMPlayerChrome.setPauseIcon(document.getElementById('pauseBtn'), paused);
}

// Hamburger opens the dev-settings popup; click-outside or Escape closes
// it (Escape is already wired to stopProgram, so we intercept when the
// popup is open to close it *instead* of stopping — see keydown handler).
function toggleSettingsPopup(event) {
    if (event) event.stopPropagation();   // don't trip click-outside below
    document.getElementById('settingsPopup').classList.toggle('active');
}

document.addEventListener('click', (e) => {
    const popup = document.getElementById('settingsPopup');
    if (!popup.classList.contains('active')) return;
    const hamburger = document.getElementById('hamburgerBtn');
    if (!popup.contains(e.target) && !hamburger.contains(e.target)) {
        popup.classList.remove('active');
    }
});

function stepFrame() {
    if (!vm || !vm.paused) return;
    // Execute one frame worth of instructions, then a full frame's worth
    // of state advance + render. Animation toggle alternates each preview
    // tick so sprites animate at ~30fps like on real hardware.
    for (let i = 0; i < maxInstructionsPerFrame && vm.running; i++) {
        vm.step();
    }
    vm.updateSpritePositions();
    animationFrameToggle = !animationFrameToggle;
    vm.advanceSpriteAnimations(animationFrameToggle);
    vm.renderPixels();
    updateBorderColor();
    updateInputDisplay();
}

function toggleSkipPauses() {
    skipPauseInstructions = document.getElementById('skipPausesToggle').checked;
    if (vm) vm.setConfig({ skipPauseInstructions });
}

function toggleHitboxes() {
    showHitboxes = document.getElementById('hitboxToggle').checked;
    if (vm) vm.setConfig({ showHitboxes });
}

function updateOpsPerFrame() {
    const val = parseInt(document.getElementById('opsInput').value, 10);
    if (!isNaN(val) && val > 0) {
        maxInstructionsPerFrame = val;
        if (vm) vm.setLoopParams({ opsPerFrame: val });
    } else {
        document.getElementById('opsInput').value = maxInstructionsPerFrame;
    }
}

// Update game border color based on active scene's border setting.
// The C64 has an addressable border around the drawable screen area.
// In GM, this can be set per-scene via "scene X border = color" commands.
function updateBorderColor() {
    if (!vm) return;
    const activeScene = vm.scenes[vm.activeScene];
    const borderColor = activeScene ? activeScene.borderColor : 0;
    const rgba = c64Palette[borderColor] || c64Palette[0];
    document.getElementById('gameBorder').style.background =
        `rgb(${rgba[0]}, ${rgba[1]}, ${rgba[2]})`;
}

function updateInputDisplay() {
    const j1 = document.getElementById('j1Display');
    const j2 = document.getElementById('j2Display');

    let j1str = '';
    j1str += inputState.joystick1.up ? '↑' : '\u00A0';
    j1str += inputState.joystick1.down ? '↓' : '\u00A0';
    j1str += inputState.joystick1.left ? '←' : '\u00A0';
    j1str += inputState.joystick1.right ? '→' : '\u00A0';
    j1str += inputState.button1 ? 'B' : '\u00A0';
    j1.textContent = j1str;

    let j2str = '';
    j2str += inputState.joystick2.up ? '↑' : '\u00A0';
    j2str += inputState.joystick2.down ? '↓' : '\u00A0';
    j2str += inputState.joystick2.left ? '←' : '\u00A0';
    j2str += inputState.joystick2.right ? '→' : '\u00A0';
    j2str += inputState.button2 ? 'B' : '\u00A0';
    j2.textContent = j2str;
}

// INS button: Insert a blank line at cursor position.
// Blank lines (opcode 0x00) do nothing when executed but take up memory.
// In original GM, blank lines actually stop execution.
function insertInstruction() {
    if (!currentProgramData) {
        currentProgramData = {
            instructions: [],
            mediaStore: [null]
        };
    }

    // Check for out of memory (blank line costs 1 unit)
    if (calculateFreeBlocks() < 1) {
        showOutOfMemory();
        return;
    }

    // Save undo state
    saveUndoState();

    const instructions = currentProgramData.instructions;

    // Default to end if no selection
    if (selectedLineIndex < 0) {
        selectedLineIndex = instructions.length;
    }

    // Create blank instruction (opcode 0x00)
    const blankInstr = {
        opcode: 0x00,
        arg1: 0,
        arg2: 0,
        label: 0,
        instructionName: ''
    };

    // Insert at cursor position, pushing everything down
    if (selectedLineIndex >= instructions.length) {
        instructions.push(blankInstr);
    } else {
        instructions.splice(selectedLineIndex, 0, blankInstr);
    }

    // Cursor stays on the inserted blank line, reset to single selection
    selectedLines.clear();
    selectedLines.add(selectedLineIndex);

    renderProgramListing();
    scrollToSelectedLine();
}

// DEL button: Delete selected instruction(s)
function deleteInstruction() {
    if (!currentProgramData || !currentProgramData.instructions) return;

    const instructions = currentProgramData.instructions;

    // Get indices to delete (filter out blank line at end)
    const toDelete = [...selectedLines]
        .filter(i => i >= 0 && i < instructions.length)
        .sort((a, b) => b - a);  // Sort descending to delete from end first

    if (toDelete.length === 0) return;

    // Save undo state
    saveUndoState();

    // Delete lines from end to start to maintain correct indices
    for (const idx of toDelete) {
        instructions.splice(idx, 1);
    }

    // Move cursor to first deleted position, clamped to valid range
    const firstDeleted = Math.min(...toDelete);
    selectedLineIndex = Math.min(firstDeleted, instructions.length);
    selectedLines.clear();
    selectedLines.add(selectedLineIndex);

    renderProgramListing();
}

// ==================== FIND ====================
// Live-typing find: status-message area shows a search input, the listing
// gets a highlight on every matching line (yellow), and the currently-
// focused match is brighter (orange). The find input is built once when
// the mode is entered so typing doesn't lose focus; only the count display
// updates as the search changes.
//
// What's searched: the line's displayed text, made up of its label
// (e.g. "l001") plus the formatted instruction name. That covers
// commands, comments, prints, labels, asset names, and any numeric
// value that appears in the rendered string.
const findMode = {
    active: false,
    query: '',
    matches: [],         // indices into currentProgramData.instructions
    currentIndex: 0
};

function findInstruction() {
    if (findMode.active) {
        exitFindMode();
    } else {
        enterFindMode();
    }
}

function enterFindMode() {
    findMode.active = true;
    findMode.query = '';
    findMode.matches = [];
    findMode.currentIndex = 0;

    const el = document.getElementById('statusMessage');
    el.classList.remove('flashing-error');
    el.innerHTML =
        '<span style="color: var(--c64-yellow)">find </span>' +
        '<input id="findInput" type="text" autocomplete="off" maxlength="40" ' +
        'style="background: var(--c64-blue); color: var(--c64-white); border: none; ' +
        'font: inherit; padding: 0 4px; width: 14ch; outline: none;">' +
        '<span id="findCount" style="color: var(--c64-yellow); margin-left: 8px"></span>' +
        '<span class="gm-yes-no" style="margin-left: 8px" onclick="findStep(-1)">&lt;</span>' +
        '<span class="gm-yes-no" style="margin-left: 4px" onclick="findStep(1)">&gt;</span>' +
        '<span class="gm-yes-no" style="margin-left: 8px" onclick="exitFindMode()">esc</span>';

    const input = document.getElementById('findInput');
    input.focus();
    input.addEventListener('input', () => {
        findMode.query = input.value;
        updateFindResults();
    });
    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === 'Tab') {
            // Tab inside the find input cycles matches instead of moving
            // focus elsewhere — keeps the user's hands on the keyboard.
            e.preventDefault();
            findStep(e.shiftKey ? -1 : 1);
        } else if (e.key === 'Escape') {
            e.preventDefault();
            exitFindMode();
        }
    });
}

function exitFindMode() {
    findMode.active = false;
    findMode.query = '';
    findMode.matches = [];
    clearFindHighlights();
    showMessage('');
}

// Re-run the search against currentProgramData and refresh highlights/count.
function updateFindResults() {
    findMode.matches = [];
    if (currentProgramData && currentProgramData.instructions && findMode.query) {
        const q = findMode.query.toLowerCase();
        const instrs = currentProgramData.instructions;
        for (let i = 0; i < instrs.length; i++) {
            const instr = instrs[i];
            const label = instr.label > 0 ? 'l' + instr.label.toString().padStart(3, '0') : '';
            const text = (label + ' ' + (instr.instructionName || '')).toLowerCase();
            if (text.includes(q)) findMode.matches.push(i);
        }
    }
    // Keep the focused index inside bounds when the result set shrinks.
    if (findMode.currentIndex >= findMode.matches.length) findMode.currentIndex = 0;

    renderFindHighlights();
    if (findMode.matches.length > 0) scrollToCurrentMatch();
    updateFindCount();
}

function renderFindHighlights() {
    const lines = document.querySelectorAll('.program-line');
    lines.forEach(line => line.classList.remove('find-match', 'find-current'));
    findMode.matches.forEach((lineIdx, i) => {
        const line = document.querySelector(`.program-line[data-index="${lineIdx}"]`);
        if (!line) return;
        line.classList.add('find-match');
        if (i === findMode.currentIndex) line.classList.add('find-current');
    });
}

function clearFindHighlights() {
    document.querySelectorAll('.program-line.find-match, .program-line.find-current').forEach(line => {
        line.classList.remove('find-match', 'find-current');
    });
}

function scrollToCurrentMatch() {
    const lineIdx = findMode.matches[findMode.currentIndex];
    if (lineIdx === undefined) return;
    const line = document.querySelector(`.program-line[data-index="${lineIdx}"]`);
    if (line) line.scrollIntoView({ block: 'center', behavior: 'auto' });
}

function updateFindCount() {
    const el = document.getElementById('findCount');
    if (!el) return;
    if (!findMode.query) {
        el.textContent = '';
    } else if (findMode.matches.length === 0) {
        el.textContent = '0/0';
    } else {
        el.textContent = `${findMode.currentIndex + 1}/${findMode.matches.length}`;
    }
}

function findStep(direction) {
    if (findMode.matches.length === 0) return;
    findMode.currentIndex =
        (findMode.currentIndex + direction + findMode.matches.length) % findMode.matches.length;
    renderFindHighlights();
    scrollToCurrentMatch();
    updateFindCount();
}

// ==================== EDIT (clipboard) ====================
// In-memory clipboard for cut/copy/paste of instruction lines. The buffer
// holds plain JS copies of the relevant instruction fields — no deep DOM
// or shared references. Paste re-clones so a single buffer can be pasted
// multiple times.
let clipboard = [];

// "edit" submenu state — when active the right-side button column swaps
// to a stripped-down set (ok/cut/copy/paste at the bottom, rest blank).
const editMode = { active: false };

// Snapshot of the normal button column, captured the first time edit
// mode is entered so it can be restored on exit.
let _normalButtonsSnapshot = null;

function _captureNormalButtons() {
    if (_normalButtonsSnapshot) return;
    _normalButtonsSnapshot = [];
    document.querySelectorAll('#buttonColumn button').forEach(btn => {
        _normalButtonsSnapshot.push({
            html: btn.innerHTML,
            onclick: btn.onclick,
            disabled: btn.disabled,
            color: btn.style.color,
            id: btn.id
        });
    });
}

function enterEditMode() {
    if (editMode.active) return;
    _captureNormalButtons();
    editMode.active = true;

    // Layout: blanks on top, ok/cut/copy/paste at the bottom (in that order
    // top-to-bottom). The number of blanks adapts to however many buttons
    // are in the column — bottom four are always the actions.
    const buttons = document.querySelectorAll('#buttonColumn button');
    const actions = [
        { text: 'ok',    fn: exitEditMode },
        { text: 'cut',   fn: cutSelection },
        { text: 'copy',  fn: copySelection },
        { text: 'paste', fn: pasteSelection }
    ];
    const blanks = buttons.length - actions.length;

    buttons.forEach((btn, i) => {
        if (i < blanks) {
            btn.innerHTML = '&nbsp;';
            btn.disabled = true;
            btn.onclick = null;
            btn.style.color = '';
        } else {
            const a = actions[i - blanks];
            btn.textContent = a.text;
            btn.disabled = false;
            btn.onclick = a.fn;
            btn.style.color = 'var(--c64-red)';
        }
    });
}

function exitEditMode() {
    if (!editMode.active) return;
    editMode.active = false;
    const buttons = document.querySelectorAll('#buttonColumn button');
    buttons.forEach((btn, i) => {
        const orig = _normalButtonsSnapshot[i];
        if (!orig) return;
        btn.innerHTML = orig.html;
        btn.onclick = orig.onclick;
        btn.disabled = orig.disabled;
        btn.style.color = orig.color;
    });
}

// Snapshot the currently-selected lines (multi or single) into clipboard.
// Returns true if anything was captured.
function _selectedIndices() {
    const instrs = currentProgramData && currentProgramData.instructions;
    if (!instrs) return [];
    const indices = selectedLines.size > 0
        ? [...selectedLines]
        : (selectedLineIndex >= 0 && selectedLineIndex < instrs.length ? [selectedLineIndex] : []);
    return indices
        .filter(i => i >= 0 && i < instrs.length)
        .sort((a, b) => a - b);
}

function _cloneInstruction(instr) {
    // Plain-data clone of the fields that matter for round-tripping. We
    // deliberately drop runtime-only properties (e.g. .parent pointers
    // attached by buildAST) — paste will rebuild any AST structure.
    const copy = {
        opcode: instr.opcode,
        arg1: instr.arg1,
        arg2: instr.arg2,
        label: instr.label || 0,
        instructionName: instr.instructionName || ''
    };
    if (instr.printBytes) copy.printBytes = Array.from(instr.printBytes);
    if (instr.stringData) copy.stringData = instr.stringData;
    return copy;
}

function copySelection() {
    const indices = _selectedIndices();
    if (indices.length === 0) return;
    const instrs = currentProgramData.instructions;
    clipboard = indices.map(i => _cloneInstruction(instrs[i]));
    showMessage(`copied ${clipboard.length} line${clipboard.length === 1 ? '' : 's'}`);
}

function cutSelection() {
    if (_selectedIndices().length === 0) return;
    copySelection();
    deleteInstruction();   // already operates on selectedLines / selectedLineIndex
}

function pasteSelection() {
    if (clipboard.length === 0) return;
    if (!currentProgramData || !currentProgramData.instructions) return;

    // Pre-check: the sum of clipboard line costs must fit in current free.
    // Paste doesn't touch mediaStore (clipboard is just instructions), so
    // we don't need the snapshot/revert dance the asset picker uses.
    const pasteCost = clipboard.reduce(
        (sum, instr) => sum + getInstructionCost(instr.opcode), 0);
    if (pasteCost > calculateFreeBlocks()) {
        showOutOfMemory();
        return;
    }

    saveUndoState();
    const instrs = currentProgramData.instructions;
    // Insert at the cursor (or at the end if cursor is past the listing).
    const insertAt = (selectedLineIndex >= 0 && selectedLineIndex <= instrs.length)
        ? selectedLineIndex
        : instrs.length;

    // Re-clone so subsequent edits don't mutate the buffered originals.
    const fresh = clipboard.map(_cloneInstruction);
    // Labels would duplicate across paste — strip them so the pasted block
    // is unlabelled (user can re-add labels as needed; auto-renumbering
    // would be surprising).
    fresh.forEach(i => { i.label = 0; });

    instrs.splice(insertAt, 0, ...fresh);

    // Move the cursor + selection to cover the freshly-pasted range so the
    // user can immediately delete or recopy if they want.
    selectedLines.clear();
    for (let k = 0; k < fresh.length; k++) selectedLines.add(insertAt + k);
    selectedLineIndex = insertAt;

    renderProgramListing();
    showMessage(`pasted ${fresh.length} line${fresh.length === 1 ? '' : 's'}`);
}

// === KEYBOARD ===

function setupKeyboardShortcuts() {
    // Undo/Redo shortcuts (only when not in game mode)
    window.addEventListener('keydown', (e) => {
        if (vm && vm.running) return;  // Game input handled at top level

        if (e.key === 'z' && (e.ctrlKey || e.metaKey) && !e.shiftKey) {
            e.preventDefault();
            undo();
        } else if ((e.key === 'z' && (e.ctrlKey || e.metaKey) && e.shiftKey) ||
                   (e.key === 'y' && (e.ctrlKey || e.metaKey))) {
            e.preventDefault();
            redo();
        } else if (e.key === 'f' && (e.ctrlKey || e.metaKey) && !e.shiftKey) {
            // Cmd-F / Ctrl-F opens find — same muscle memory as the browser
            // native find, which we override since the program listing is the
            // thing the user is searching, not the page.
            e.preventDefault();
            if (!findMode.active) enterFindMode();
            else document.getElementById('findInput')?.focus();
        } else if (e.key === 'g' && (e.ctrlKey || e.metaKey)) {
            // Cmd-G / Ctrl-G = find next (Shift = previous). Browser-standard;
            // works even when the user has clicked away from the find input.
            // No-op if find isn't active.
            e.preventDefault();
            if (findMode.active) findStep(e.shiftKey ? -1 : 1);
        } else if ((e.ctrlKey || e.metaKey) && !e.shiftKey &&
                   (e.key === 'c' || e.key === 'x' || e.key === 'v')) {
            // Standard cut/copy/paste — skip when the user is typing in a real
            // input (find field, comment edit) so we don't hijack normal text
            // editing semantics.
            const ae = document.activeElement;
            if (ae && (ae.tagName === 'INPUT' || ae.tagName === 'TEXTAREA' || ae.isContentEditable)) return;
            e.preventDefault();
            if      (e.key === 'c') copySelection();
            else if (e.key === 'x') cutSelection();
            else                    pasteSelection();
        } else if (e.key === 'Delete') {
            // Forward-delete: remove selected lines. Not Backspace — that's
            // claimed by digit-field editing.
            const ae = document.activeElement;
            if (ae && (ae.tagName === 'INPUT' || ae.tagName === 'TEXTAREA' || ae.isContentEditable)) return;
            e.preventDefault();
            deleteInstruction();
        }
    });
}

// Initialize on load
window.addEventListener('DOMContentLoaded', initApp);
</script>
