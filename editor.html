<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<!-- Mobile: default viewport allowing pinch-zoom. Locked to
     user-scalable=no dynamically when entering play mode (so the
     virtual dpad + fire button stay pinned to the same finger
     positions during gameplay). -->
<!-- Fixed-width layout: the editor UI is designed for 720px wide.
     `width=720` tells mobile browsers "lay out at 720px and scale to fit
     the actual device width" — works on every iOS version, unlike the
     CSS `zoom` trick which requires iOS 17.4+ (Mar 2024). Desktop
     browsers ignore this meta and show the editor at its native size.
     Swapped to a game-play-locked viewport by setPlayModeViewport(true)
     during gameplay (dpad + fire button need pinned finger positions). -->
<meta name="viewport" content="width=720, initial-scale=1">
<title>C64 GameMaker Editor</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="css/gm-ui.css">
<style>
/* Page layout */
#screen {
    background: var(--c64-gray1);
    width: 720px;
    height: 520px;
    margin: 0 auto;
    position: relative;
    display: flex;
    flex-direction: column;
}

/* Main content area */
#mainArea {
    display: flex;
    flex: 1;
    margin: 10px;
    gap: 10px;
    min-height: 0;
}

/* Left side: status + instruction picker + program */
#leftPanel {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-width: 0;
}

/* Status bar - uses flexbox so message area expands to fill space
   while name/free info shrinks to fit on the right */
#statusBar {
    background: var(--c64-gray3);
    border: 3px solid var(--c64-black);
    border-bottom: 6px solid var(--c64-black);
    border-right: 6px solid var(--c64-black);
    padding: 5px 10px;
    color: var(--c64-black);
    line-height: 1.4;
    display: flex;
}

/* Message area expands to fill available space; user-select: text
   allows selecting error messages for copying */
#statusMessage {
    flex: 1;
    text-align: center;
    color: var(--c64-blue);
    user-select: text;
}

/* Flashing error style - alternates red/lt-blue like original GM */
#statusMessage.flashing-error {
    animation: flash-error 0.3s infinite;
}

@keyframes flash-error {
    0%, 49% { color: var(--c64-red); }
    50%, 100% { color: var(--c64-ltblue); }
}

/* Name and free blocks info stays on the right */
#statusInfo {
    text-align: right;
}

#statusBar .label {
    color: var(--c64-blue);
}

#statusBar .value {
    color: var(--c64-red);
}

.confirm-option {
    cursor: pointer;
}

.confirm-option:hover {
    color: var(--c64-white);
}

/* Instruction picker */
#instructionPicker {
    background: var(--c64-gray3);
    border: 3px solid var(--c64-black);
    border-bottom: 6px solid var(--c64-black);
    border-right: 6px solid var(--c64-black);
    height: 5.8em;
    min-height: 3.2em;
    max-height: 20em;
    overflow-y: auto;
    resize: vertical;
    outline: none;
}

#instructionPicker .match-highlight {
    color: var(--c64-black);
}

#instructionPicker .instruction-item {
    padding: 2px 8px;
    color: var(--c64-blue);
    cursor: pointer;
    white-space: nowrap;
}

#instructionPicker .instruction-item:hover {
    background: var(--c64-gray2);
}

#instructionPicker .instruction-item.selected {
    background: var(--c64-blue);
    color: var(--c64-white);
}

/* Program display */
#programArea {
    flex: 1;
    background: var(--c64-gray1);
    overflow-y: auto;
    min-height: 0;
}

#programListing {
    padding: 5px;
}

.program-line {
    display: flex;
    color: var(--c64-lt-green);
    line-height: 1.4;
    cursor: pointer;
}

.program-line .label:hover {
    background: var(--c64-gray2);
    cursor: pointer;
}

/* When the keyboard has just been used (typing, arrow nav, etc.) we
   suppress mouse-hover highlighting until the user moves the mouse
   again. Keeps the cursor's "ghost" hover state from competing with
   keyboard focus for the user's eye. */
body.kbd-active .program-line .label:hover,
body.kbd-active .program-line .instruction:hover {
    background: transparent;
}

.program-line .label.active {
    background: var(--c64-gray2);
    color: var(--c64-white) !important;
}

.program-line .instruction:hover {
    background: var(--c64-gray2);
}

/* Selected line styling - matches original GM behavior:
   - Instruction text turns white (label keeps its color)
   - A flashing cursor block appears between label and instruction
   - No background color change on the line itself */
.program-line.selected {
    color: var(--c64-white);
}

.program-line.selected .instruction {
    color: var(--c64-white);
}

/* Find-mode line highlights — other matches are orange (de-emphasised);
   the currently focused match is yellow (the brightest highlight) so
   it pops as the user cycles through. Override .selected since find
   takes priority visually while it's active. */
.program-line.find-match {
    background: var(--c64-orange) !important;
    color: var(--c64-white) !important;
}
.program-line.find-match .instruction,
.program-line.find-match .label {
    color: var(--c64-white) !important;
}
.program-line.find-current {
    background: var(--c64-yellow) !important;
    color: var(--c64-black) !important;
}
.program-line.find-current .instruction,
.program-line.find-current .label {
    color: var(--c64-black) !important;
}

/* Multi-selected lines (shift-click range) get gray2 background */
.program-line.multi-selected {
    background: var(--c64-gray2);
    color: var(--c64-white);
}

.program-line.multi-selected .instruction {
    color: var(--c64-white);
}

.program-line.multi-selected .label {
    color: var(--c64-white);
}

/* Override comment/logic colors when multi-selected */
.program-line.multi-selected.comment-line,
.program-line.multi-selected.logic-line {
    color: var(--c64-white);
}

/* Override comment/logic colors when selected (instruction only) */
.program-line.selected.comment-line,
.program-line.selected.logic-line {
    color: var(--c64-white);
}

/* Flashing cursor block between label and instruction.
   Always takes up space (1ch) to prevent layout shift when selected.
   Only shows color when the line is selected. */
.program-line .cursor-block {
    width: 1ch;
    height: 1em;
    background: transparent;
}

.program-line.selected .cursor-block {
    animation: cursor-flash 500ms step-end infinite;
}

/* 250ms on, 250ms off = 500ms cycle */
@keyframes cursor-flash {
    0%, 50% { background: var(--c64-lt-blue); }
    50.01%, 100% { background: transparent; }
}

.program-line .label {
    min-width: 55px;
    width: 55px;
    flex-shrink: 0;
    color: var(--c64-lt-green);
    margin-right: 4px;
}

.program-line .instruction {
    flex: 1;
    white-space: pre;
}

/* Comment lines are cyan */
.program-line.comment-line {
    color: var(--c64-cyan);
}
.program-line.comment-line .label {
    color: var(--c64-cyan);
}

/* Logic statements (if/otherwise/endif) are yellow */
.program-line.logic-line {
    color: var(--c64-yellow);
}
.program-line.logic-line .label {
    color: var(--c64-yellow);
}

/* Editable fields have three visible states:
     - off the selected line: blends with surrounding instruction text
     - on the selected line (idle): blue background, white text — flags
       which bits of the instruction the user can click to change
     - currently focused for edit: same blue background, but pulses to
       lt-blue and back so the user can spot where keyboard input is going
   Comment and print fields are excluded from the line-selected blanket —
   their whole text is the editable content, so background-flagging would
   be redundant. */
.editable-field {
    cursor: pointer;
    user-select: none;
    /* Block single-finger scroll so vertical drag scrubs the value on
       touch. Pinch-zoom on the surrounding page still works. */
    touch-action: none;
}
.program-line.selected .editable-field:not([data-type="comment"]):not([data-type="print"]) {
    background: var(--c64-blue);
    color: var(--c64-white) !important;
}
.editable-field.active,
.editable-field.selected,
.editable-field.arg-editing {
    background: var(--c64-blue);
    color: var(--c64-white) !important;
    /* Same 500ms step-end rhythm as the cursor block — the arg's flash
       IS the cursor for keyboard input. See @keyframes cursor-flash. */
    animation: arg-pulse 500ms step-end infinite;
}
@keyframes arg-pulse {
    0%, 50%      { background: var(--c64-lt-blue); }
    50.01%, 100% { background: var(--c64-blue); }
}

/* When an arg on the selected line is actively focused, the cursor block
   "moves" to it (visually: the arg becomes the flashing cursor). Hide
   the regular cursor block in that case so the user sees one cursor,
   not two. Same for comment/print text-editing — the input's native
   caret (styled via caret-color / caret-shape on .string-edit-input)
   becomes the single cursor while typing. */
.program-line.selected:has(.editable-field.active) .cursor-block,
.program-line.selected:has(.editable-field.selected) .cursor-block,
.program-line.selected:has(.editable-field.arg-editing) .cursor-block,
.program-line.selected:has(.string-edit-input) .cursor-block {
    animation: none;
    background: transparent;
}

/* Comment and print fields: reserve the full storage width as the click
   target so an empty line still has something to click. 25ch fits the longest
   storage length (comments=25, print=21). The :empty rule injects a phantom
   nbsp via CSS so a truly empty span still has a clickable hit area —
   pseudo-element content doesn't show up in textContent so the editor logic
   that reads the actual text is unaffected. */
.program-line .editable-field[data-type="comment"],
.program-line .editable-field[data-type="print"] {
    display: inline-block;
    min-width: 25ch;
}

.program-line .editable-field[data-type="comment"]:empty::before,
.program-line .editable-field[data-type="print"]:empty::before {
    content: '\00a0';
}

/* Color search match highlight - shows typed portion in contrasting color */
.color-search-match {
    color: var(--c64-white);
    text-decoration: underline;
}

/* Asset picker dropdown - shows available files from disk for scene/sound/sprite/song args */
#assetPicker {
    display: none;
    position: absolute;
    background: var(--c64-gray3);
    border: 2px solid var(--c64-black);
    min-width: 120px;
    max-height: 200px;
    overflow-y: auto;
    z-index: 50;
}

#assetPicker.active {
    display: block;
}

#assetPicker .asset-item {
    padding: 2px 8px;
    color: var(--c64-blue);
    cursor: pointer;
    white-space: nowrap;
}

#assetPicker .asset-item:hover {
    background: var(--c64-gray2);
}

#assetPicker .asset-item.selected {
    background: var(--c64-blue);
    color: var(--c64-white);
}

#assetPicker .asset-item .match-highlight {
    color: var(--c64-black);
}

#assetPicker .no-files {
    padding: 4px 8px;
    color: var(--c64-red);
    font-style: italic;
}

/* Container is the positioning anchor for the synthetic block cursor
   (caret-shape: block isn't reliably honored across browsers, so we
   render one ourselves). inline-block keeps the input/cursor pair
   flowing with the surrounding text. */
.string-edit-container {
    display: inline-block;
    position: relative;
}

.string-edit-input {
    font-family: inherit;
    font-size: inherit;
    background: var(--c64-blue);
    color: var(--c64-white);
    border: none;
    outline: none;
    padding: 0;
    margin: 0;
    min-width: 0;
    /* Force lowercase display — the JS oninput filter also lowercases the
       underlying value, but this catches the visual flash before that runs. */
    text-transform: lowercase;
    /* Native caret is suppressed — JS positions a block cursor span on
       top instead (.string-edit-cursor). */
    caret-color: transparent;
}

/* Synthetic block cursor for the input — flashes in lt-blue at the same
   rhythm as the line's cursor-block, positioned by JS at selectionEnd
   (`left = pos * 1ch` since the C64 font is monospace). pointer-events:
   none so clicks pass through to the input behind it. */
.string-edit-cursor {
    position: absolute;
    /* The input centers its text vertically within its line-box, so
       top: 0 lands ~2px above the glyphs. Nudge down to sit on the
       text baseline like the inline .cursor-block does naturally. */
    top: 2px;
    width: 1ch;
    height: 1em;
    pointer-events: none;
    animation: cursor-flash 500ms step-end infinite;
}

.string-edit-padding {
    background: var(--c64-blue);
    color: var(--c64-lt-blue);
}

/* Button column on right */
#buttonColumn {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

#buttonColumn button {
    padding: 5px 8px;
    min-width: 55px;
}

/* Game overlay — player chrome shown while a program is running. Mirrors
   play.html: fluid canvas centered above a fixed-height bottom bar that
   doubles as the C64-style bottom border and holds the runtime controls. */
:root {
    --game-bar-height: 44px;
    /* Cosmetic top border, half the bottom bar's height. Frames the
       playfield symmetrically without stealing room for controls. */
    --game-top-height: 22px;
}

#gameOverlay {
    display: none;
    /* Fixed to viewport, not to #screen (which is fixed at 720×520 and
       would clip both the fluid canvas and the bottom bar). The canvas
       math below is viewport-relative — the containing block has to be
       too or the bar ends up floating in the middle of the game. */
    position: fixed;
    inset: 0;
    background: var(--c64-black);
    z-index: 100;
    flex-direction: column;
    /* Suppress iOS rubber-band scroll and browser gestures during play so
       the joystick doesn't drag the whole page. Editor UI is unaffected —
       gameOverlay is display:none until play mode is entered. */
    overscroll-behavior: contain;
    touch-action: none;
}
#gameOverlay.active { display: flex; }

/* Fills all vertical space above the bar. min-height:0 lets flex shrink
   this under the canvas's aspect-derived height on short viewports —
   otherwise the canvas would push the bar off-screen. */
#playArea {
    flex: 1;
    min-height: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}

/* Thin top border strip — cosmetic only. Mirrors play.html. */
#gameOverlay #topBar {
    height: var(--game-top-height);
    flex-shrink: 0;
    background: var(--c64-black);
}

#bottomBar {
    height: var(--game-bar-height);
    flex-shrink: 0;
    position: relative;
    background: var(--c64-black);
}

/* Canvas wrapper — no padding: the bottom bar acts as the bottom border,
   and the black body background surrounds the canvas on the other sides.
   Runtime tints this element per-scene via border opcodes. */
#gameBorder {
    display: inline-block;
    position: relative;
    background: rgb(0, 0, 0);
}

/* Fluid canvas: width capped by the smaller of 90vw and the width
   derived from the available vertical space (viewport minus top and
   bottom bars). See play.html for the full rationale. */
#gameCanvas {
    display: block;
    width: min(90vw, calc((100vh - var(--game-bar-height) - var(--game-top-height)) * 6 / 5));
    aspect-ratio: 6 / 5;
    height: auto;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    max-width: 960px;
    /* Never render smaller than the editor's canonical 480×400 canvas.
       Below this viewport size the canvas would otherwise scale further
       down; on desktop that turns into a tiny thumbnail which nobody
       wants. On mobile we drop the min in the media query below so the
       game actually fits the screen. */
    min-width: 480px;
}
/* Mobile: let the canvas shrink to fit the viewport. On a 375×812
   phone in landscape, the `min-width: 480px` above forces overflow
   past the bottom of the viewport, hiding the bottom-bar controls
   above where they visually should be. The C64 native resolution is
   only 320×200, so anything ≥ that is still playable — no need to
   enforce 480 on a device that physically can't display it. */
@media (max-width: 900px), (max-height: 500px) {
    #gameCanvas {
        min-width: 0;
    }
}

/* Play-button overlay for ?play=1 / ?play_demo=1. Poster preview renders
   on the canvas beneath; click both starts the VM and unlocks the
   AudioContext. inset:0 tracks the canvas exactly (no more padding). */
#playOverlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.55);
    align-items: center;
    justify-content: center;
    z-index: 5;
    cursor: pointer;
}
#playOverlay.active { display: flex; }

#playButton {
    width: 96px;
    height: 96px;
    padding: 0;
    background: rgba(255, 255, 255, 0.12);
    border: 2px solid rgba(255, 255, 255, 0.8);
    border-radius: 50%;
    color: white;
    font-family: inherit;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
}
#playButton:hover:not(:disabled) { background: rgba(255, 255, 255, 0.22); }
#playButton:disabled {
    cursor: default;
    width: auto;
    height: auto;
    border-radius: 8px;
    padding: 12px 20px;
    font-size: 14px;
    opacity: 0.85;
}
#playButton svg { width: 44px; height: 44px; display: block; }

/* Credit link, left side of the bottom bar. */
#gameOverlay .credit {
    position: absolute;
    top: 50%;
    left: 20px;
    transform: translateY(-50%);
    color: rgba(255, 255, 255, 0.5);
    font-size: 12px;
    text-decoration: none;
    font-family: monospace;
}
#gameOverlay .credit:hover { color: rgba(255, 255, 255, 0.9); }

/* Right-side control cluster. DOM order left→right: hamburger, stop,
   pause, mute. The extra margin-right on #stopBtn creates the "space"
   between system controls (hamburger/stop) and playback controls
   (pause/mute). */
#gameControls {
    position: absolute;
    right: 20px;
    bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
}
#gameControls #stopBtn { margin-right: 8px; }

#gameControls button {
    width: 28px;
    height: 28px;
    background: rgba(0, 0, 0, 0.5);
    border: 1px solid rgba(255, 255, 255, 0.25);
    border-radius: 4px;
    cursor: pointer;
    color: rgba(255, 255, 255, 0.9);
    padding: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: inherit;
    transition: background 0.1s;
}
#gameControls button:hover { background: rgba(0, 0, 0, 0.75); }
#gameControls button:disabled { opacity: 0.4; cursor: default; }
#gameControls button svg { width: 100%; height: 100%; display: block; }

/* Edit-mode fullscreen button. Floats in the top-right corner of the
   viewport so it's always reachable while editing on mobile (the
   editor's own button column is inside the fixed 720×520 stage and
   would scroll off with the layout). Hidden during play mode to avoid
   doubling up with the play-mode fullscreen button. */
#editorFullscreenBtn {
    position: fixed;
    top: 8px;
    right: 8px;
    z-index: 100;
    width: 32px;
    height: 32px;
    background: rgba(0, 0, 0, 0.55);
    border: 1px solid rgba(255, 255, 255, 0.25);
    border-radius: 4px;
    padding: 4px;
    color: rgba(255, 255, 255, 0.9);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
}
#editorFullscreenBtn:hover { background: rgba(0, 0, 0, 0.8); }
#editorFullscreenBtn svg { width: 100%; height: 100%; display: block; }
body.play-mode #editorFullscreenBtn { display: none; }

/* Stop button — always shows the square icon PLUS a "stop & edit"
   text label in c64-blue. It's the exit path back to the code and
   too important to hide behind a bare icon. The button is only in
   the DOM tree that's visible during play mode (inside #gameOverlay,
   which is display: none while editing), so no additional gating
   needed — it's shown exactly when a game is running. */
#gameControls #stopBtn {
    width: auto;
    padding: 4px 10px 4px 6px;
    gap: 6px;
    background: rgba(64, 49, 141, 0.85);          /* c64-blue tint */
    border-color: rgba(120, 105, 196, 0.9);       /* c64-light-blue outline */
}
#gameControls #stopBtn:hover {
    background: rgba(64, 49, 141, 1);
}
#gameControls #stopBtn svg {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
}
#gameControls #stopBtn::after {
    content: 'stop & edit';
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.02em;
    white-space: nowrap;
}

/* === TOUCH CONTROLS ===
   Rendered by js/gmTouchControls.js on top of #playArea when a game runs.
   Only relevant in play mode (mount happens from runProgram / play overlay
   only when on a touch device). Sizing mirrors play.html for parity —
   the controls should feel the same in either host. */
.gm-touch-overlay {
    position: absolute;
    inset: 0;
    z-index: 50;
    pointer-events: none;
    touch-action: none;
}
.gm-touch-joystick,
.gm-touch-fire {
    position: absolute;
    pointer-events: auto;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
}
.gm-touch-joystick {
    left: 24px;
    bottom: 24px;
    width: 140px;
    height: 140px;
    border: 2px solid rgba(255, 255, 255, 0.25);
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.05);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.1s;
}
.gm-touch-joystick.gm-touch-active { background: rgba(255, 255, 255, 0.12); }
.gm-touch-joystick-puck {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.35);
    border: 2px solid rgba(255, 255, 255, 0.55);
    pointer-events: none;
    transition: transform 0.05s linear;
}
.gm-touch-fire {
    right: 24px;
    bottom: 40px;
    width: 96px;
    height: 96px;
    border-radius: 50%;
    background: rgba(200, 40, 40, 0.35);
    border: 2px solid rgba(255, 255, 255, 0.55);
    color: rgba(255, 255, 255, 0.85);
    font-size: 42px;
    line-height: 92px;
    text-align: center;
    transition: background 0.05s;
}
.gm-touch-fire.gm-touch-active { background: rgba(200, 40, 40, 0.65); }

/* Audio indicator sits at the end of the flex row — override the shared
   CSS's absolute positioning so it flexes with the other icons. */
#gameControls .gm-audio-indicator {
    position: static;
    bottom: auto;
    right: auto;
    width: 28px;
    height: 28px;
    padding: 4px;
}

/* Hamburger popup — opens above the bar, right-aligned, closes on
   click-outside or Escape. Houses the dev/debug settings that don't
   warrant a permanent slot in the bar. */
#settingsPopup {
    display: none;
    position: absolute;
    bottom: calc(var(--game-bar-height) + 4px);
    right: 20px;
    background: rgba(0, 0, 0, 0.92);
    border: 1px solid rgba(255, 255, 255, 0.25);
    border-radius: 4px;
    padding: 12px;
    z-index: 10;
    min-width: 180px;
    color: rgba(255, 255, 255, 0.9);
    font-size: 12px;
}
#settingsPopup.active { display: block; }

#settingsPopup .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 8px;
}
#settingsPopup .row:last-child { margin-bottom: 0; }

#settingsPopup label {
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
}

#settingsPopup input[type="number"] {
    width: 60px;
    font-family: inherit;
    font-size: 12px;
    padding: 2px 4px;
}

#settingsPopup button {
    padding: 4px 10px;
    font-family: inherit;

<body>

<!-- Floating fullscreen button — visible any time the editor is in
     edit mode. Hidden by CSS during play mode (body.play-mode) since
     the play-mode chrome has its own fullscreen button that lives in
     the game bar. See #editorFullscreenBtn CSS + toggleFullscreen()
     JS below. Rendered outside #screen so it's positioned against
     the viewport, not the fixed 720×520 editor stage. -->
<button id="editorFullscreenBtn" type="button" aria-label="Fullscreen" onclick="toggleFullscreen()">
    <!-- Icon body is replaced by refreshFullscreenIcon() to reflect
         enter-vs-exit state; this initial SVG is the "enter" glyph. -->
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M4 9 L4 4 L9 4 M15 4 L20 4 L20 9 M20 15 L20 20 L15 20 M9 20 L4 20 L4 15"
              fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
</button>

<div id="screen">
    <div id="mainArea">
        <div id="leftPanel">
            <div id="statusBar">
                <div id="statusMessage"></div>
                <div id="statusInfo">
                    <div><span class="label">name-</span><span id="programName" class="value">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span></div>
                    <div><span class="label">free-</span><span id="freeBlocks" class="value">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span></div>
                </div>
            </div>
            <div id="instructionPicker"></div>
            <div id="programArea">
                <div id="programListing"></div>
            </div>
        </div>

        <div id="buttonColumn">
            <button onclick="showMenu()">menu</button>
            <button onclick="showFilePopup()">file</button>
            <button onclick="clearProgram()">clr</button>
            <button onclick="runProgram()">run</button>
            <button onclick="insertInstruction()">ins</button>
            <button onclick="deleteInstruction()">del</button>
            <button onclick="findInstruction()">find</button>
            <button onclick="enterEditMode()">edit</button>
            <button id="undoBtn" onclick="undo()" disabled>undo</button>
            <button id="redoBtn" onclick="redo()" disabled>redo</button>
        </div>
    </div>

    <!-- Asset picker dropdown for selecting scenes/sounds/sprites/songs from disk -->
    <div id="assetPicker"></div>

    <div id="gameOverlay">
        <!-- Thin cosmetic top border strip; no interactive content. -->
        <div id="topBar"></div>
        <div id="playArea">
            <div id="gameBorder">
                <canvas id="gameCanvas" width="320" height="200"></canvas>
                <!-- Only visible when the page opens via ?play=1 / ?play_demo=1.
                     A poster preview renders on the canvas beneath; the click
                     both starts the VM and unlocks the AudioContext. -->
                <div id="playOverlay">
                    <button id="playButton" type="button" aria-label="Play">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                            <path d="M7 5 L19 12 L7 19 Z"
                                  fill="currentColor"
                                  stroke="currentColor"
                                  stroke-width="3"
                                  stroke-linejoin="round"
                                  stroke-linecap="round"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
        <!-- Bottom bar: credit on the left, controls on the right, settings
             popup floats above the bar's right edge when the hamburger is
             open. Visual order (left→right): hamburger, stop, [gap], pause,
             mute (audio indicator mounts at the end from JS). -->
        <div id="bottomBar">
            <a class="credit" href="https://gmc64.com" target="_blank" rel="noopener">gmc64.com</a>
            <div id="gameControls">
                <button id="hamburgerBtn" type="button" aria-label="Settings" onclick="toggleSettingsPopup(event)">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                        <rect x="4" y="6" width="16" height="2" rx="1" fill="currentColor"/>
                        <rect x="4" y="11" width="16" height="2" rx="1" fill="currentColor"/>
                        <rect x="4" y="16" width="16" height="2" rx="1" fill="currentColor"/>
                    </svg>
                </button>
                <button id="stopBtn" type="button" aria-label="Stop and edit (esc)" onclick="stopProgram()">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                        <rect x="6" y="6" width="12" height="12" rx="1" fill="currentColor"/>
                    </svg>
                </button>
                <button id="pauseBtn" type="button" aria-label="Pause" onclick="togglePause()">
                    <!-- Icon swapped in JS via setPauseButtonIcon(). -->
                </button>
                <button id="fullscreenToggle" type="button" aria-label="Fullscreen" onclick="toggleFullscreen()">
                    <!-- SVG replaced dynamically by refreshFullscreenIcon() to
                         reflect enter vs exit state. Same shape family as
                         play.html's fullscreen button. -->
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                        <path d="M4 9 L4 4 L9 4 M15 4 L20 4 L20 9 M20 15 L20 20 L15 20 M9 20 L4 20 L4 15"
                              fill="none" stroke="currentColor" stroke-width="2"
                              stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <!-- Audio indicator mounts here (rightmost). -->
            </div>
            <div id="settingsPopup">
                <div class="settings-section-label">Audio</div>
                <div class="row">
                    <label>Volume</label>
                    <input type="range" id="volumeSlider" min="0" max="100" step="1" value="75">
                </div>
                <div class="settings-section-label">Controls</div>
                <div class="row">
                    <label>Joystick 1</label>
                    <select id="joy1Sel"></select>
                </div>
                <div class="row">
                    <label>Joystick 2</label>
                    <select id="joy2Sel"></select>
                </div>
                <div class="settings-section-label">Debug</div>
                <div class="row">
                    <button id="stepBtn" onclick="stepFrame()" disabled>step</button>
                </div>
                <div class="row">
                    <label><input type="checkbox" id="skipPausesToggle" onchange="toggleSkipPauses()"> skip pauses</label>
                </div>
                <div class="row">
                    <label><input type="checkbox" id="hitboxToggle" onchange="toggleHitboxes()"> hitboxes</label>
                </div>
                <div class="row">
                    <label>ops/frame <input type="number" id="opsInput" value="50" min="1" max="500" onchange="updateOpsPerFrame()"></label>
                </div>
                <div class="row stats">
                    fps <span id="fpsDisplay">0</span> · ops <span id="opsDisplay">0</span>
                </div>
                <div class="row stats">
                    j1 <span id="j1Display">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> · j2 <span id="j2Display">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Export Game dialog. Fires from the file popup's "Export Game"
         custom button. Two sections: download the self-contained HTML
         (top), and — once hosted — grab a matching iframe embed snippet
         (bottom). If the user is on the bundled demo disk, the URL field
         pre-fills with the gmc64.com/play.html link so demo embeds work
         without going through export/host at all. -->
    <div id="exportDialog">
        <div class="export-dialog-content">
            <h3>Export Game</h3>
            <p class="export-hint">Download a self-contained HTML file.</p>

            <div class="export-row">
                <label>Filename</label>
                <input type="text" id="exportFilename" placeholder="game.html">
                <button id="exportDownloadBtn" onclick="triggerExportDownload()">Download HTML</button>
            </div>

            <hr>

            <div class="export-section-label">Embed (optional)</div>
            <p class="export-hint">To embed on a page, paste the URL where you're hosting the above file.</p>
            <div class="export-row">
                <label>Hosted URL</label>
                <input type="text" id="exportUrl" oninput="updateExportSnippet()" placeholder="https://your-site.com/game.html">
            </div>
            <div class="export-row">
                <label>Width</label>
                <input type="number" id="exportWidth" oninput="updateExportSnippet()" value="640" min="100" step="10">
                <span class="export-row-hint">× <span id="exportHeightReadout">533</span></span>
            </div>
            <div class="export-row">
                <label>Poster</label>
                <input type="number" id="exportPosterSeconds" oninput="updateExportSnippet()" value="2" min="0" max="10" step="0.5">
                <span class="export-row-hint">seconds after startup</span>
            </div>
            <div class="export-row export-checkbox-row">
                <label><input type="checkbox" id="exportNoCredit" onchange="updateExportSnippet()"> Hide gmc64.com link</label>
            </div>
            <textarea id="exportSnippet" readonly rows="6" spellcheck="false"></textarea>
            <div class="export-buttons">
                <button id="exportCopyBtn" onclick="copyExportSnippet()">Copy</button>
                <button onclick="closeExportDialog()">Close</button>
            </div>
        </div>
    </div>
</div>

<!-- Core libraries -->

<!-- play.html snapshot (with all its <script src> tags inlined), exposed
     as window._standaloneSource. The "Export Game" flow patches two
     const placeholders in this string with the current game's base64
     PRG + D64 and downloads the result — the exported HTML is literally
     play.html with two strings changed. Generated by
     `node tools/bundle-standalone.js`; test suite verifies it's current.
     Inert at editor runtime — just string data sitting in memory. -->
<script src="js/standalone-source.js"></script>

<!-- The demo disk (js/demo-disk-source.js, ~228KB base64) is lazy-loaded
     on demand via GMTools.getDemoDiskBytes() so visitors who never use
     the demo don't pay for the bundle on cold load. See
     tools/bundle-demo-disk.js for the bundle itself; loading happens
     via dynamic <script> injection at first call. -->


<script>
// === STATE ===
let currentProgramData = null;
let currentFileData = null;
let selectedLineIndex = -1;      // Primary selection / anchor for shift-select
let selectedLines = new Set();   // All selected line indices (for multi-select)
let selectedInstructionIndex = 0;

// Drag-select state. mousedown on a program line starts a potential drag;
// once the mouse moves to a different line, dragHappened flips true and
// the selection extends across the range. The flag suppresses the
// follow-on click (which would otherwise reset to a single-line select).
const lineDrag = {
    active: false,
    startIndex: -1,
    dragHappened: false
};

function onLineDragStart(e, lineIndex) {
    // Skip drags that begin on truly interactive children (numeric arg
    // editable-fields, labels) — those have their own mousedown handling.
    // Comment and print text fields ARE allowed: they take up most of the
    // line's width, so blocking drag there would leave drag-select unable
    // to start on most of the visible line. The text-edit click handler
    // checks lineDrag.dragHappened to distinguish a click from a drag.
    if (e.target.classList.contains('label')) return;
    if (e.target.classList.contains('editable-field')) {
        const type = e.target.dataset.type;
        if (type !== 'comment' && type !== 'print') return;
    }
    // Shift-click is handled by the existing onclick path (range from anchor).
    if (e.shiftKey) return;

    lineDrag.active = true;
    lineDrag.startIndex = lineIndex;
    lineDrag.dragHappened = false;
}

function onLineDragMove(e) {
    if (!lineDrag.active) return;

    // Pick the target line by bounds: whichever line's box currently contains
    // the cursor. So a line enters the selection the moment the cursor crosses
    // into its bounding box — matches what the user sees, no surprise when
    // clicking on the top half of a line (the midpoint approach would select
    // the line above too, since the cursor is still above the start line's
    // midpoint). Falls back to the first/last line when the cursor is above
    // or below the entire listing.
    const lines = document.querySelectorAll('.program-line');
    if (!lines.length) return;
    let targetIdx = -1;
    for (const line of lines) {
        const rect = line.getBoundingClientRect();
        if (e.clientY >= rect.top && e.clientY < rect.bottom) {
            targetIdx = parseInt(line.dataset.index);
            break;
        }
    }
    if (targetIdx < 0) {
        // Cursor above the first line → clamp to first; below the last → clamp to last
        const firstTop = lines[0].getBoundingClientRect().top;
        targetIdx = parseInt((e.clientY < firstTop ? lines[0] : lines[lines.length - 1]).dataset.index);
    }
    if (isNaN(targetIdx)) return;
    if (targetIdx === lineDrag.startIndex && !lineDrag.dragHappened) return;

    lineDrag.dragHappened = true;
    const start = Math.min(lineDrag.startIndex, targetIdx);
    const end   = Math.max(lineDrag.startIndex, targetIdx);
    selectedLines.clear();
    for (let i = start; i <= end; i++) selectedLines.add(i);
    selectedLineIndex = targetIdx;
    updateLineSelectionUI();
}

function onLineDragEnd() {
    if (!lineDrag.active) return;
    lineDrag.active = false;
    // dragHappened stays true if a drag occurred — onclick will see it and
    // skip the single-line select, then reset the flag.
}

document.addEventListener('mousemove', onLineDragMove);
document.addEventListener('mouseup', onLineDragEnd);

// Undo/redo stacks
const undoStack = [];
const redoStack = [];
const MAX_UNDO = 50;

// GMDisk instance
const gmDisk = new GMDisk();

// VM and screen for running programs
let vm = null;
let screen = null;
const charset = new gmCharset();
let animationFrameToggle = false;
// NTSC C64 vertical blank rate — the hardware clock GameMaker programs
// were authored against. 1000/60 (16.667) would be close but overshoots
// slightly; the exact NTSC rate is 59.94Hz. setTimeout accepts floats.
const FRAME_TIME = 1000 / 59.94; // ~16.683 ms
let maxInstructionsPerFrame = 50;

// FPS tracking
let frameCount = 0;
let lastFpsUpdate = 0;
let currentFps = 0;
let currentOpsPerFrame = 0;

// Global audio context for sound playback
let audioContext = null;
let masterGain = null;

// Speaker-icon button mounted inside the play-area border. Shows + toggles
// audio state. Bound in initApp; refreshed any time audio state changes.
let audioIndicator = null;

// User volume 0..1. Shared with play.html via the same localStorage key
// so a preference set in one context carries to the other.
const VOLUME_KEY = 'gmc64-volume';
let userVolume = parseFloat(localStorage.getItem(VOLUME_KEY));
if (!isFinite(userVolume) || userVolume < 0 || userVolume > 1) userVolume = 0.75;
// SFX_BASELINE is the pre-slider gain — the "100% user volume" ceiling.
const SFX_BASELINE = 0.3;

function initAudio() {
    if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioContext.createGain();
        masterGain.gain.value = SFX_BASELINE * userVolume;
        masterGain.connect(audioContext.destination);
    }
    if (audioContext.state === 'suspended') {
        audioContext.resume();
    }
    // First call creates the context; let the indicator lazy-attach its
    // statechange listener and pick up the new state.
    if (audioIndicator) audioIndicator.refresh();
}

// Runtime flags
let showHitboxes = false;
let skipPauseInstructions = false;
let audioMuted = false;

// Handle to mounted touch controls (mount happens in runProgram on touch
// devices; unmount in stopProgram to free the joystick overlay from
// covering the editor UI once the game exits). null on desktop — the
// module returns a no-op sentinel that doesn't need an unmount call.
let touchControls = null;

// Input state for VM
const inputState = {
    joystick1: { up: false, down: false, left: false, right: false },
    joystick2: { up: false, down: false, left: false, right: false },
    button1: false,
    button2: false
};

// Clear all input state - called on blur/visibility change to prevent stuck keys
function clearInputState() {
    inputState.joystick1.up = false;
    inputState.joystick1.down = false;
    inputState.joystick1.left = false;
    inputState.joystick1.right = false;
    inputState.joystick2.up = false;
    inputState.joystick2.down = false;
    inputState.joystick2.left = false;
    inputState.joystick2.right = false;
    inputState.button1 = false;
    inputState.button2 = false;
}

// Clear input when window loses focus - prevents stuck keys when Cmd+Tab, etc.
window.addEventListener('blur', clearInputState);

// Clear input when page visibility changes (tab switch, minimize)
document.addEventListener('visibilitychange', () => {
    if (document.hidden) clearInputState();
});

// Editor-side blocker: when the game is running, stop editor keyboard
// shortcuts from firing (Enter inserting instructions, letters triggering
// type-to-search, etc.). Joystick handling itself lives in the shared
// GMPlayerChrome listener, attached at capture phase so it runs before
// this blocker's stopImmediatePropagation kicks in.
window.addEventListener('keydown', (e) => {
    if (!vm || !vm.running) return;
    e.stopImmediatePropagation();
    // ESC: close settings popup if open, otherwise stop the program.
    if (e.key === 'Escape') {
        const popup = document.getElementById('settingsPopup');
        if (popup && popup.classList.contains('active')) {
            popup.classList.remove('active');
        } else {
            stopProgram();
        }
        e.preventDefault();
    }
});
window.addEventListener('keyup', (e) => {
    if (!vm || !vm.running) return;
    e.stopImmediatePropagation();
});

// Input preset settings — persisted in localStorage. Different key from
// the player so choices don't cross between editor and player contexts.
const INPUT_SETTINGS_KEY = 'gmc64-editor-input';
let inputSettings = GMPlayerChrome.loadInputSettings(
    INPUT_SETTINGS_KEY, GMPlayerChrome.DEFAULT_INPUT_SETTINGS);

// Attached once at load; capture-phase so the blocker above can't
// shadow it. Gated on vm.running so pre-game key presses don't leak.
GMPlayerChrome.setupInputListeners({
    inputState,
    getPresets: () => inputSettings,
    isEnabled: () => vm && vm.running
});

// Populate joy1/joy2 selectors after the DOM is ready. Selection
// changes update inputSettings + persist.
document.addEventListener('DOMContentLoaded', () => {
    for (const which of ['joy1', 'joy2']) {
        const sel = document.getElementById(which + 'Sel');
        if (!sel) return;   // may run before overlay is present in tests
        sel.innerHTML = '';
        for (const [value, label] of GMPlayerChrome.PRESET_LABELS) {
            const opt = document.createElement('option');
            opt.value = value;
            opt.textContent = label;
            sel.appendChild(opt);
        }
        sel.value = inputSettings[which];
        sel.addEventListener('change', () => {
            inputSettings = { ...inputSettings, [which]: sel.value };
            GMPlayerChrome.saveInputSettings(INPUT_SETTINGS_KEY, inputSettings);
        });
    }

    // Volume slider — shared localStorage key with play.html, applies to
    // both the host masterGain (SFX) and vm.config.userVolume (music).
    const slider = document.getElementById('volumeSlider');
    if (slider) {
        slider.value = Math.round(userVolume * 100);
        slider.addEventListener('input', () => {
            userVolume = slider.value / 100;
            localStorage.setItem(VOLUME_KEY, String(userVolume));
            if (masterGain) masterGain.gain.value = SFX_BASELINE * userVolume;
            if (vm) vm.setConfig({ userVolume });
        });
    }
});

// Load file by name (required by gmParser for scene loading)
function loadFileByName(fileName) {
    return gmDisk.loadFile(fileName);
}

// === INITIALIZATION ===

function initApp() {
    populateInstructionPicker();
    setupKeyboardShortcuts();
    setupEditorKeyboard();

    // Load disk from localStorage
    gmDisk.autoLoad();

    // First-visit convenience: seed the demo disk into an empty pool so the
    // file menu isn't a dead end. Fire-and-forget; URL-driven loads below
    // still win because addToPool dedupes.
    GMTools.ensureDemoDiskInPool(gmDisk);

    // Try to load saved program
    loadSavedProgram();

    updateStatusInfo();

    // Mount the audio indicator at the end of the bottom-bar control
    // cluster (rightmost icon). onUnlock restarts any song whose schedule
    // window was missed during AudioContext suspension.
    // Shared disk picker: fallback for URL-driven ?disk=X with 2+ PRGs,
    // plus window-level drag-and-drop of .d64 files anywhere in the
    // editor. On pick, loadProgramData + saveProgram mirror what
    // showFilePopup's onSelect used to do.
    picker = GMDiskPicker.mount(document.body, {
        extension: '/PRG',
        disk: gmDisk,
        windowDropEnabled: true,
        onPickFile: (name, bytes) => {
            loadProgramData(name, bytes);
            saveProgram(name, bytes);
            updateStatusInfo();
        },
        // Multi-match drop hands off to the standard file popup rather
        // than the module's overlay picker — one file browser to learn.
        showPicker: () => showFilePopup()
    });

    audioIndicator = new GMAudioIndicator(document.getElementById('gameControls'));
    audioIndicator.bind({
        getMuted: () => audioMuted,
        setMuted: (muted) => {
            audioMuted = muted;
            if (vm) vm.setConfig({ audioMuted: muted });
        },
        getAudioContext: () => audioContext,
        onUnlock: () => {
            if (vm && vm.currentSong) {
                try {
                    vm.currentSong.stop();
                    vm.currentSong.play();
                    vm.currentSong.setVolume(vm._effectiveSongVolume());
                } catch (e) {
                    console.warn('Failed to restart song after audio unlock:', e.message);
                }
            }
        }
    });

    // URL-driven loaders, mutually exclusive (most-specific first):
    //
    //   ?play_demo=1
    //       Alias — same effect as visiting
    //       `?disk=demo&file=GMC64I/PRG&play=1&poster_seconds=8.5`.
    //       Kept as a short link for the marketing site.
    //
    //   ?disk=<url>[&file=<name>][&play=1][&poster_seconds=N]
    //       Fetch the disk, open the file in the editor. If `play=1` is
    //       also present, show a play-button overlay with a rendered
    //       poster on the game canvas — clicking play starts the VM,
    //       clicking the sidebar exit drops the user into the editor.
    //
    // Bare-URL visits get the regular empty editor / restored program —
    // no autoplay ambushes.
    const params = new URLSearchParams(location.search);
    if (params.has('play_demo')) {
        const aliasParams = new URLSearchParams();
        aliasParams.set('disk', 'demo');
        aliasParams.set('file', 'GMC64I/PRG');
        aliasParams.set('play', '1');
        aliasParams.set('poster_seconds', '8.5');
        autoLoadFromUrl(aliasParams);
    } else if (params.has('disk')) {
        autoLoadFromUrl(params);
    }
}

// URL-driven load. Routes through GMTools.initFromUrl for the fetch +
// validation + case-insensitive file lookup; this thin wrapper only wires
// up the editor-specific "load into editor, optionally show play overlay"
// step. Accepts synthesized `params` so the `?play_demo=1` alias can
// dispatch a demo load without rewriting the browser URL.
let picker = null;

async function autoLoadFromUrl(params) {
    await GMTools.initFromUrl({
        disk: gmDisk,
        showMessage,
        expectedExt: '/PRG',
        params,
        // ?disk=X with no ?file= and multiple PRGs: open the standard
        // file popup. Its onSelect routes back through loadProgramData,
        // so the picked file lands in the editor the same way as an
        // explicit ?file= would.
        showPicker: () => showFilePopup(),
        loadFile: (actualName, fileData, params) => {
            loadProgramData(actualName, fileData);
            if (params.has('play')) {
                showPlayButtonOverlay(params);
            }
        }
    });
}

// Show the play-button overlay on the game canvas and render a poster
// preview behind it. The VM doesn't actually start until the user clicks
// play — that click also serves as the AudioContext-unlock gesture,
// same as the run button in the sidebar.
async function showPlayButtonOverlay(params) {
    if (!currentProgramData) return;

    // Activating the game overlay makes the canvas visible so the poster
    // has somewhere to render. The exit button in the game sidebar is
    // still the user's escape hatch back to the editor.
    document.getElementById('gameOverlay').classList.add('active');
    document.getElementById('gameBorder').style.background = 'rgb(0, 0, 0)';
    // Flip the stop button to its "stop & edit" labeled variant so a
    // first-time visitor watching the demo sees the way into the code.
    // stopProgram removes the class when they drop into the editor, so
    // any subsequent manual run keeps the compact icon-only button.
    document.body.classList.add('play-mode');
    // Lock the mobile viewport during gameplay so pinch-zoom can't
    // shift the virtual dpad + fire button under the player's fingers.
    // Restored by stopProgram on exit.
    setPlayModeViewport(true);

    const overlay = document.getElementById('playOverlay');
    overlay.classList.add('active');
    if (!overlay.dataset.wired) {
        overlay.dataset.wired = '1';
        overlay.addEventListener('click', dismissPlayOverlay);
    }

    // Ensure the screen exists for the poster to draw on. runProgram()
    // creates it lazily too, but we need it *now*.
    if (!screen) screen = new c64Screen('gameCanvas');
    if (audioIndicator) audioIndicator.refresh();
    await generatePoster(params);
}

// Click handler on the play overlay. Hides itself and hands off to the
// normal run path — runProgram() calls initAudio(), which unlocks the
// AudioContext (this click is the user gesture that satisfies the
// browser's autoplay policy).
function dismissPlayOverlay() {
    document.getElementById('playOverlay').classList.remove('active');
    runProgram();
    if (audioIndicator) audioIndicator.refresh();
}

// Kick off a poster render on the game canvas. Ownership of the screen +
// currentFileData stays here; GMPoster just runs the temp VM.
async function generatePoster(params) {
    await GMPoster.generatePoster({
        screen,
        fileData: currentFileData,
        posterSeconds: GMPoster.getPosterSeconds(params)
    });
}

// === INSTRUCTION PICKER ===
// The instruction picker supports type-to-search (globally, no focus required):
// - Type letters to search/filter instructions
// - Arrow up/down to navigate
// - Enter to insert selected instruction at cursor
// - Backspace to remove last search character
// - Search auto-clears after 1.5s of inactivity

let instructionSearchText = '';
let instructionSearchTimeout = null;
let instructionOpcodes = []; // Cache of opcodes in menu order

// Arg editing mode: After inserting an instruction with editable args,
// we enter this mode where:
// - First arg is highlighted in lt-blue
// - Type numbers to set value (or letters for variable args)
// - Arrow up/down to increment/decrement value
// - Tab/Shift+Tab to switch between args
// - Enter or Escape to exit and return to type-to-search
// - Click anywhere outside to exit
let argEditMode = false;
let argEditLineIndex = -1;
let argEditArgNum = 0;   // Which arg slot is being edited: 1 = arg1, 2 = arg2.
                         // 0 = none active. Matches the DOM's data-arg-num so
                         // typing, highlighting, dragging, and the click path
                         // all key off the same identifier. Indices into
                         // opDef.args[] are (argNum - 1) — see _editableArgNums
                         // for why we don't index by opDef position directly
                         // ('unused' entries create a mismatch with the DOM).
let argEditValue = '';   // Accumulator for digit input (multi-digit numbers)

// Arg types whose display values are word tokens the user can pick by
// typing a single key (e.g. "a" → "always", "o" → "once", "g" → "green").
// findEnumValueForKey uses the formatter to compute display strings, so the
// list is just "which types make sense to type-search" rather than a
// duplicate of any data structure.
const ENUM_ARG_TYPES = [
    'alwaysOnce', 'onOff', 'overUnder', 'joyDir', 'sceneTarget',
    'colorName', 'hitTarget', 'direction'
];

// Subset of ENUM_ARG_TYPES whose digit keys also cycle (the formatter
// embeds meaningful digits, e.g. "gray 1", "scene1", "sprite 3"). Pure-
// word enums (alwaysOnce / onOff / overUnder / joyDir) have no digits in
// their displays — digit input there is a no-op. `direction` is special:
// letters cycle to the cardinal bytes, but digits address the raw 0-255
// value via the numeric path below.
const ENUM_DIGIT_CYCLE = ['sceneTarget', 'colorName', 'hitTarget'];

// Single-keystroke enum selection with cycle-on-repeat.
//
//   Letter keys match by "display starts with key" (case-insensitive):
//     'a' on alwaysOnce → "always"
//     'o' on alwaysOnce → "once"
//     'u' on joyDir     → "up"
//
//   Digit keys match by "display contains the digit": this handles
//   templates where the digit is embedded in a word (scene1, sprite 5).
//     '1' on sceneTarget → "scene1"
//     '5' on hitTarget   → "sprite 5"
//
// When the current value is already in the match set, advance to the
// next match with wrap (so "g g g" cycles green → gray → green for
// colorName, "o o" cycles on → off for onOff). Otherwise jump to the
// first match. No buffer, no timeout — every keystroke is final.
function findEnumValueForKey(argType, key, currentValue, instr) {
    const range = getFieldRange(argType);
    const formatter = gmTypeFormatters[argType];
    if (!formatter) return -1;
    const k = key.toLowerCase();
    const isDigit = /[0-9]/.test(k);
    const mediaStore = currentProgramData?.mediaStore;

    // direction's cardinal labels live at the END of the display ("000  up")
    // rather than the start, so we match letters by `includes` for it.
    // Every other enum type's labels start the display, so startsWith
    // is the right precision (e.g. colorName 'g' picks green / gray N
    // and not "orange" via the trailing 'g').
    const letterMatch = argType === 'direction'
        ? (display) => display.includes(k)
        : (display) => display.startsWith(k);

    const matches = [];
    for (let v = range.min; v <= range.max; v++) {
        const display = (formatter(v, mediaStore, c64ColorNames) || '').toLowerCase();
        const hit = isDigit ? display.includes(k) : letterMatch(display);
        if (hit) matches.push(v);
    }
    if (matches.length === 0) return -1;

    const currentIdx = matches.indexOf(currentValue);
    if (currentIdx >= 0) return matches[(currentIdx + 1) % matches.length];
    return matches[0];
}

// === ASSET PICKER ===
// Dropdown for selecting scene/sound/song/sprite assets from disk.
// Shows all matching files with type-to-search filtering.

// Map arg types to GMDisk file types
const ASSET_ARG_TYPES = {
    'sceneName': GMDisk.FILE_TYPES.SCENE,
    'sound': GMDisk.FILE_TYPES.SOUND,
    'song': GMDisk.FILE_TYPES.MUSIC,
    'spriteName': GMDisk.FILE_TYPES.SPRITE
};

// Asset picker state
let assetPickerActive = false;
let assetPickerFiles = [];        // Files from disk
let assetPickerFiltered = [];     // Filtered by search
let assetPickerSelectedIndex = 0;
let assetPickerSearchText = '';
let assetPickerArgType = null;    // Current arg type being edited
let assetPickerLineIndex = -1;
let assetPickerArgIndex = 0;
let assetPickerField = null;      // The field element that triggered the picker

// Show asset picker dropdown below the given field
function showAssetPicker(field, argType, lineIndex, argIndex) {
    const fileType = ASSET_ARG_TYPES[argType];
    if (!fileType) return;

    // Re-read the disk from the shared pool every time the picker opens —
    // another editor (sprite-maker, scene-maker, etc.) may have added a
    // file since the last open, and our in-memory D64 instance would be
    // stale otherwise.
    gmDisk.refresh();
    assetPickerFiles = gmDisk.listFiles(fileType);

    // Show which disk we're reading from in the message area. Uses the
    // same ellipsis truncation as the d64 popup so very long pool names
    // collapse to "first 20 … last 10" consistently across both surfaces.
    if (gmDisk.diskFileName) {
        showMessage(`from disk: ${GMDisk._truncateDiskName(gmDisk.diskFileName)}`);
    }

    // No flash on empty disk — the picker itself shows "no files on disk"
    // and Tab still moves to the next arg. Not an error condition.

    assetPickerActive = true;
    assetPickerFiltered = [...assetPickerFiles];
    assetPickerSelectedIndex = 0;
    assetPickerSearchText = '';
    assetPickerArgType = argType;
    assetPickerLineIndex = lineIndex;
    assetPickerArgIndex = argIndex;
    assetPickerField = field;

    // Position picker below the field
    const picker = document.getElementById('assetPicker');
    const fieldRect = field.getBoundingClientRect();
    const screenRect = document.getElementById('screen').getBoundingClientRect();

    picker.style.left = (fieldRect.left - screenRect.left) + 'px';
    picker.style.top = (fieldRect.bottom - screenRect.top + 2) + 'px';

    renderAssetPicker();
    picker.classList.add('active');

    // Focus handling - we'll use global keyboard handler
}

// Hide asset picker
function hideAssetPicker() {
    if (!assetPickerActive) return;

    assetPickerActive = false;
    assetPickerField = null;
    document.getElementById('assetPicker').classList.remove('active');
    // The "from disk: …" hint we set when opening only makes sense while
    // the picker is visible.
    showMessage('');
}

// Render the asset picker dropdown
function renderAssetPicker() {
    const picker = document.getElementById('assetPicker');
    picker.innerHTML = '';

    // No files on disk at all
    if (assetPickerFiles.length === 0) {
        const noFiles = document.createElement('div');
        noFiles.className = 'no-files';
        noFiles.textContent = 'no files on disk';
        picker.appendChild(noFiles);
        return;
    }

    // No match for current search
    if (assetPickerFiltered.length === 0) {
        const noMatch = document.createElement('div');
        noMatch.className = 'no-files';
        noMatch.textContent = 'no match';
        picker.appendChild(noMatch);
        return;
    }

    assetPickerFiltered.forEach((file, index) => {
        const div = document.createElement('div');
        div.className = 'asset-item' + (index === assetPickerSelectedIndex ? ' selected' : '');

        // Get display name (strip extension like /PIC, /SND, etc.)
        const displayName = getAssetDisplayName(file.fileName);

        // Highlight matching text if searching
        if (assetPickerSearchText) {
            const matchLen = assetPickerSearchText.length;
            const nameLower = displayName.toLowerCase();
            const searchLower = assetPickerSearchText.toLowerCase();

            if (nameLower.startsWith(searchLower)) {
                const matchSpan = document.createElement('span');
                matchSpan.className = 'match-highlight';
                matchSpan.textContent = displayName.substring(0, matchLen);
                div.appendChild(matchSpan);
                div.appendChild(document.createTextNode(displayName.substring(matchLen)));
            } else {
                div.textContent = displayName;
            }
        } else {
            div.textContent = displayName;
        }

        div.onclick = () => selectAsset(index);
        picker.appendChild(div);
    });

    // Scroll selected into view
    const selected = picker.querySelector('.asset-item.selected');
    if (selected) {
        selected.scrollIntoView({ block: 'nearest' });
    }
}

// Get display name from filename (strip /EXT suffix and trim spaces)
function getAssetDisplayName(fileName) {
    const slashIndex = fileName.indexOf('/');
    let name;
    if (slashIndex > 0) {
        name = fileName.substring(0, slashIndex);
    } else {
        name = fileName;
    }
    return name.trim().toLowerCase();
}

// Filter assets by search text
function filterAssetPicker() {
    if (!assetPickerSearchText) {
        assetPickerFiltered = [...assetPickerFiles];
    } else {
        const searchLower = assetPickerSearchText.toLowerCase();
        assetPickerFiltered = assetPickerFiles.filter(file => {
            const name = getAssetDisplayName(file.fileName);
            return name.startsWith(searchLower);
        });
    }
    assetPickerSelectedIndex = 0;
    renderAssetPicker();
}

// Select an asset and apply it
function selectAsset(index) {
    // No files or invalid index - just close picker without changing value
    if (assetPickerFiltered.length === 0 || index < 0 || index >= assetPickerFiltered.length) {
        hideAssetPicker();
        return;
    }

    const file = assetPickerFiltered[index];
    const fileName = file.fileName;
    const displayName = getAssetDisplayName(fileName);

    // Snapshot for memory-rollback. New asset binary + (for multi-quad) the
    // auto-inserted marker lines can push us past the 0000-free limit;
    // pre-computing the cost is awkward (sprite/sound size depends on
    // frames), so we apply optimistically and roll back on overflow.
    //   instructions: deep — selectAsset mutates an existing entry's args
    //   mediaStore:   shallow — we only ever .push, never mutate-in-place
    const insSnap = JSON.parse(JSON.stringify(currentProgramData.instructions));
    const msSnap  = currentProgramData.mediaStore
        ? [...currentProgramData.mediaStore]
        : null;
    const undoLenBefore = undoStack.length;

    // Find or add to mediaStore
    const mediaIndex = findOrAddToMediaStore(fileName, displayName, assetPickerArgType);

    if (mediaIndex < 0) {
        showFlashingMessage('failed to load asset');
        hideAssetPicker();
        return;
    }

    // Update instruction
    const instr = currentProgramData.instructions[assetPickerLineIndex];
    if (instr) {
        saveUndoState();

        if (assetPickerArgIndex === 0) {
            instr.arg1 = mediaIndex;
        } else {
            instr.arg2 = mediaIndex;
        }
        updateInstructionName(instr);

        // For multi-quad sprites, may need to add additional instructions
        if (assetPickerArgType === 'spriteName') {
            handleMultiQuadSprite(instr, mediaIndex, assetPickerLineIndex);
        }
    }

    // Did all that fit?
    if (calculateFreeBlocksRaw() < 0) {
        currentProgramData.instructions = insSnap;
        if (msSnap) currentProgramData.mediaStore = msSnap;
        // Discard the undo entry we just saved — it'd otherwise be a
        // duplicate of the now-restored state and clutter ctrl-Z.
        while (undoStack.length > undoLenBefore) undoStack.pop();
        showOutOfMemory();
        hideAssetPicker();
        renderProgramListing();
        return;
    }

    hideAssetPicker();
    renderProgramListing();
}

// Re-parse fresh bytes into an existing mediaStore entry in place. Used when
// the user re-picks an asset they've already added, to pick up edits made in
// another editor. For scenes we additionally clear the "missing" warning.
//
// Note: changing a multi-quad sprite's quad count via this path can leave the
// downstream marker entries pointing at the wrong sub-data. We update what we
// can and log a warning — the user can delete the slot assignments and re-add
// them to fully re-sync.
function refreshMediaEntry(entry, entryType, fileData, mediaIndex) {
    switch (entryType) {
        case 'scene':
            entry.scene = new gmScene(fileData);
            // Clear from missingScenes if it was there
            if (currentProgramData.missingScenes) {
                currentProgramData.missingScenes = currentProgramData.missingScenes.filter(
                    s => s.index !== mediaIndex
                );
                if (currentProgramData.missingScenes.length === 0) clearFlashingError();
            }
            break;
        case 'sprite': {
            const newSprite = new gmSprite(fileData);
            if (entry.sprite && newSprite.sprite.length !== entry.sprite.sprite.length) {
                console.warn(`Sprite "${entry.name}" quad count changed (${entry.sprite.sprite.length} → ${newSprite.sprite.length}); marker entries may need re-assignment`);
            }
            entry.sprite = newSprite;
            entry.spriteFileData = fileData;
            break;
        }
        case 'sound':
            entry.soundFileData = fileData;
            break;
        case 'song':
            entry.songFileData = fileData;
            break;
    }
}

// Find existing mediaStore entry or add new one
function findOrAddToMediaStore(fileName, displayName, argType) {
    if (!currentProgramData.mediaStore) {
        currentProgramData.mediaStore = [null];
    }

    const mediaStore = currentProgramData.mediaStore;
    const entryType = argTypeToMediaType(argType);

    // entry.name is always 6-char-padded (parser invariant — see
    // gmParser.js parseProgramData). Pad displayName to the same canonical
    // form so the equality check below matches and any new entry we add
    // preserves the invariant for downstream code.
    const canonicalName = displayName.padEnd(6, ' ').substring(0, 6);

    // Check if already in mediaStore. If found, reload from disk so any
    // changes made in another editor (e.g. saving a new sprite version in
    // sprite-maker) are picked up — the user's intent in re-picking is to
    // use the current on-disk version. If the disk read fails (file gone),
    // leave the cached entry alone.
    for (let i = 1; i < mediaStore.length; i++) {
        const entry = mediaStore[i];
        if (entry && entry.type === entryType && entry.name === canonicalName) {
            const fileData = gmDisk.loadFile(fileName);
            if (fileData) {
                try {
                    refreshMediaEntry(entry, entryType, fileData, i);
                } catch (e) {
                    console.error('Failed to refresh media entry from disk:', e);
                }
            }
            return i;
        }
    }

    // Load the file and add to mediaStore
    const fileData = gmDisk.loadFile(fileName);
    if (!fileData) {
        return -1;
    }

    // Create the entry based on type. Use the padded canonical name so
    // the invariant holds for new entries too.
    const newEntry = {
        name: canonicalName,
        type: entryType,
        ptr: 0  // Will be set properly when saving
    };

    // Parse the asset based on type
    try {
        switch (entryType) {
            case 'scene':
                newEntry.scene = new gmScene(fileData);
                break;
            case 'sprite':
                newEntry.sprite = new gmSprite(fileData);
                newEntry.spriteFileData = fileData;
                newEntry.quadIndex = 0;  // Main sprite is always quad 0
                break;
            case 'sound':
                newEntry.soundFileData = fileData;
                break;
            case 'song':
                newEntry.songFileData = fileData;
                break;
        }
    } catch (e) {
        console.error('Failed to parse asset:', e);
        return -1;
    }

    // Add to mediaStore
    const newIndex = mediaStore.length;
    mediaStore.push(newEntry);

    return newIndex;
}

// Convert arg type to mediaStore entry type
function argTypeToMediaType(argType) {
    switch (argType) {
        case 'sceneName': return 'scene';
        case 'spriteName': return 'sprite';
        case 'sound': return 'sound';
        case 'song': return 'song';
        default: return null;
    }
}

// Handle multi-quad sprites - add additional sprite assignment lines
function handleMultiQuadSprite(instr, mediaIndex, lineIndex) {
    const entry = currentProgramData.mediaStore[mediaIndex];
    if (!entry) return;

    const sprite = entry.sprite;
    const numQuads = (sprite && sprite.sprite) ? sprite.sprite.length : 1;

    const opDef = gmOpcodes[instr.opcode];
    if (!opDef || !opDef.args) return;

    const slotArgIndex = opDef.args.indexOf('sprite');
    const nameArgIndex = opDef.args.indexOf('spriteName');
    if (slotArgIndex === -1 || nameArgIndex === -1) return;

    const baseSlot = slotArgIndex === 0 ? instr.arg1 : instr.arg2;

    if (baseSlot + numQuads > 8) {
        showFlashingMessage('not enough sprite slots');
        return;
    }

    // === MULTI-PART SPRITE MARKER ENTRIES ===
    //
    // TWO ENTRY POINTS exist for loading sprites (see CLAUDE.md for full docs):
    //   1. DISK-LOADED (here): .SPR file already contiguous, just parse and create markers
    //   2. PRG-LOADED (gmParser.js): Must concatenate from separate entries first
    //
    // Both normalize to the same structure - ONE gmSprite, empty markers
    // (markers are identified by quadIndex > 0):
    //   mediaStore[mainIdx]: { sprite: gmSprite, quadIndex: 0 }  // Main entry
    //   mediaStore[subIdx1]: { sprite: null, quadIndex: 1 }      // Empty marker
    //   mediaStore[subIdx2]: { sprite: null, quadIndex: 2 }      // Empty marker
    //   mediaStore[subIdx3]: { sprite: null, quadIndex: 3 }      // Empty marker
    //
    // We also insert instructions for subsprite slot assignments.

    const instructions = currentProgramData.instructions;
    const mediaStore = currentProgramData.mediaStore;
    const baseName = entry.name;
    const subName = '-' + baseName.substring(0, 5);

    // Find the extent of the existing marker group below this line. The user
    // re-picking a multi-quad sprite means they want the old assignment GONE,
    // not pushed down — orphaned -OLDNAME lines are never what they want. We
    // also consume blank lines (opcode 0) WITHIN the group: in GM a blank
    // line halts execution, so a blank between markers is always mid-edit
    // debris that the user has to clean up before the program runs anyway —
    // tidying it on the swap is friendlier than preserving it.
    //
    // Scan stops at the first line that isn't a blank, isn't a continuing
    // marker (right opcode, next slot, marker entry), or runs off the end.
    let groupSize = 0;            // total lines in the group (markers + interior blanks)
    let markerCount = 0;          // number of marker lines found
    let scanOffset = 0;
    while (true) {
        scanOffset++;
        const checkLine = instructions[lineIndex + scanOffset];
        if (!checkLine) break;
        if (checkLine.opcode === 0x00) continue;  // skip blank; don't extend group yet
        if (checkLine.opcode !== instr.opcode) break;
        const checkSlot = slotArgIndex === 0 ? checkLine.arg1 : checkLine.arg2;
        if (checkSlot !== baseSlot + markerCount + 1) break;
        const checkMediaIdx = slotArgIndex === 0 ? checkLine.arg2 : checkLine.arg1;
        const checkEntry = mediaStore[checkMediaIdx];
        if (!checkEntry || (checkEntry.quadIndex || 0) === 0) break;
        markerCount++;
        groupSize = scanOffset;   // extend group up to and including this marker
        if (baseSlot + markerCount >= 8) break;
    }

    // Wipe the entire existing group (markers + any interior blanks)…
    if (groupSize > 0) {
        instructions.splice(lineIndex + 1, groupSize);
    }

    // …then insert fresh marker assignments for the new sprite, in order,
    // right below the main line.
    for (let q = 1; q < numQuads; q++) {
        let subIndex = findSubSpriteInMediaStore(subName, mediaIndex, q);
        if (subIndex < 0) {
            subIndex = mediaStore.length;
            mediaStore.push({
                name: subName,
                type: 'sprite',
                ptr: 0,
                sprite: null,
                spriteFileData: null,
                quadIndex: q
            });
        }

        const newArg1 = slotArgIndex === 0 ? baseSlot + q : subIndex;
        const newArg2 = slotArgIndex === 0 ? subIndex : baseSlot + q;
        const newName = formatInstruction(instr.opcode, newArg1, newArg2, mediaStore, c64ColorNames);

        instructions.splice(lineIndex + q, 0, {
            opcode: instr.opcode,
            arg1: newArg1,
            arg2: newArg2,
            label: 0,
            instructionName: newName
        });
    }

    selectedLineIndex = lineIndex + numQuads;
    selectedLines.clear();
    selectedLines.add(selectedLineIndex);
}

// Find sub-sprite entry in mediaStore
// Look for a subsprite marker entry at the position the serializer expects:
// mainIndex + quadIndex. The PRG format requires multi-quad sprite data to live
// at consecutive pointer-table entries, so the serializer auto-references
// mediaStore[mainIdx+q] when emitting a main entry — markers MUST sit there.
//
// We don't scan the whole mediaStore by name: a far-away entry with a matching
// name (e.g. leftover marker from a previous version of the sprite whose main
// got replaced and pushed to the end) would satisfy the name check but break
// the serializer's adjacency assumption.
function findSubSpriteInMediaStore(subName, mainIndex, quadIndex) {
    const candidate = currentProgramData.mediaStore[mainIndex + quadIndex];
    if (candidate && candidate.type === 'sprite' &&
        candidate.name === subName && candidate.quadIndex === quadIndex) {
        return mainIndex + quadIndex;
    }
    return -1;
}

// Handle keyboard for asset picker
function handleAssetPickerKey(e) {
    if (!assetPickerActive) return false;

    // Arrow keys - navigate list
    if (e.key === 'ArrowDown') {
        e.preventDefault();
        assetPickerSelectedIndex = Math.min(
            assetPickerSelectedIndex + 1,
            assetPickerFiltered.length - 1
        );
        renderAssetPicker();
        return true;
    }

    if (e.key === 'ArrowUp') {
        e.preventDefault();
        assetPickerSelectedIndex = Math.max(assetPickerSelectedIndex - 1, 0);
        renderAssetPicker();
        return true;
    }

    // Enter - select current and stay in arg edit mode
    if (e.key === 'Enter') {
        e.preventDefault();
        selectAsset(assetPickerSelectedIndex);
        // After selection, exit arg edit mode
        if (argEditMode) {
            exitArgEditMode();
        }
        return true;
    }

    // Tab - select current and move to next arg
    if (e.key === 'Tab') {
        e.preventDefault();
        selectAsset(assetPickerSelectedIndex);
        // After selection, move to next/prev editable arg slot if in arg edit mode
        if (argEditMode) {
            const instr = currentProgramData.instructions[argEditLineIndex];
            const opDef = gmOpcodes[instr.opcode];
            const editableNums = _editableArgNums(opDef);
            if (editableNums.length > 1) {
                const cur = editableNums.indexOf(argEditArgNum);
                const next = (cur + (e.shiftKey ? -1 : 1) + editableNums.length) % editableNums.length;
                argEditArgNum = editableNums[next];
                argEditValue = '';
                renderProgramListing();
                highlightCurrentArg();
            } else {
                exitArgEditMode();
            }
        }
        return true;
    }

    // Escape - close picker and exit arg edit mode
    if (e.key === 'Escape') {
        e.preventDefault();
        hideAssetPicker();
        if (argEditMode) {
            exitArgEditMode();
        }
        return true;
    }

    // Backspace - remove search character
    if (e.key === 'Backspace') {
        e.preventDefault();
        if (assetPickerSearchText.length > 0) {
            assetPickerSearchText = assetPickerSearchText.slice(0, -1);
            filterAssetPicker();
        }
        return true;
    }

    // Letter keys - type to search
    if (e.key.length === 1 && /[a-zA-Z0-9]/.test(e.key) && !e.ctrlKey && !e.metaKey) {
        assetPickerSearchText += e.key.toLowerCase();
        filterAssetPicker();
        return true;
    }

    return false;
}

function populateInstructionPicker() {
    const picker = document.getElementById('instructionPicker');
    picker.innerHTML = '';

    // Get opcodes in GameMaker menu order
    instructionOpcodes = [];
    for (const opcode of gmInstructionSortOrder) {
        const def = gmOpcodes[opcode];
        if (def && def.name) {
            instructionOpcodes.push({
                opcode: opcode,
                name: def.name
            });
        }
    }

    renderInstructionList();
}

function renderInstructionList() {
    const picker = document.getElementById('instructionPicker');
    picker.innerHTML = '';

    instructionOpcodes.forEach((op, index) => {
        const div = document.createElement('div');
        div.className = 'instruction-item' + (index === selectedInstructionIndex ? ' selected' : '');
        div.dataset.opcode = op.opcode;
        div.dataset.index = index;

        // Highlight matching text if searching
        if (instructionSearchText && op.name.toLowerCase().startsWith(instructionSearchText.toLowerCase())) {
            const matchLen = instructionSearchText.length;
            const matchSpan = document.createElement('span');
            matchSpan.className = 'match-highlight';
            matchSpan.textContent = op.name.substring(0, matchLen);
            div.appendChild(matchSpan);
            div.appendChild(document.createTextNode(op.name.substring(matchLen)));
        } else {
            div.textContent = op.name;
        }

        div.onclick = () => {
            clearInstructionSearch();
            selectInstruction(index);
            placeInstructionAtCursor(op.opcode);
            // placeInstructionAtCursor already enters arg edit mode
        };
        picker.appendChild(div);
    });
}

// Global keyboard handler for editor (type-to-search and arg editing)
function setupEditorKeyboard() {
    window.addEventListener('keydown', onEditorKeyDown);
    window.addEventListener('click', onEditorClick);
}

// Toggle body.kbd-active so hover styles can disable themselves while
// the keyboard is the focus. One-shot mousemove listener clears the
// flag — we don't want a busy listener fighting every pointer event.
function suppressHoverUntilMouseMove() {
    if (document.body.classList.contains('kbd-active')) return;
    document.body.classList.add('kbd-active');
    const restore = () => {
