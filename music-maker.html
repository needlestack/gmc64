<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>C64 GameMaker Music Editor</title>
<link rel="stylesheet" href="css/gm-ui.css">
<style>

#screen {
    background: var(--c64-blue);
    width: 720px;
    height: 560px;
    margin: 0 auto;
    position: relative;
}

/* Piano keyboard container */
#pianoContainer {
    position: absolute;
    top: 10px;
    left: 60px;
    width: 600px;
    height: 80px;
}

/* Wood trim above piano */
#woodTrim {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 15px;
    background: var(--c64-brown);
    border: 2px solid var(--c64-black);
    border-bottom: none;
}

/* Piano keys area */
#piano {
    position: absolute;
    top: 15px;
    left: 0;
    right: 0;
    height: 65px;
    background: var(--c64-black);
    display: flex;
    border: 2px solid var(--c64-black);
}

.white-key {
    flex: 1;
    background: linear-gradient(to bottom, var(--c64-white) 0%, var(--c64-gray3) 90%, var(--c64-gray2) 100%);
    border: 1px solid var(--c64-black);
    border-radius: 0 0 3px 3px;
    cursor: pointer;
    position: relative;
    z-index: 1;
}

.white-key:hover {
    background: var(--c64-white);
}

.white-key.active {
    background: var(--c64-gray3);
}

.black-key {
    width: 12px;
    height: 40px;
    background: linear-gradient(to bottom, var(--c64-gray1) 0%, var(--c64-black) 100%);
    border-radius: 0 0 2px 2px;
    position: absolute;
    z-index: 2;
    cursor: pointer;
}

.black-key:hover {
    background: var(--c64-gray1);
}

.black-key.active {
    background: var(--c64-black);
}

/* Staff area */
#staffContainer {
    position: absolute;
    top: 96px;
    left: 10px;
    right: 200px;
    bottom: 6px;
    background: var(--c64-white);
    border: 3px solid var(--c64-black);
    overflow: hidden;
}

#staffArea {
    position: relative;
    width: 100%;
    height: 100%;
}

/* Staff lines */
.staff-line {
    position: absolute;
    left: 0;
    right: 0;
    height: 1px;
    background: var(--c64-black);
}

.staff-line.invisible {
    background: var(--c64-gray3);
}

/* Playhead line - vertical line at 3/4 across staff where notes play */
#playhead {
    position: absolute;
    left: 75%;
    top: 0;
    bottom: 0;
    width: 2px;
    background: var(--c64-red);
    z-index: 100;
}

/* Notes on staff */
.note {
    position: absolute;
    cursor: pointer;
    pointer-events: auto;
}

.note:hover {
    filter: brightness(1.5);
    cursor: grab;
}

.note.dragging {
    filter: brightness(1.5) drop-shadow(3px 3px 4px rgba(0,0,0,0.6));
    cursor: grabbing;
    z-index: 200;
}

.note svg {
    overflow: visible;
}

/* Preview note that follows mouse */
.preview-note {
    position: absolute;
    pointer-events: none;
    opacity: 0.6;
    animation: blink 0.5s infinite;
}

@keyframes blink {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 0.3; }
}

/* Controls panel (right side) */
#controls {
    position: absolute;
    top: 100px;
    right: 10px;
    width: 180px;
    bottom: 10px;
}

/* Button grid */
#buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2px;
    width: 100%;
}

#buttons button {
    width: 100%;
}

#buttons button.active {
    background: var(--c64-lt-green);
}

#buttons button.flashing {
    animation: flash 0.5s infinite;
}

@keyframes flash {
    0%, 100% { background: var(--c64-gray3); }
    50% { background: var(--c64-yellow); }
}

/* Duration selector */
#durationPanel {
    margin-top: 5px;
    background: var(--c64-white);
    border: 3px solid var(--c64-black);
    padding: 3px;
}

#durationScroller {
    overflow-x: auto;
}

.duration-row {
    display: flex;
    gap: 3px;
}

.duration-row + .duration-row {
    margin-top: 3px;
}

.duration-note, .duration-spacer {
    min-width: 28px;
    width: 28px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid var(--c64-gray3);
    background: var(--c64-gray3);
    padding: 1px;
    flex-shrink: 0;
}

.duration-note {
    cursor: pointer;
}

.duration-spacer {
    visibility: hidden;
}

.duration-note.selected {
    border-color: var(--c64-black);
    background: var(--c64-lt-blue);
}

.duration-note svg {
    width: 24px;
    height: 32px;
}

#tieRow {
    display: flex;
    justify-content: center;
    margin-top: 4px;
}

#tieButton {
    padding: 2px 10px;
    margin: 0;
    color: var(--c64-gray2);
}

#tieButton.active {
    color: var(--c64-blue);
    background: var(--c64-lt-green);
}

/* Nav + Tempo row */
#navTempoRow {
    display: flex;
    gap: 5px;
    margin-top: 5px;
    align-items: stretch;
}

#navArrows {
    display: flex;
    gap: 3px;
}

.nav-arrow {
    padding: 3px 8px;
    margin: 0;
}

#tempoPanel {
    flex: 1;
    background: var(--c64-white);
    border: 3px solid var(--c64-black);
    padding: 3px;
    text-align: center;
}

#tempoLabel {
    color: var(--c64-blue);
    margin-bottom: 4px;
}

#tempoValue {
    color: var(--c64-black);
    cursor: ns-resize;
}

#tempoPanel.disabled #tempoValue {
    color: var(--c64-gray2);
    cursor: default;
}

#tempoPanel.disabled #tempoLabel {
    color: var(--c64-gray2);
}

/* Channel list */
#channelPanel {
    margin-top: 5px;
    background: var(--c64-white);
    border: 3px solid var(--c64-black);
    padding: 3px;
}

#channelHeader {
    color: var(--c64-black);
    text-align: center;
    margin-bottom: 5px;
}

.channel-row {
    display: flex;
    align-items: center;
    padding: 2px 3px;
    cursor: pointer;
}

.channel-row:hover {
    background: var(--c64-gray3);
}

.channel-num {
    width: 20px;
}

.channel-inst {
    flex: 1;
}

.channel-row:nth-child(2) .channel-num,
.channel-row:nth-child(2) .channel-inst { color: var(--c64-red); }
.channel-row:nth-child(3) .channel-num,
.channel-row:nth-child(3) .channel-inst { color: var(--c64-green); }
.channel-row:nth-child(4) .channel-num,
.channel-row:nth-child(4) .channel-inst { color: var(--c64-lt-blue); }

.channel-row:nth-child(2).selected { background: var(--c64-red); }
.channel-row:nth-child(3).selected { background: var(--c64-green); }
.channel-row:nth-child(4).selected { background: var(--c64-lt-blue); }

.channel-row.selected .channel-num,
.channel-row.selected .channel-inst {
    color: var(--c64-white) !important;
}

/* Instrument dropdown */
.inst-dropdown {
    position: absolute;
    background: var(--c64-white);
    border: 2px solid var(--c64-black);
    z-index: 1000;
    display: none;
}

.inst-dropdown.open {
    display: block;
}

.inst-option {
    padding: 5px 10px;
    cursor: pointer;
    color: var(--c64-black);
}

.inst-option:hover {
    background: var(--c64-blue);
    color: var(--c64-white);
}

/* Confirmation dialog */
.confirm-dialog {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: var(--c64-blue);
    border: 4px solid var(--c64-white);
    padding: 20px;
    z-index: 2000;
    display: none;
    text-align: center;
}

.confirm-dialog.open {
    display: block;
}

.confirm-text {
    color: var(--c64-white);
    margin-bottom: 15px;
}

.confirm-buttons {
    display: flex;
    justify-content: center;
    gap: 20px;
}

.confirm-btn {
    padding: 5px 15px;
}

/* Song name sits in the controls panel just above the menu buttons */
#songNamePanel {
    background: var(--c64-blue);
    padding: 1px 8px;
    margin-bottom: 6px;
    text-align: center;
}

#songName {
    color: var(--c64-white);
    cursor: text;
}

/* MIDI Import dialog */
.midi-dialog {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: var(--c64-blue);
    border: 4px solid var(--c64-white);
    padding: 15px;
    z-index: 2000;
    display: none;
    min-width: 320px;
}

.midi-dialog.open {
    display: block;
}

.midi-header {
    color: var(--c64-white);
    text-align: center;
    font-size: 1.2em;
    margin-bottom: 15px;
    border-bottom: 2px solid var(--c64-lt-blue);
    padding-bottom: 8px;
}

.midi-content {
    color: var(--c64-white);
}

.midi-section {
    margin-bottom: 12px;
}

.midi-label {
    display: block;
    margin-bottom: 5px;
    color: var(--c64-lt-blue);
}

.midi-btn {
    padding: 5px 12px;
    cursor: pointer;
}

.midi-filename {
    display: inline-block;
    margin-left: 10px;
    color: var(--c64-gray3);
    font-style: italic;
}

.midi-track-map {
    margin: 8px 0;
}

.midi-channel-row {
    display: flex;
    align-items: center;
    margin-bottom: 5px;
}

.midi-ch-label {
    width: 50px;
    font-weight: bold;
}

.midi-select {
    flex: 1;
    padding: 4px;
    background: var(--c64-white);
    border: 2px solid var(--c64-black);
    color: var(--c64-black);
}

.midi-status {
    color: var(--c64-yellow);
    margin: 10px 0;
    min-height: 20px;
}

.midi-buttons {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-top: 15px;
}

.midi-checkbox-row {
    display: flex;
    align-items: center;
    margin-top: 10px;
    gap: 8px;
}

.midi-checkbox-label {
    color: var(--c64-white);
    font-size: 0.9em;
}

#midiVoiceSep {
    width: 16px;
    height: 16px;
}

/* MIDI export radio buttons */
.midi-radio-group {
    margin: 8px 0;
}

.midi-radio-label {
    display: block;
    color: var(--c64-white);
    margin-bottom: 8px;
    cursor: pointer;
}

.midi-radio-label input {
    margin-right: 8px;
}

.midi-info {
    color: var(--c64-lt-blue);
    font-size: 0.9em;
    line-height: 1.4;
}

</style>
</head>
<body>

<div id="screen">
    <!-- Piano keyboard -->
    <div id="pianoContainer">
        <div id="woodTrim"></div>
        <div id="piano"></div>
    </div>

    <!-- Staff area -->
    <div id="staffContainer">
        <div id="staffArea">
            <div id="playhead"></div>
            <div id="previewNote" class="preview-note" style="display: none;"></div>
        </div>
    </div>

    <!-- Controls -->
    <div id="controls">
        <!-- Song name sits just above the menu. Push-down past existing
             content is fine — there's headroom below the instrument panel. -->
        <div id="songNamePanel">
            <span id="songName">&nbsp;</span>
        </div>

        <div id="buttons">
            <button id="btnFile" onclick="showFilePopup()">file</button>
            <button id="btnQuit" onclick="quitEditor()">menu</button>
            <button id="btnIns" onclick="toggleInsMode()">ins</button>
            <button id="btnTop" onclick="goToTop()">top</button>
            <button id="btnDel" onclick="deleteNote()">del</button>
            <button id="btnPlay" onclick="togglePlay()">play</button>
            <button id="btnClr" onclick="clearSong()">clr</button>
            <button id="btnUndo" onclick="undo()">undo</button>
        </div>

        <div id="durationPanel">
            <div id="durationScroller">
                <div id="noteRow" class="duration-row"></div>
                <div id="restRow" class="duration-row"></div>
            </div>
            <div id="tieRow">
                <button id="tieButton" onclick="toggleTie()">tie</button>
            </div>
        </div>

        <div id="navTempoRow">
            <div id="navArrows">
                <button class="nav-arrow" id="btnBack">&lt;</button>
                <button class="nav-arrow" id="btnForward">&gt;</button>
            </div>
            <div id="tempoPanel">
                <div id="tempoLabel">tempo</div>
                <div id="tempoValue">080</div>
            </div>
        </div>

        <div id="channelPanel">
            <div id="channelHeader">channel</div>
            <div class="channel-row selected" data-channel="0" onclick="selectChannel(0)" ondblclick="showInstrumentPicker(0)">
                <span class="channel-num">1</span>
                <span class="channel-inst">piano</span>
            </div>
            <div class="channel-row" data-channel="1" onclick="selectChannel(1)" ondblclick="showInstrumentPicker(1)">
                <span class="channel-num">2</span>
                <span class="channel-inst">violin</span>
            </div>
            <div class="channel-row" data-channel="2" onclick="selectChannel(2)" ondblclick="showInstrumentPicker(2)">
                <span class="channel-num">3</span>
                <span class="channel-inst">bass</span>
            </div>
        </div>
    </div>

    <!-- Confirmation dialog -->
    <div id="confirmDialog" class="confirm-dialog">
        <div class="confirm-text" id="confirmText">delete note channel 1?</div>
        <div class="confirm-buttons">
            <button class="confirm-btn" onclick="confirmYes()">yes</button>
            <button class="confirm-btn" onclick="confirmNo()">no</button>
        </div>
    </div>

    <!-- Delete dialog with count input -->
    <div id="deleteDialog" class="confirm-dialog">
        <div class="confirm-text">delete <input type="number" id="deleteCount" value="1" min="1" max="100" style="width:40px;text-align:center;font-size:14px;"> notes<br>channel <span id="deleteChannel">1</span>?</div>
        <div class="confirm-buttons">
            <button class="confirm-btn" onclick="confirmDelete()">yes</button>
            <button class="confirm-btn" onclick="cancelDelete()">no</button>
        </div>
    </div>

    <!-- Instrument picker dropdown -->
    <div id="instDropdown" class="inst-dropdown"></div>

    <!-- MIDI Import dialog -->
    <div id="midiDialog" class="midi-dialog">
        <div class="midi-header">Import MIDI</div>
        <div class="midi-content">
            <div id="midiFileSelect" class="midi-section">
                <label class="midi-label">Select MIDI file:</label>
                <input type="file" id="midiFileInput" accept=".mid,.midi" style="display:none">
                <button class="midi-btn" onclick="document.getElementById('midiFileInput').click()">Choose File</button>
                <span id="midiFileName" class="midi-filename">No file selected</span>
            </div>
            <div id="midiTrackSection" class="midi-section" style="display:none">
                <label class="midi-label">Map tracks to channels:</label>
                <div class="midi-track-map">
                    <div class="midi-channel-row">
                        <span class="midi-ch-label" style="color:var(--c64-red)">Ch 1:</span>
                        <select id="midiTrack1" class="midi-select"></select>
                    </div>
                    <div class="midi-channel-row">
                        <span class="midi-ch-label" style="color:var(--c64-green)">Ch 2:</span>
                        <select id="midiTrack2" class="midi-select"></select>
                    </div>
                    <div class="midi-channel-row">
                        <span class="midi-ch-label" style="color:var(--c64-lt-blue)">Ch 3:</span>
                        <select id="midiTrack3" class="midi-select"></select>
                    </div>
                </div>
                <label class="midi-label">Quantization:</label>
                <select id="midiQuantize" class="midi-select">
                    <option value="eighth">8th note</option>
                    <option value="sixteenth" selected>16th note</option>
                    <option value="32nd">32nd note</option>
                </select>
                <div class="midi-checkbox-row">
                    <input type="checkbox" id="midiVoiceSep" checked>
                    <label for="midiVoiceSep" class="midi-checkbox-label">Voice separation (split chords across channels)</label>
                </div>
            </div>
            <div id="midiStatus" class="midi-status"></div>
        </div>
        <div class="midi-buttons">
            <button class="midi-btn" id="midiImportBtn" onclick="doMidiImport()" disabled>Import</button>
            <button class="midi-btn" onclick="closeMidiDialog()">Cancel</button>
        </div>
    </div>

    <!-- MIDI Export dialog -->
    <div id="midiExportDialog" class="midi-dialog">
        <div class="midi-header">Export MIDI</div>
        <div class="midi-content">
            <div class="midi-section">
                <label class="midi-label">Instrument mapping:</label>
                <div class="midi-radio-group">
                    <label class="midi-radio-label">
                        <input type="radio" name="midiMapping" value="acoustic" checked>
                        Acoustic (realistic instruments)
                    </label>
                    <label class="midi-radio-label">
                        <input type="radio" name="midiMapping" value="synth">
                        Synth (electronic sounds)
                    </label>
                </div>
            </div>
            <div class="midi-section">
                <label class="midi-label">Song info:</label>
                <div id="midiExportInfo" class="midi-info"></div>
            </div>
        </div>
        <div class="midi-buttons">
            <button class="midi-btn" onclick="doMidiExport()">Export</button>
            <button class="midi-btn" onclick="closeMidiExportDialog()">Cancel</button>
        </div>
    </div>
</div>

<script src="js/d64lib.js"></script>
<script src="js/gmDisk.js"></script>
<script src="js/c64lib.js"></script>
<script src="js/gmSound.js"></script>
<script src="js/gmMusic.js"></script>
<script src="js/gmTools.js"></script>
<script src="js/gmDiskPicker.js"></script>
<script src="js/midiImport.js"></script>
<script>
// ============================================================================
// MUSIC EDITOR - Create and edit C64 GameMaker songs
// ============================================================================
//
// This editor mimics the original GameMaker music editor UI with a piano
// keyboard, sheet music staff, and note entry system.
//
// === KEY CONCEPTS ===
//
// PITCH RANGE: G1 to G6 (5 octaves), matching the piano keyboard display
// - Pitch byte 0x26 (38) = A4 (A440)
// - G1 = pitch 0x07, G6 = pitch 0x43
//
// STAFF LAYOUT: 3 staves spanning the full pitch range
// - Top staff: higher pitches
// - Bottom staff: lower pitches (bass)
//
// CHANNELS: 3 independent voices, color-coded
// - Channel 1: Red/pink
// - Channel 2: Green
// - Channel 3: Blue
//
// PLAYHEAD: Position at right edge of staff where notes are entered
// Notes scroll left during playback and when navigating.

// === CONSTANTS ===

const INSTRUMENTS = [
    'off', 'bass', 'cow bell', 'cymbal', 'flute', 'guitar', 'harpsicrd',
    'piano', 'saxophone', 'snare', 'synthesiz', 'trumpet', 'violin', 'xylophone'
];

// Duration values (base byte values) - includes all GM durations
// Rest mode is toggled separately, applies to any duration
// Note: GM does not have dotted rests, only dotted notes
const DURATIONS = [
    { name: 'whole', byte: 0x1F, beats: 4.0, dotted: false },
    { name: 'dotted-half', byte: 0x17, beats: 3.0, dotted: true },
    { name: 'half', byte: 0x0F, beats: 2.0, dotted: false },
    { name: 'dotted-quarter', byte: 0x0B, beats: 1.5, dotted: true },
    { name: 'quarter', byte: 0x07, beats: 1.0, dotted: false },
    { name: 'dotted-eighth', byte: 0x05, beats: 0.75, dotted: true },
    { name: 'eighth', byte: 0x03, beats: 0.5, dotted: false },
    { name: 'sixteenth', byte: 0x01, beats: 0.25, dotted: false },
    { name: '32nd', byte: 0x00, beats: 0.125, dotted: false }
];

// Durations available for rests (no dotted rests in GM)
const REST_DURATIONS = [
    { name: 'whole', byte: 0x1F, beats: 4.0 },
    { name: 'half', byte: 0x0F, beats: 2.0 },
    { name: 'quarter', byte: 0x07, beats: 1.0 },
    { name: 'eighth', byte: 0x03, beats: 0.5 },
    { name: 'sixteenth', byte: 0x01, beats: 0.25 },
    { name: '32nd', byte: 0x00, beats: 0.125 }
];

// Map from duration byte to beats for loaded songs
const DURATION_BYTE_TO_BEATS = {
    0x00: 0.125,  // 32nd
    0x01: 0.25,   // 16th
    0x03: 0.5,    // 8th
    0x05: 0.75,   // dotted 8th
    0x07: 1.0,    // quarter
    0x0B: 1.5,    // dotted quarter
    0x0F: 2.0,    // half
    0x17: 3.0,    // dotted half
    0x1F: 4.0     // whole
};

// Pitch constants
const PITCH_A440 = 0x26; // 38 decimal
const PITCH_G1 = 0x07;   // Lowest note on keyboard
const PITCH_G6 = 0x43;   // Highest note on keyboard
const NOTE_NAMES = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];

// Staff layout
const STAFF_HEIGHT = 472; // Total staff area height (extra room for G6 above top line)

// Horizontal spacing: fixed slots per beat (like traditional sheet music)
// Each beat divided into 8 slots (32nd note resolution)
// Notes are positioned by their slot, not by their duration
const SLOTS_PER_BEAT = 8; // 8 slots = 32nd note resolution
const PIXELS_PER_SLOT = 25; // Each slot gets 25 pixels

// === STATE ===

let currentSong = null;
let currentSongFileName = null;
let currentChannel = 0;
let currentDuration = 4; // Index into DURATIONS (default: quarter)
let tieEnabled = false;
let restMode = false; // When true, enter rests instead of notes
let insMode = false;
let playheadBeat = 0; // Current beat position (playhead at right edge)
let visualBeat = 0; // Visual position for smooth scrolling
let scrollAnimationId = null; // Animation frame ID
let isPlaying = false;
let playbackStartTime = 0;
let playbackStartBeat = 0;
let playbackAnimId = null;
let confirmCallback = null;
let activePlaybackNotes = []; // Track notes currently playing for piano highlighting
let undoHistory = []; // Stack of previous song states
const MAX_UNDO_HISTORY = 50; // Limit undo history size

// === INITIALIZATION ===

function initApp() {
    createPianoKeyboard();
    createDurationSelector();
    createStaffLines();
    newSong();
    restoreSongSession();
    setupTempoControl();
    setupKeyboardShortcuts();
    setupNavButtons();
    updateUndoButton();

    // Shared disk picker: URL-driven ?disk=X with 2+ SNGs falls back to
    // this; drag-and-drop of a .d64 anywhere in the window shows it too.
    picker = GMDiskPicker.mount(document.body, {
        extension: '/SNG',
        disk,
        windowDropEnabled: true,
        onPickFile: (name, bytes) => loadSongFromDisk(name, bytes),
        // Multi-match drop opens the music-filtered file popup.
        showPicker: () => showFilePopup()
    });

    // URL-driven loading: ?disk=<url>&file=<name>. Fire-and-forget;
    // GMTools.initFromUrl handles errors via showMessage.
    initFromUrl();
}

let picker = null;

async function initFromUrl() {
    // music-maker has no plain showMessage helper; GMTools.initFromUrl
    // falls back to console.warn when one isn't provided.
    await GMTools.initFromUrl({
        disk, expectedExt: '/SNG', loadFile: loadSongFromDisk,
        // ?disk=X with no ?file= and multiple SNGs: open the music-
        // filtered file popup.
        showPicker: () => showFilePopup()
    });
}

// === SESSION PERSISTENCE ===
// Persists work-in-progress to localStorage. See GMTools.session.

const saveSongSession = GMTools.session.debouncedSaver('music-maker', () => {
    if (!currentSong) return null;
    return {
        bytes: GMTools.session.bytesToBase64(currentSong.serialize()),
        fileName: currentSongFileName
    };
});

function restoreSongSession() {
    const s = GMTools.session.load('music-maker');
    if (!s || !s.bytes) return;
    try {
        const bytes = GMTools.session.base64ToBytes(s.bytes);
        currentSong = new gmMusic(bytes);
        currentSongFileName = s.fileName || null;
        playheadBeat = 0;
        visualBeat = 0;
        clearUndoHistory();
        updateSongNameDisplay();
        updateChannelDisplay();
        updateTempoDisplay();
        renderStaff();
    } catch (e) {
        console.warn('music-maker: failed to restore session, starting fresh:', e.message);
    }
}

function newSong() {
    currentSong = gmMusic.createBlank();
    // Reset the filename so the save dialog doesn't prefill with the prior song's name
    currentSongFileName = null;
    playheadBeat = 0;
    visualBeat = 0;
    clearUndoHistory();
    updateSongNameDisplay();
    updateChannelDisplay();
    updateTempoDisplay();
    renderStaff();
}

// === PIANO KEYBOARD ===

function createPianoKeyboard() {
    const piano = document.getElementById('piano');
    piano.innerHTML = '';

    // 5 octaves: G1 to G6
    // White keys: G A B C D E F (repeating)
    // Pattern from G: W b W b W W b W b W b W (where W=white, b=black)

    const whiteKeyPattern = [0, 2, 4, 5, 7, 9, 11]; // Semitones for white keys in octave (C-based)
    const blackKeyPattern = [1, 3, 6, 8, 10]; // Semitones for black keys

    // Start from G1 (pitch 0x07)
    // G is 7 semitones above C, so G1 in our system...
    // Let's think: pitch 0x26 = A4. A is 9 semitones above C.
    // So C4 = 0x26 - 9 = 0x1D (29)
    // C1 = 29 - 36 = -7... that's not right.
    // Actually from music-player: C1 = 0x05
    // So G1 = 0x05 + 7 = 0x0C (12)... but we said PITCH_G1 = 0x07
    // Let me recalculate. From the code: noteValue 0x05 maps to C1
    // G1 = C1 + 7 semitones = 0x05 + 7 = 0x0C
    // But that doesn't match... let me check again.

    // From music-player.html:
    // const semitone = noteValue - 5;  // semitones from C1
    // So noteValue 5 = C1, noteValue 12 = G1
    // Let me fix PITCH_G1:
    const REAL_PITCH_G1 = 0x00; // 0 = G0 (bottom line of bottom staff)
    const REAL_PITCH_G6 = REAL_PITCH_G1 + 60; // 5 octaves = 60 semitones

    // Build white and black keys for 5 octaves starting from G
    let whiteKeyIndex = 0;
    const whiteKeys = [];
    const blackKeys = [];

    // Iterate through all pitches from G1 to G6
    for (let pitch = REAL_PITCH_G1; pitch <= REAL_PITCH_G6; pitch++) {
        const semitone = pitch - 5; // semitones from C1
        const noteInOctave = ((semitone % 12) + 12) % 12;

        if (whiteKeyPattern.includes(noteInOctave)) {
            whiteKeys.push({ pitch, noteInOctave, index: whiteKeyIndex++ });
        } else {
            blackKeys.push({ pitch, noteInOctave, whiteIndex: whiteKeyIndex - 1 });
        }
    }

    // Create white keys
    whiteKeys.forEach(key => {
        const keyEl = document.createElement('div');
        keyEl.className = 'white-key';
        keyEl.dataset.pitch = key.pitch;
        keyEl.dataset.whiteIndex = key.index;
        keyEl.onclick = () => enterNoteFromPiano(key.pitch);
        keyEl.onmouseenter = () => showPianoPreview(key.pitch, false);
        keyEl.onmouseleave = hidePianoPreview;
        piano.appendChild(keyEl);
    });

    // Create black keys after a brief delay to allow layout
    // Position based on actual rendered white key positions to avoid drift
    requestAnimationFrame(() => {
        const whiteKeyEls = piano.querySelectorAll('.white-key');

        blackKeys.forEach(key => {
            const keyEl = document.createElement('div');
            keyEl.className = 'black-key';
            keyEl.dataset.pitch = key.pitch;

            // Position based on actual white key position
            const leftWhiteKey = whiteKeyEls[key.whiteIndex];
            const rightWhiteKey = whiteKeyEls[key.whiteIndex + 1];
            if (leftWhiteKey && rightWhiteKey) {
                // Center between the right edge of left key and left edge of right key
                const leftEdge = leftWhiteKey.offsetLeft + leftWhiteKey.offsetWidth;
                const rightEdge = rightWhiteKey.offsetLeft;
                const center = (leftEdge + rightEdge) / 2;
                keyEl.style.left = (center - 6) + 'px'; // 6 = half of black key width (12px)
            } else if (leftWhiteKey) {
                // Edge case: use left key's right edge
                keyEl.style.left = (leftWhiteKey.offsetLeft + leftWhiteKey.offsetWidth - 6) + 'px';
            }

            keyEl.onclick = (e) => { e.stopPropagation(); enterNoteFromPiano(key.pitch); };
            keyEl.onmouseenter = () => showPianoPreview(key.pitch, true);
            keyEl.onmouseleave = hidePianoPreview;
            piano.appendChild(keyEl);
        });
    });
}

// Show ghost note preview on staff when hovering over piano key
function showPianoPreview(pitch, isSharp) {
    if (isPlaying || draggingNote) return;

    // Highlight the piano key with channel color
    ghostHighlightPianoKey(pitch, currentChannel);

    const previewNote = document.getElementById('previewNote');
    const staffArea = document.getElementById('staffArea');
    const rect = staffArea.getBoundingClientRect();
    const x = rect.width * 0.75; // Position at playhead (75% across)

    // Get the snapped Y position for this pitch
    const snappedY = pitchToStaffY(pitch);

    // Get current duration info
    const durationsArray = restMode ? REST_DURATIONS : DURATIONS;
    const duration = durationsArray[currentDuration] || durationsArray[0];
    const baseDuration = duration.byte;
    const isDotted = duration.dotted || false;

    // Determine stem direction based on position
    const stemUp = snappedY > getStemFlipY();

    // Get channel color
    const color = getChannelColor(currentChannel);

    // Render preview
    if (restMode) {
        previewNote.innerHTML = getRestSvg(baseDuration, color, isDotted);
        previewNote.style.left = (x - 20) + 'px';
        previewNote.style.top = (snappedY - 30) + 'px';
        previewNote.style.width = '50px';
        previewNote.style.height = '70px';
    } else {
        const svgContent = getNoteSvg(baseDuration, color, isDotted, stemUp, isSharp, tieEnabled);
        previewNote.innerHTML = `<div style="position:absolute;left:-36px;top:-30px;width:80px;height:140px;pointer-events:none">${svgContent}</div>`;
        previewNote.style.left = (x - 4) + 'px';
        previewNote.style.top = snappedY + 'px';
        previewNote.style.width = '32px';
        previewNote.style.height = '24px';
    }

    previewNote.style.display = 'block';
}

function hidePianoPreview() {
    const previewNote = document.getElementById('previewNote');
    previewNote.style.display = 'none';
    clearGhostHighlight();
}

function highlightPianoKey(pitch, highlight, channel = null) {
    const keys = document.querySelectorAll('#piano .white-key, #piano .black-key');
    keys.forEach(key => {
        if (parseInt(key.dataset.pitch) === pitch) {
            if (highlight && channel !== null) {
                // Set channel-specific color - fully bright
                // Use 'background' (not backgroundColor) to override the CSS gradient
                const colors = ['#FF0000', '#00FF00', '#0088FF']; // Red, Green, Blue (bright)
                key.style.background = colors[channel];
                key.classList.add('active');
            } else if (highlight) {
                key.classList.add('active');
                key.style.background = '';
            } else {
                key.classList.remove('active');
                key.style.background = '';
            }
        }
    });
}

function clearAllPianoHighlights() {
    const keys = document.querySelectorAll('#piano .white-key, #piano .black-key');
    keys.forEach(key => {
        key.classList.remove('active');
        key.style.background = '';
    });
}

// Ghost highlight for preview - different colors for black vs white keys
function ghostHighlightPianoKey(pitch, channel) {
    clearGhostHighlight();
    const keys = document.querySelectorAll('#piano .white-key, #piano .black-key');
    keys.forEach(key => {
        if (parseInt(key.dataset.pitch) === pitch) {
            const isBlackKey = key.classList.contains('black-key');
            // White keys: darker/muted colors; Black keys: lighter/brighter colors
            const whiteKeyColors = ['#ffaaaa', '#aaffaa', '#aaccff']; // Muted red, green, blue
            const blackKeyColors = ['#ff6666', '#66ff66', '#66aaff']; // Brighter red, green, blue
            key.style.background = isBlackKey ? blackKeyColors[channel] : whiteKeyColors[channel];
            key.classList.add('ghost-highlight');
        }
    });
}

function clearGhostHighlight() {
    const keys = document.querySelectorAll('#piano .ghost-highlight');
    keys.forEach(key => {
        key.classList.remove('ghost-highlight');
        key.style.background = '';
    });
}

// === NOTE DRAGGING ===

let draggingNote = null;
let dragStartY = 0;
let dragStartX = 0;
let dragActuallyStarted = false;  // True only after mouse moves beyond threshold
let hoveringOverNote = false;
const DRAG_THRESHOLD = 5;  // Pixels of movement before drag starts

function onNoteHover(event) {
    if (isPlaying || draggingNote) return;
    hoveringOverNote = true;

    const noteEl = event.currentTarget;
    const channel = parseInt(noteEl.dataset.channel);
    const noteIndex = parseInt(noteEl.dataset.noteIndex);
    const note = currentSong.channels[channel][noteIndex];

    // Show ghost highlight on piano for this note's pitch
    ghostHighlightPianoKey(note.pitch, channel);

    // Check if selected duration differs from the existing note
    const durationsArray = restMode ? REST_DURATIONS : DURATIONS;
    const selectedDuration = durationsArray[currentDuration] || durationsArray[0];
    const selectedDurationByte = selectedDuration.byte | (tieEnabled ? 0x20 : 0) | (restMode ? 0x40 : 0);
    const existingDurationByte = note.durationByte;

    // Check if we'd replace or advance (same pitch, same rest status, same duration = advance)
    const wouldAdvance = (note.isRest === restMode) && (existingDurationByte === selectedDurationByte);

    const previewNote = document.getElementById('previewNote');

    if (wouldAdvance) {
        // Same note - hide preview, will advance on click
        previewNote.style.display = 'none';
        noteEl.style.opacity = '1';
    } else {
        // Different duration - show ghost preview, dim original
        noteEl.style.opacity = '0.3';

        // Get note position
        const x = parseFloat(noteEl.dataset.originalX);
        const y = pitchToStaffY(note.pitch);

        // Render preview at this position
        const color = getChannelColor(currentChannel);
        const baseDuration = selectedDuration.byte;
        const isDotted = selectedDuration.dotted || false;
        const stemUp = y > getStemFlipY();

        // Check if pitch is sharp
        const REAL_PITCH_G1 = 0x00;
        const semitonesFromG1 = note.pitch - REAL_PITCH_G1;
        const semitoneInOctave = ((semitonesFromG1 % 12) + 12) % 12;
        const isSharp = [1, 3, 6, 8, 11].includes(semitoneInOctave);

        if (restMode) {
            previewNote.innerHTML = getRestSvg(baseDuration, color, isDotted);
            previewNote.style.left = (x - 20) + 'px';
            previewNote.style.top = (y - 30) + 'px';
            previewNote.style.width = '50px';
            previewNote.style.height = '70px';
        } else {
            const svgContent = getNoteSvg(baseDuration, color, isDotted, stemUp, isSharp, tieEnabled);
            previewNote.innerHTML = `<div style="position:absolute;left:-36px;top:-30px;width:80px;height:140px;pointer-events:none">${svgContent}</div>`;
            previewNote.style.left = (x - 4) + 'px';
            previewNote.style.top = y + 'px';
            previewNote.style.width = '32px';
            previewNote.style.height = '24px';
        }
        previewNote.style.display = 'block';
        previewNote.style.opacity = '0.6';
    }
}

function onNoteLeave(event) {
    if (draggingNote) return;
    hoveringOverNote = false;
    clearGhostHighlight();

    // Restore note opacity
    const noteEl = event.currentTarget;
    noteEl.style.opacity = '1';

    // Hide preview
    const previewNote = document.getElementById('previewNote');
    previewNote.style.display = 'none';
}

function startNoteDrag(event) {
    if (isPlaying) return;
    event.preventDefault();
    event.stopPropagation();

    const noteEl = event.currentTarget;
    const channel = parseInt(noteEl.dataset.channel);
    const noteIndex = parseInt(noteEl.dataset.noteIndex);

    // Calculate the original beat position of this note
    let originalBeat = 0;
    for (let i = 0; i < noteIndex; i++) {
        originalBeat += currentSong.channels[channel][i].duration;
    }

    draggingNote = {
        element: noteEl,
        channel: channel,
        noteIndex: noteIndex,
        originalX: parseFloat(noteEl.dataset.originalX),
        originalBeat: originalBeat
    };
    dragStartY = event.clientY;
    dragStartX = event.clientX;
    dragActuallyStarted = false;  // Don't start drag until threshold exceeded

    // Add document-level listeners for drag
    document.addEventListener('mousemove', onNoteDrag);
    document.addEventListener('mouseup', endNoteDrag);
}

function onNoteDrag(event) {
    if (!draggingNote) return;

    // Check if we've exceeded the drag threshold
    const dx = event.clientX - dragStartX;
    const dy = event.clientY - dragStartY;
    const distance = Math.sqrt(dx * dx + dy * dy);

    if (!dragActuallyStarted) {
        if (distance < DRAG_THRESHOLD) {
            return;  // Not enough movement yet, don't start drag
        }
        // Threshold exceeded - now we're really dragging
        dragActuallyStarted = true;
        draggingNote.element.classList.add('dragging');
    }

    const staffArea = document.getElementById('staffArea');
    const rect = staffArea.getBoundingClientRect();
    const x = event.clientX - rect.left;
    const y = event.clientY - rect.top;

    // Get pitch for this Y position
    const newPitch = staffYToPitch(y);
    const snappedY = pitchToStaffY(newPitch);

    // Calculate new beat position from X (snapped to 32nd note grid)
    const staffWidth = staffArea.clientWidth;
    const playheadX = staffWidth * 0.75;
    const renderBeat = visualBeat;
    const playheadSlot = Math.round(renderBeat * SLOTS_PER_BEAT);

    // Convert X to slot position, then to beat
    const slotPos = playheadSlot + (x - playheadX) / PIXELS_PER_SLOT;
    const snappedSlot = Math.round(slotPos);
    const newBeat = Math.max(0, snappedSlot / SLOTS_PER_BEAT);  // Can't go before 0

    // Calculate snapped X position for visual feedback
    const snappedX = playheadX + (snappedSlot - playheadSlot) * PIXELS_PER_SLOT;

    // Update note element position (both X and Y)
    draggingNote.element.style.left = (snappedX - 4) + 'px';
    draggingNote.element.style.top = snappedY + 'px';

    // Update the note SVG to reflect new stem direction and sharp status
    const note = currentSong.channels[draggingNote.channel][draggingNote.noteIndex];
    const color = getChannelColor(draggingNote.channel);
    const baseDuration = note.durationByte & 0x1F;
    const isDotted = [0x05, 0x0B, 0x17].includes(baseDuration);
    const stemUp = snappedY > getStemFlipY();

    // Check if new pitch is sharp
    const REAL_PITCH_G1 = 0x00;
    const semitonesFromG1 = newPitch - REAL_PITCH_G1;
    const semitoneInOctave = ((semitonesFromG1 % 12) + 12) % 12;
    const isSharp = [1, 3, 6, 8, 11].includes(semitoneInOctave);
    const isTied = (note.durationByte & 0x20) !== 0;

    const svgContent = getNoteSvg(baseDuration, color, isDotted, stemUp, isSharp, isTied);
    draggingNote.element.innerHTML = `<div style="position:absolute;left:-36px;top:-30px;width:80px;height:140px;pointer-events:none">${svgContent}</div>`;

    // Update ghost highlight on piano
    ghostHighlightPianoKey(newPitch, draggingNote.channel);

    // Store new values for when drag ends
    draggingNote.newPitch = newPitch;
    draggingNote.newBeat = newBeat;
}

function endNoteDrag(event) {
    if (!draggingNote) return;

    document.removeEventListener('mousemove', onNoteDrag);
    document.removeEventListener('mouseup', endNoteDrag);

    const channelIdx = draggingNote.channel;
    const noteIndex = draggingNote.noteIndex;
    const wasActualDrag = dragActuallyStarted;
    const originalBeat = draggingNote.originalBeat;
    const newBeat = draggingNote.newBeat;
    const newPitch = draggingNote.newPitch;

    draggingNote.element.classList.remove('dragging');

    if (wasActualDrag) {
        const channel = currentSong.channels[channelIdx];
        const note = channel[noteIndex];

        // Check if position changed (horizontal drag)
        const beatChanged = newBeat !== undefined && Math.abs(newBeat - originalBeat) > 0.001;

        if (beatChanged) {
            // Save undo state before moving
            saveUndoState();
            // Move note to new position in timeline
            moveNoteToPosition(channelIdx, noteIndex, newBeat);

            // Also update pitch if it changed
            // Note: need to find the note at its new position
            // For simplicity, we'll update pitch in the moveNoteToPosition function
            if (newPitch !== undefined && newPitch !== note.pitch) {
                // The note has been moved, find it at new position and update pitch
                updateNoteAtBeat(channelIdx, newBeat, newPitch);
            }
        } else if (newPitch !== undefined && newPitch !== note.pitch) {
            // Only pitch changed, simple update
            saveUndoState();
            note.pitch = newPitch;
        }
    } else {
        // No actual drag - treat as a click on the note
        const note = currentSong.channels[channelIdx][noteIndex];
        enterNote(note.pitch, note.isRest);
    }

    clearGhostHighlight();
    draggingNote = null;
    dragActuallyStarted = false;

    // Re-render to show updated note
    renderStaff();
}

// Move a note from its current position to a new beat position
function moveNoteToPosition(channelIdx, noteIndex, newBeat) {
    const channel = currentSong.channels[channelIdx];
    const note = channel[noteIndex];
    const noteDuration = note.duration;

    // Calculate original beat position
    let originalBeat = 0;
    for (let i = 0; i < noteIndex; i++) {
        originalBeat += channel[i].duration;
    }

    // If moving to same position, do nothing
    if (Math.abs(newBeat - originalBeat) < 0.001) return;

    // Remove the note from its current position
    channel.splice(noteIndex, 1);

    // Fill the gap with null slots
    const nullSlotDuration = 0.125; // 32nd note
    const numNullSlots = Math.round(noteDuration / nullSlotDuration);
    for (let i = 0; i < numNullSlots; i++) {
        channel.splice(noteIndex, 0, {
            durationByte: 0x40,
            pitch: 0x3C,
            isRest: true,
            isNullSlot: true,
            isTied: false,
            duration: nullSlotDuration
        });
    }

    // Now insert the note at the new position
    // First, find the insert index for newBeat
    let beatPos = 0;
    let insertIndex = 0;
    for (let i = 0; i < channel.length; i++) {
        if (beatPos >= newBeat - 0.001) break;
        beatPos += channel[i].duration;
        insertIndex = i + 1;
    }

    // If new position is beyond current notes, fill gap with null slots
    if (beatPos < newBeat - 0.001) {
        const gap = newBeat - beatPos;
        const numGapSlots = Math.round(gap / nullSlotDuration);
        for (let i = 0; i < numGapSlots; i++) {
            channel.push({
                durationByte: 0x40,
                pitch: 0x3C,
                isRest: true,
                isNullSlot: true,
                isTied: false,
                duration: nullSlotDuration
            });
        }
        insertIndex = channel.length;
    }

    // Check if we're inserting into null slots - consume them
    const existingNote = channel[insertIndex];
    if (existingNote && isNullSlot(existingNote)) {
        // Count and remove null slots up to the note's duration
        let nullSlotsDuration = 0;
        let nullSlotsToRemove = 0;
        for (let i = insertIndex; i < channel.length; i++) {
            if (isNullSlot(channel[i]) && nullSlotsDuration < noteDuration - 0.001) {
                nullSlotsDuration += channel[i].duration;
                nullSlotsToRemove++;
            } else {
                break;
            }
        }
        channel.splice(insertIndex, nullSlotsToRemove);
    }

    // Insert the note at the new position
    channel.splice(insertIndex, 0, note);

    // Clean up: merge consecutive null slots and remove unnecessary ones
    cleanupNullSlots(channelIdx);
}

// Update pitch of note at a given beat position
function updateNoteAtBeat(channelIdx, beat, newPitch) {
    const channel = currentSong.channels[channelIdx];
    let beatPos = 0;
    for (const note of channel) {
        if (Math.abs(beatPos - beat) < 0.001 && !isNullSlot(note)) {
            note.pitch = newPitch;
            return;
        }
        beatPos += note.duration;
    }
}

// Clean up null slots: remove trailing null slots
function cleanupNullSlots(channelIdx) {
    const channel = currentSong.channels[channelIdx];

    // Remove trailing null slots
    while (channel.length > 0 && isNullSlot(channel[channel.length - 1])) {
        channel.pop();
    }
}

// === DURATION SELECTOR ===

// SVG note symbols - base notes without ties
const baseNoteSvgs = {
    'whole': `<ellipse cx="10" cy="14" rx="6" ry="4" fill="none" stroke="black" stroke-width="2"/>`,
    'dotted-half': `<ellipse cx="8" cy="14" rx="5" ry="4" fill="none" stroke="black" stroke-width="2"/><line x1="13" y1="14" x2="13" y2="2" stroke="black" stroke-width="2"/>`,

    'dotted-quarter': `<ellipse cx="8" cy="14" rx="5" ry="4" fill="black"/><line x1="13" y1="14" x2="13" y2="2" stroke="black" stroke-width="2"/>`,
    'quarter': `<ellipse cx="10" cy="14" rx="5" ry="4" fill="black"/><line x1="15" y1="14" x2="15" y2="2" stroke="black" stroke-width="2"/>`,
    'dotted-eighth': `<ellipse cx="7" cy="14" rx="5" ry="4" fill="black"/><line x1="12" y1="14" x2="12" y2="2" stroke="black" stroke-width="2"/><path d="M12 2 Q17 4 15 8" stroke="black" stroke-width="2" fill="none"/>`,
    'eighth': `<ellipse cx="10" cy="14" rx="5" ry="4" fill="black"/><line x1="15" y1="14" x2="15" y2="2" stroke="black" stroke-width="2"/><path d="M15 2 Q20 4 18 8" stroke="black" stroke-width="2" fill="none"/>`,
