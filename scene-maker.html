    const x = lr * 0.4124564 + lg * 0.3575761 + lb * 0.1804375;
    const y = lr * 0.2126729 + lg * 0.7151522 + lb * 0.0721750;
    const z = lr * 0.0193339 + lg * 0.1191920 + lb * 0.9503041;
    // XYZ → Lab, normalised against D65 white
    const xn = x / 0.95047, yn = y / 1.00000, zn = z / 1.08883;
    const f = t => t > 0.008856 ? Math.cbrt(t) : (7.787 * t + 16 / 116);
    const fx = f(xn), fy = f(yn), fz = f(zn);
    return [116 * fy - 16, 500 * (fx - fy), 200 * (fy - fz)];
}

// Precompute Lab for the 16 C64 colors once
const _c64Lab = (() => {
    const out = [];
    for (let i = 0; i < 16; i++) {
        const c = c64Palette[i];
        out.push(_rgbToLab(c[0], c[1], c[2]));
    }
    return out;
})();

function _labDistSq(a, b) {
    const dl = a[0] - b[0], da = a[1] - b[1], db = a[2] - b[2];
    return dl * dl + da * da + db * db;
}

/**
 * Greedy palette selection: pick the 4 C64 colors that minimise total
 * squared Lab error across all pixels. Each iteration picks the candidate
 * that, combined with already-chosen colors, lowers total error the most.
 */
function _selectPalette(pixelsLab) {
    const chosen = [];
    const bestDist = new Float64Array(pixelsLab.length);
    bestDist.fill(Infinity);

    for (let step = 0; step < IMPORT_PALETTE_SIZE; step++) {
        let bestCandidate = -1;
        let bestTotal = Infinity;

        for (let c = 0; c < 16; c++) {
            if (chosen.includes(c)) continue;
            const cLab = _c64Lab[c];
            let total = 0;
            for (let i = 0; i < pixelsLab.length; i++) {
                const d = _labDistSq(pixelsLab[i], cLab);
                total += d < bestDist[i] ? d : bestDist[i];
                // Prune if already worse than current best total
                if (total >= bestTotal) break;
            }
            if (total < bestTotal) {
                bestTotal = total;
                bestCandidate = c;
            }
        }

        chosen.push(bestCandidate);
        const cLab = _c64Lab[bestCandidate];
        for (let i = 0; i < pixelsLab.length; i++) {
            const d = _labDistSq(pixelsLab[i], cLab);
            if (d < bestDist[i]) bestDist[i] = d;
        }
    }
    return chosen;
}

/**
 * Find which of the 4 chosen palette colors is closest (in sRGB Euclidean) to
 * the given pixel — used per-pixel during quantization. RGB is fine here
 * because we're choosing from just 4 colors; perceptual nuance from Lab was
 * already spent in the palette-selection step.
 */
function _nearestPaletteIndex(r, g, b, paletteRGB) {
    let bestI = 0, bestD = Infinity;
    for (let i = 0; i < paletteRGB.length; i++) {
        const p = paletteRGB[i];
        const dr = r - p[0], dg = g - p[1], db = b - p[2];
        const d = dr * dr + dg * dg + db * db;
        if (d < bestD) { bestD = d; bestI = i; }
    }
    return bestI;
}

/**
 * Quantize the source image to indices into the 4-color palette, optionally
 * applying Floyd-Steinberg error diffusion. Returns a Uint8Array length 32000.
 */
function _quantize(imageData, paletteC64Indices, useDither) {
    const w = 160, h = 200;
    const src = imageData.data;
    const paletteRGB = paletteC64Indices.map(i => c64Palette[i]);
    const out = new Uint8Array(w * h);

    if (!useDither) {
        for (let i = 0; i < w * h; i++) {
            const o = i * 4;
            out[i] = _nearestPaletteIndex(src[o], src[o + 1], src[o + 2], paletteRGB);
        }
        return out;
    }

    // Floyd-Steinberg in sRGB. We mutate a working buffer of floats so error
    // accumulates correctly; the input ImageData is untouched.
    const work = new Float32Array(w * h * 3);
    for (let i = 0; i < w * h; i++) {
        const o = i * 4, p = i * 3;
        work[p]     = src[o];
        work[p + 1] = src[o + 1];
        work[p + 2] = src[o + 2];
    }

    const push = (i, dr, dg, db, factor) => {
        const p = i * 3;
        work[p]     = Math.max(0, Math.min(255, work[p]     + dr * factor));
        work[p + 1] = Math.max(0, Math.min(255, work[p + 1] + dg * factor));
        work[p + 2] = Math.max(0, Math.min(255, work[p + 2] + db * factor));
    };

    for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
            const i = y * w + x;
            const p = i * 3;
            const r = work[p], g = work[p + 1], b = work[p + 2];
            const idx = _nearestPaletteIndex(r, g, b, paletteRGB);
            out[i] = idx;
            const chosen = paletteRGB[idx];
            const er = r - chosen[0];
            const eg = g - chosen[1];
            const eb = b - chosen[2];

            if (x + 1 < w)            push(i + 1,     er, eg, eb, 7 / 16);
            if (y + 1 < h && x > 0)   push(i + w - 1, er, eg, eb, 3 / 16);
            if (y + 1 < h)            push(i + w,     er, eg, eb, 5 / 16);
            if (y + 1 < h && x + 1 < w) push(i + w + 1, er, eg, eb, 1 / 16);
        }
    }
    return out;
}

function _buildSceneFromImage(img, opts) {
    const imageData = _drawToBuffer(img, opts.fit);
    const src = imageData.data;
    const n = 160 * 200;

    // Pixel Lab values for palette selection
    const pixelsLab = new Array(n);
    for (let i = 0; i < n; i++) {
        const o = i * 4;
        pixelsLab[i] = _rgbToLab(src[o], src[o + 1], src[o + 2]);
    }

    const chosen = _selectPalette(pixelsLab);

    // Re-order so the most-used color becomes the background. Background is the
    // "default" slot in scenes; making it the dominant color minimises later
    // re-rendering noise and matches user intuition.
    const provisional = _quantize(imageData, chosen, false);
    const counts = [0, 0, 0, 0];
    for (let i = 0; i < n; i++) counts[provisional[i]]++;
    const order = [0, 1, 2, 3].sort((a, b) => counts[b] - counts[a]);
    const reordered = order.map(i => chosen[i]);
    // Map old index → new index for re-quantization
    const indexMap = new Array(4);
    order.forEach((oldIdx, newIdx) => { indexMap[oldIdx] = newIdx; });

    // Final quantization with the reordered palette (so 0=bg, 1/2/3 by frequency)
    const finalPixels = _quantize(imageData, reordered, opts.dither);

    const scene = gmScene.createBlank(reordered[0], reordered[1], reordered[2], reordered[3]);
    scene.pixelBuffer.set(finalPixels);
    scene.dirty = true;
    return scene;
}

// === START ===
init();

</script>
